<!-- Google Maps loads lazily — only injected when address search is first used -->
<script>
window._mapsLoaded=false;
window._mapsCallbacks=[];
window.loadGoogleMaps=function(cb){
  if(window.google&&window.google.maps){if(cb)cb();return;}
  if(cb)window._mapsCallbacks.push(cb);
  if(window._mapsLoading)return;
  window._mapsLoading=true;
  window._gmapsReady=function(){
    window._mapsLoaded=true;
    window._mapsCallbacks.forEach(function(fn){try{fn();}catch(e){}});
    window._mapsCallbacks=[];
  };
  var s=document.createElement('script');
  s.src='https://maps.googleapis.com/maps/api/js?key=AIzaSyBoPhoNQ5C84nS79QDV36R93APg4Pizo_E&libraries=places&callback=_gmapsReady';
  s.async=true;s.defer=true;
  document.head.appendChild(s);
};
</script>

h+='<div style="display:flex;gap:12px;margin-top:10px;padding:0 2px">';
h+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#6B7280"><div style="width:10px;height:10px;border-radius:2px;background:#F0FDF4;border:2px solid #059669"></div>Upcoming</div>';
h+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#6B7280"><div style="width:10px;height:10px;border-radius:2px;background:#FFF7ED;border:2px solid #FCD34D"></div>Past</div>';
h+='</div>';
// Selected day tour list
if(selectedDate){
var selTours=window._getMRTTours?window._getMRTTours(selectedDate):[];
var selLabel=new Date(selectedDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
h+='<div style="margin-top:14px;border-top:1px solid #F3F4F6;padding-top:14px">';
h+='<div style="font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">'+selLabel+'</div>';
if(selTours.length===0){
h+='<div style="text-align:center;padding:16px;color:#9CA3AF;font-size:13px">No tours on this day</div>';
}else{
selTours.forEach(function(t){
var isPastTour=selectedDate<todayStr;
var badge=isPastTour?'<span style="background:#FEF3C7;color:#92400E;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px">PAST</span>':'<span style="background:#D1FAE5;color:#065F46;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px">UPCOMING</span>';
h+='<button onclick="window._openMRTTour(\''+t.id+'\')" style="width:100%;background:#fff;border:2px solid '+t.color+';border-radius:12px;padding:12px 14px;cursor:pointer;text-align:left;margin-bottom:8px;display:flex;align-items:center;gap:12px">';
h+='<div style="font-size:28px">'+t.emoji+'</div>';
h+='<div style="flex:1">';
h+='<div style="font-family:Georgia,serif;font-size:15px;font-weight:700;color:'+t.color+'">'+t.name+badge+'</div>';
h+='<div style="font-size:12px;color:#6B7280;margin-top:2px">🕒 '+t.time+' · 🏠 '+(t.listings?t.listings.length:0)+' stops</div>';
h+='</div>';
h+='<div style="font-size:18px;color:'+t.color+'">→</div>';
h+='</button>';
});
}
h+='</div>';
}
h+='</div>';
box.innerHTML=h;
}
window._calSelectDay=function(ds){
selectedDate=(selectedDate===ds)?null:ds;
render();
};
window._calPrev=function(){cm.month--;if(cm.month<0){cm.month=11;cm.year--;}render();};
window._calNext=function(){cm.month++;if(cm.month>11){cm.month=0;cm.year++;}render();};
render();
ov.appendChild(box);
document.body.appendChild(ov);
};
window._initScrollIndicator=function(){
var ind=document.getElementById("scroll-ind");
if(ind)ind.remove();
ind=document.createElement("div");
ind.id="scroll-ind";
ind.style.cssText="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1B3A6B,#2A5298);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;z-index:199;box-shadow:0 4px 16px rgba(27,58,107,.4);display:flex;align-items:center;gap:6;opacity:0;transition:opacity .3s;pointer-events:none;font-family:Georgia,serif";
ind.innerHTML='More Tours <span style="font-size:16px">↓</span>';
ind.onclick=function(){window.scrollBy({top:300,behavior:"smooth"})};
document.body.appendChild(ind);
var check=function(){
var sh=document.documentElement.scrollHeight;
var st=window.pageYOffset||document.documentElement.scrollTop;
var ch=window.innerHeight;
if(sh>ch+100&&st<sh-ch-80){
ind.style.opacity="1";ind.style.pointerEvents="auto";
}else{
ind.style.opacity="0";ind.style.pointerEvents="none";
}
};
window.addEventListener("scroll",check);
setTimeout(check,500);
setTimeout(check,1500);
var obs=new MutationObserver(function(){setTimeout(check,200)});
obs.observe(document.body,{childList:true,subtree:true});
};
setTimeout(window._initScrollIndicator,800);

</script>
</body>
