const avgRating = (ratingObj) => {
  if(!ratingObj) return 0;
  const vals = Object.values(ratingObj).filter(v=>v>0);
  if(!vals.length) return 0;
  return (vals.reduce((a,b)=>a+b,0)/vals.length);
};
const starBar = (avg, color) => {
  const pct = (avg/5)*100;
  return (

      <div style={{flex:1,height:6,background:"#E5E7EB",borderRadius:3,overflow:"hidden"}}>

    setTimeout(()=>{
      const matched=checkLogin(user,pass,subAdmins||[]);
      if(matched){sessionStorage.setItem("gat_session",JSON.stringify({email:matched.email||matched.username,username:matched.username,role:matched.role,name:matched.name}));onLogin(matched);}
      else{setError("Incorrect email or password.");setLoading(false);}
    },700);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"32px 28px",width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40}}>🔐</div>
          <h2 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:22,marginTop:8}}>Team Login</h2>
          <p style={{color:B.gray,fontSize:13,marginTop:4}}>Great American Title Agency</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <input type="email" value={user} onChange={e=>{setUser(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Email address" autoComplete="email"
            style={{border:`1.5px solid ${error?"#EF4444":"#E5E7EB"}`,borderRadius:10,padding:"12px 14px",fontSize:15,outline:"none",background:B.cream}}/>
          <div style={{position:"relative"}}>
            <input type={showPass?"text":"password"} value={pass} onChange={e=>{setPass(e.target.value);setError("");}}
              onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Password" autoComplete="current-password"
              style={{width:"100%",border:`1.5px solid ${error?"#EF4444":"#E5E7EB"}`,borderRadius:10,padding:"12px 44px 12px 14px",fontSize:15,outline:"none",background:B.cream}}/>
            <button onClick={()=>setShowPass(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:18,color:B.gray}}>{showPass?"🙈":"👁️"}</button>
          </div>
          {error&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",color:"#DC2626",fontSize:13}}>⚠️ {error}</div>}
          <button onClick={submit} disabled={loading} className="btn-hover"
            style={{background:loading?"#9CA3AF":B.primary,color:"#fff",border:"none",borderRadius:12,padding:"14px 0",fontWeight:700,fontSize:16,cursor:loading?"default":"pointer"}}>
            {loading?"Signing in...":"Sign In →"}
          </button>
          {onClose&&<button onClick={onClose} style={{background:"none",border:"none",color:B.gray,cursor:"pointer",fontSize:14,textDecoration:"underline",textAlign:"center"}}>Cancel</button>}
        </div>
      </div>
    </div>
  );
}

/* ── NEIGHBORHOOD INFO ── */
function NeighborhoodPanel({address,city}) {
  const [open,setOpen]=useState(false);
  const zip = (city||"").match(/\d{5}/)?.[0]||"";
  const walkUrl = `https://www.walkscore.com/score/loc/zip=${zip}`;
  const schoolUrl = `https://www.greatschools.org/search/search.page?zip=${zip}`;
  const mapUrl = `https://www.google.com/maps/search/${encodeURIComponent(address+", "+city)}`;
  if(!open) return (
    <button onClick={()=>setOpen(true)} style={{width:"100%",background:"#fff",border:"1.5px dashed #D1D5DB",
      borderRadius:12,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,
      color:B.gray,fontSize:13,fontWeight:600}}>
      <span style={{fontSize:20}}>🏘️</span> View Neighborhood Info
    </button>
  );
  return (
    <div className="fade-in" style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
      <div style={{background:B.primary,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:"#fff",fontWeight:700,fontSize:14}}>🏘️ Neighborhood Info</span>
        <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:18}}>✕</button>
      </div>
      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {[
          {icon:"🗺️",label:"Google Maps",desc:"View property location",url:mapUrl},
          {icon:"🚶",label:"Walk Score",desc:"Walkability & transit score",url:walkUrl},
          {icon:"🎓",label:"School Ratings",desc:"Nearby schools via GreatSchools",url:schoolUrl},
          {icon:"🏪",label:"Nearby Places",desc:"Restaurants, shops & more",url:`https://www.google.com/maps/search/restaurants+near+${encodeURIComponent(address+", "+city)}`},
          {icon:"📊",label:"Market Data",desc:"Zillow area stats",url:`https://www.zillow.com/homes/${encodeURIComponent(zip)}`},
        ].map(item=>(
          <a key={item.label} href={item.url} target="_blank" rel="noreferrer"
            style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:10,
              background:B.lightGray,textDecoration:"none",transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="#E5E7EB"}
            onMouseLeave={e=>e.currentTarget.style.background=B.lightGray}>
            <span style={{fontSize:22}}>{item.icon}</span>
            <div>
              <div style={{fontWeight:700,fontSize:14,color:B.primary}}>{item.label}</div>
              <div style={{fontSize:11,color:B.gray}}>{item.desc}</div>
            </div>
            <span style={{marginLeft:"auto",color:B.gray,fontSize:16}}>↗</span>
          </a>
        ))}
      </div>
    </div>
  );
}

/* ── RATING PAGE ── */
function RatingPage({listing,tour,onBack,onRatingSubmit}) {
  const [ratings,setRatings]=useState({});
  const [suggestions,setSuggestions]=useState("");
  const [comments,setComments]=useState("");
  const [sugPrice,setSugPrice]=useState("");
  const [pricedRight,setPricedRight]=useState(false);
  const [photos,setPhotos]=useState([]);
  const [showGallery,setShowGallery]=useState(false);
  const [galleryPhotos,setGalleryPhotos]=useState(listing.photos);
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(false);
  const [submitError,setSubmitError]=useState("");
  const fileRef=useRef(null);

  const handlePhotoUpload=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        setPhotos(prev=>[...prev,{url:ev.target.result,name:file.name}]);
      };
      reader.readAsDataURL(file);
    });
  };

  const starLabel=(n)=>n===0?"Not rated":"★".repeat(n)+"☆".repeat(5-n)+` (${n}/5)`;

  const handleSubmit=async()=>{
    setSubmitting(true);setSubmitError("");
    try {
      const payload={
        _subject:`🏡 Home Tour Rating — ${listing.address}`,
        "Property Address":listing.address,"City":listing.city,
        "Listing Agent":listing.agent,"List Price":`$${listing.price.toLocaleString()}`,
        "Beds / Baths":`${listing.beds} bd / ${listing.baths} ba`,
        "Square Feet":`${listing.sqft.toLocaleString()} sqft`,"Days on Market":`${listing.dom} days`,
        "Tour Name":`${tour.emoji} ${tour.name}`,"Tour Date":tour.date,"Tour Time":tour.time,"Stop Number":`#${listing.order}`,
        "── RATINGS ──":"─────────────────",
        "Curb Appeal":starLabel(ratings.curbAppeal||0),"Landscape":starLabel(ratings.landscape||0),
        "Cleanliness":starLabel(ratings.cleanliness||0),"Flooring":starLabel(ratings.flooring||0),
        "Paint":starLabel(ratings.paint||0),"Showability":starLabel(ratings.showability||0),"Price Rating":starLabel(ratings.price||0),
        "── FEEDBACK ──":"─────────────────",
        "Suggestions":suggestions||"None","Comments":comments||"None",
        "Suggested Price":pricedRight?"Priced Correctly ✓":(sugPrice||"Not provided"),
        "Photos Attached":`${photos.length} photo(s) uploaded`,
        "Submitted Via":"GAT Home Tour App",
        "Submitted At":new Date().toLocaleString("en-US",{dateStyle:"full",timeStyle:"short"}),
      };
      const res=await fetch("https://formspree.io/f/xdallqwa",{
        method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify(payload),
      });
      if(res.ok){
        onRatingSubmit(listing.id, ratings);
        setDone(true);setTimeout(onBack,2800);
      } else {
        const data=await res.json();
        setSubmitError(data?.errors?.[0]?.message||"Submission failed. Please try again.");
        setSubmitting(false);
      }
    } catch(e){setSubmitError("Network error — please check your connection.");setSubmitting(false);}
  };

  if(done) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",gap:16,background:B.cream,padding:32,textAlign:"center"}}>
      <div style={{fontSize:72}}>✅</div>
      <h2 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:24}}>Rating Submitted!</h2>
      <p style={{color:B.gray,fontSize:14,lineHeight:1.6}}>
        Feedback emailed to<br/><strong style={{color:B.primary}}>{listing.agent}</strong>.<br/>Returning to tour...
      </p>
    </div>
  );

  const allPhotos=[...listing.photos,...photos.map(p=>p.url)];

  return (
    <div style={{background:B.cream,minHeight:"100vh",paddingBottom:40}}>
      {showGallery&&<Gallery photos={galleryPhotos} onClose={()=>setShowGallery(false)}/>}
      <div style={{background:tour.color,padding:"14px 18px",display:"flex",alignItems:"center",
        gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
        <div>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>
            {tour.emoji} {tour.name} · Stop #{listing.order}
          </div>
          <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Rate This Home</div>
        </div>
      </div>

      <div style={{position:"relative",cursor:"pointer"}} onClick={()=>{setGalleryPhotos(allPhotos);setShowGallery(true);}}>
        <img src={listing.photos[0]} alt={listing.address} style={{width:"100%",height:220,objectFit:"cover",display:"block"}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.4) 0%,transparent 50%)"}}/>
        <div style={{position:"absolute",bottom:12,left:16,color:"#fff"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,textShadow:"0 1px 4px rgba(0,0,0,.6)"}}>{listing.address}</div>
          <div style={{fontSize:12,opacity:.9}}>{listing.city}</div>
        </div>
        <div style={{position:"absolute",bottom:12,right:14,background:"rgba(0,0,0,.55)",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:12}}>📷 {allPhotos.length} — tap to view</div>
      </div>

      <div style={{background:"#fff",padding:"14px 18px",borderBottom:`3px solid ${B.gold}`}}>
        <div style={{display:"flex",gap:8,fontSize:12,flexWrap:"wrap",marginBottom:10}}>
          {[`🛏 ${listing.beds} beds`,`🚿 ${listing.baths} baths`,`📐 ${listing.sqft.toLocaleString()} sqft`,`📅 ${listing.dom} DOM`].map((t,i)=>(
            <span key={i} style={{background:B.lightGray,borderRadius:6,padding:"4px 10px",color:B.dark,fontWeight:500}}>{t}</span>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:22,fontWeight:700,color:B.primary,fontFamily:"Georgia,serif"}}>${listing.price.toLocaleString()}</div>
            <div style={{fontSize:12,color:B.gray,marginTop:2}}>Listed by {listing.agent}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <a href="https://www.azgat.com/get-gat-app/" target="_blank" style={{background:B.primary,color:"#fff",textDecoration:"none",borderRadius:8,padding:"9px 13px",fontWeight:700,fontSize:12}}>Buyer Est.</a>
            <a href="https://www.azgat.com/get-gat-app/" target="_blank" style={{background:B.gold,color:"#fff",textDecoration:"none",borderRadius:8,padding:"9px 13px",fontWeight:700,fontSize:12}}>Seller Est.</a>
          </div>
        </div>
      </div>

      <div style={{margin:"14px 14px 0",display:"flex",flexDirection:"column",gap:14}}>
        {/* Ratings */}
        <div style={{background:"#fff",borderRadius:14,padding:18,boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
          <h3 style={{color:B.primary,fontSize:13,fontWeight:700,marginBottom:16,textTransform:"uppercase",letterSpacing:.5}}>Rate This Property</h3>
          {RATING_CATS.map(cat=>(
            <div key={cat.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              marginBottom:14,paddingBottom:14,borderBottom:"1px solid #F3F4F6"}}>
              <span style={{fontSize:15,color:B.dark,fontWeight:500,minWidth:110}}>{cat.label}</span>
              <Stars value={ratings[cat.key]||0} onChange={v=>setRatings(r=>({...r,[cat.key]:v}))}/>
            </div>
          ))}
        </div>

        {/* Neighborhood */}
        <NeighborhoodPanel address={listing.address} city={listing.city}/>

        {/* Suggestions */}
        {[["Suggestions","e.g. Update master bath, repaint exterior..."],["Comments","Additional notes about this property..."]].map(([label,ph],idx)=>(
          <div key={label} style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:8}}>{label}</label>
            <textarea placeholder={ph} rows={3}
              value={idx===0?suggestions:comments}
              onChange={e=>idx===0?setSuggestions(e.target.value):setComments(e.target.value)}
              style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:8,padding:"10px 12px",fontSize:14,resize:"vertical",outline:"none",background:B.cream,lineHeight:1.5}}/>
          </div>
        ))}

        {/* Suggested Price */}
        <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:8}}>Suggested Price</label>
          <input type="text" value={pricedRight?"Priced Correctly ✓":sugPrice}
            onChange={e=>setSugPrice(e.target.value)} disabled={pricedRight} placeholder="$000,000"
            style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:8,padding:"10px 12px",
              fontSize:15,fontWeight:600,outline:"none",
              background:pricedRight?"#F0FDF4":B.cream,color:pricedRight?"#16A34A":B.dark}}/>
          <label style={{display:"flex",alignItems:"center",gap:10,marginTop:10,cursor:"pointer"}}>
            <input type="checkbox" checked={pricedRight}
              onChange={e=>{setPricedRight(e.target.checked);if(e.target.checked)setSugPrice("");}}
              style={{width:18,height:18,accentColor:B.primary}}/>
            <span style={{fontSize:14,color:B.dark,fontWeight:500}}>Priced Correctly</span>
          </label>
        </div>

        {/* Photo Upload */}
        <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:10}}>📷 Attach Photos</label>
          <input type="file" accept="image/*" multiple ref={fileRef} onChange={handlePhotoUpload} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current.click()}
            style={{width:"100%",border:"2px dashed #D1D5DB",borderRadius:10,padding:"14px",
              cursor:"pointer",background:B.lightGray,color:B.gray,fontSize:13,fontWeight:600}}>
            + Upload Photos from Device
          </button>
          {photos.length>0&&(
            <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
              {photos.map((p,i)=>(
                <div key={i} style={{position:"relative"}}>
                  <img src={p.url} alt="" style={{width:72,height:56,objectFit:"cover",borderRadius:8,display:"block"}}/>
                  <button onClick={()=>setPhotos(prev=>prev.filter((_,j)=>j!==i))}
                    style={{position:"absolute",top:-6,right:-6,background:B.red,color:"#fff",border:"none",
                      borderRadius:"50%",width:20,height:20,fontSize:12,cursor:"pointer",display:"flex",
                      alignItems:"center",justifyContent:"center",fontWeight:700}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>

        {submitError&&(
          <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,
            padding:"12px 16px",color:"#DC2626",fontSize:13}}>⚠️ {submitError}</div>
        )}

        <button onClick={handleSubmit} disabled={submitting} className="btn-hover"
          style={{background:submitting?"#9CA3AF":tour.color,color:"#fff",border:"none",borderRadius:12,
            padding:"16px 0",fontWeight:700,fontSize:16,cursor:submitting?"default":"pointer",
            boxShadow:"0 4px 14px rgba(27,58,107,.3)",display:"flex",alignItems:"center",
            justifyContent:"center",gap:10}}>
          {submitting?(
            <><span style={{display:"inline-block",width:18,height:18,border:"3px solid rgba(255,255,255,.4)",
              borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
              Sending to {listing.agent}...</>
          ):"Submit & Email Agent ★"}
        </button>
        <p style={{textAlign:"center",fontSize:11,color:B.gray,marginTop:-6}}>
          Rating will be emailed to <strong>{listing.agent}</strong> via GAT Home Tour
        </p>
      </div>
    </div>
  );
}

/* ── RANKING PAGE ── */
function RankingPage({tour, onBack}) {
  const sorted = [...tour.listings]
    .map(l=>({...l, avg: avgRating(tour.ratings?.[l.id])}))
    .sort((a,b)=>b.avg-a.avg);
  const medals = ["🥇","🥈","🥉"];
  return (
    <div style={{background:B.cream,minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:tour.color,padding:"14px 18px",display:"flex",alignItems:"center",
        gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
        <div>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{tour.emoji} {tour.name}</div>
          <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Home Rankings</div>
        </div>
      </div>
      <div style={{padding:"20px 14px",display:"flex",flexDirection:"column",gap:12}}>
        <p style={{color:B.gray,fontSize:13,marginBottom:4}}>
          {sorted.some(l=>l.avg>0) ? "Rankings based on submitted ratings across all 7 categories." : "No ratings submitted yet for this tour."}
        </p>
        {sorted.map((listing,i)=>(
          <div key={listing.id} className="fade-in" style={{background:"#fff",borderRadius:16,overflow:"hidden",
            boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:i===0&&listing.avg>0?"2px solid "+B.gold:"1px solid rgba(0,0,0,.05)"}}>
            <div style={{display:"flex",gap:0}}>
              <div style={{width:90,flexShrink:0,position:"relative"}}>
                <img src={listing.photos[0]} alt="" style={{width:"100%",height:"100%",minHeight:90,objectFit:"cover",display:"block"}}/>
                <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.25)"}}/>
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:32}}>{listing.avg>0?(medals[i]||`#${i+1}`):"—"}</div>
              </div>
              <div style={{flex:1,padding:"14px 16px"}}>
                <div style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,color:B.primary,marginBottom:2}}>{listing.address}</div>
                <div style={{fontSize:11,color:B.gray,marginBottom:8}}>{listing.city}</div>
                {listing.avg>0?(
                  <>
                    {starBar(listing.avg, tour.color)}
                    <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                      {RATING_CATS.map(cat=>{
                        const v=(tour.ratings?.[listing.id])?.[cat.key]||0;
                        return v>0?(
                          <span key={cat.key} style={{fontSize:10,background:B.lightGray,borderRadius:4,padding:"2px 7px",color:B.dark}}>
                            {cat.label}: {v}★
                          </span>
                        ):null;
                      })}
                    </div>
                  </>
                ):(
                  <span style={{fontSize:12,color:B.gray,fontStyle:"italic"}}>No ratings yet</span>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── RATING SUMMARY DASHBOARD ── */
function SummaryDashboard({tour, onBack}) {
  const listings = tour.listings;
  const hasAny = listings.some(l=>tour.ratings?.[l.id]&&Object.values(tour.ratings[l.id]).some(v=>v>0));
  return (
    <div style={{background:B.cream,minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:tour.color,padding:"14px 18px",display:"flex",alignItems:"center",
        gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
        <div>
          <div style={{color:"rgba(255,255,255,.7)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{tour.emoji} {tour.name}</div>
          <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Rating Summary</div>
        </div>
      </div>
      <div style={{padding:"20px 14px",display:"flex",flexDirection:"column",gap:16}}>
        {!hasAny&&(
          <div style={{textAlign:"center",padding:"60px 20px",color:B.gray}}>
            <div style={{fontSize:48,marginBottom:12}}>📊</div>
            <p>No ratings submitted yet.<br/>Ratings will appear here as attendees submit them.</p>
          </div>
        )}
        {hasAny&&listings.map(listing=>{
          const r=tour.ratings?.[listing.id]||{};
          const avg=avgRating(r);
          if(!avg) return null;
          return (
            <div key={listing.id} style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,.08)"}}>
              <div style={{background:tour.color,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700}}>{listing.address}</div>
                <div style={{background:"rgba(255,255,255,.2)",borderRadius:8,padding:"3px 10px",color:"#fff",fontWeight:800,fontSize:14}}>{avg.toFixed(1)}★</div>
              </div>
              <div style={{padding:"14px 16px"}}>
                {RATING_CATS.map(cat=>{
                  const v=r[cat.key]||0;
                  return (
                    <div key={cat.key} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,color:B.dark,fontWeight:500}}>{cat.label}</span>
                        <span style={{fontSize:12,color:B.gray}}>{v>0?`${v}/5`:"—"}</span>
                      </div>
                      {starBar(v, tour.color)}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── ADD LISTING FORM with Google Places Autocomplete ── */
function AddListingForm({ tourColor, onAdd, onCancel }) {
  const [query, setQuery]       = useState("");
  const [suggestions, setSugg]  = useState([]);
  const [selected, setSelected] = useState(null);
  const [fields, setFields]     = useState({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
  const [loading, setLoading]   = useState(false);
  const [status, setStatus]     = useState("");
  const [sessionToken, setToken]= useState(null);
  const inputRef = useRef(null);

  useEffect(()=>{
    if(window.google?.maps?.places) {
      setToken(new window.google.maps.places.AutocompleteSessionToken());
    }
  },[]);

  useEffect(()=>{
    if(!query || query.length < 3 || !window.google?.maps?.places || selected) {
      setSugg([]); return;
    }
    const svc = new window.google.maps.places.AutocompleteService();
    svc.getPlacePredictions({
      input: query,
      sessionToken,
      types: ["address"],
      componentRestrictions: { country: "us" },
    }, (predictions, status) => {
      if(status === window.google.maps.places.PlacesServiceStatus.OK && predictions) {
        setSugg(predictions);
      } else {
        setSugg([]);
      }
    });
  }, [query]);

  const handleSelect = (prediction) => {
    setSugg([]);
    setLoading(true);
    setStatus("📍 Confirming address...");

    const map = new window.google.maps.Map(document.createElement("div"));
    const svc = new window.google.maps.places.PlacesService(map);
    svc.getDetails({
      placeId: prediction.place_id,
      fields: ["address_components", "formatted_address", "geometry"],
      sessionToken,
    }, (place, st) => {
      if(st !== window.google.maps.places.PlacesServiceStatus.OK || !place) {
        setStatus("❌ Could not get address details. Please try again.");
        setLoading(false); return;
      }

      const get = (type) => {
        const comp = place.address_components.find(c => c.types.includes(type));
        return comp ? comp.long_name : "";
      };
      const getShort = (type) => {
        const comp = place.address_components.find(c => c.types.includes(type));
        return comp ? comp.short_name : "";
      };

      const streetNum  = get("street_number");
      const streetName = get("route");
      const city       = get("locality") || get("sublocality");
      const state      = getShort("administrative_area_level_1");
      const zip        = get("postal_code");
      const address    = `${streetNum} ${streetName}`.trim();
      const cityStr    = `${city}, ${state} ${zip}`.trim();

      setQuery(address);
      setSelected(prediction.place_id);
      setToken(new window.google.maps.places.AutocompleteSessionToken());
      setFields(f => ({ ...f, address, city: cityStr }));
      setStatus("✅ Address confirmed! Fill in listing details below.");
      setLoading(false);
    });
  };

  const handleAdd = () => {
    if(!fields.address || !selected) {
      setStatus("⚠️ Please select a valid address from the suggestions.");
      return;
    }
    onAdd({
      ...fields,
      beds:  Number(fields.beds)  || 0,
      baths: Number(fields.baths) || 0,
      sqft:  Number(String(fields.sqft).replace(/[^0-9]/g,""))  || 0,
      dom:   Number(fields.dom)   || 0,
      price: Number(String(fields.price).replace(/[^0-9]/g,"")) || 0,
      photos: fields.photos?.length
        ? fields.photos
        : ["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
    });
  };

  const clearSelection = () => {
    setSelected(null); setQuery("");
    setFields({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
    setStatus(""); setSugg([]);
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const fieldLabels = [["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"],["agent","Listing Agent"]];

  return (
    <div style={{background:"#fff", borderRadius:14, padding:16, border:`2px solid ${tourColor}40`}}>
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:14}}>
        <span style={{fontSize:20}}>🔍</span>
        <h4 style={{color:B.primary, fontSize:14, fontWeight:700, margin:0}}>Add New Listing</h4>
      </div>

      {/* Address search */}
      <div style={{position:"relative", marginBottom:10}}>
        <label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
          Property Address *
        </label>
        <div style={{position:"relative"}}>
          <input
            ref={inputRef}
            type="text"
            placeholder="Start typing an address..."
            value={query}
            onChange={e=>{ setQuery(e.target.value); setSelected(null); }}
            style={{width:"100%", border:`1.5px solid ${selected ? "#059669" : "#E5E7EB"}`,
              borderRadius:9, padding:"11px 40px 11px 12px", fontSize:14,
              outline:"none", background: selected ? "#F0FDF4" : "#fff"}}
          />
          {selected && (
            <button onClick={clearSelection}
              style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                background:"#DC2626", color:"#fff", border:"none", borderRadius:"50%",
                width:22, height:22, cursor:"pointer", fontSize:12, fontWeight:700,
                display:"flex", alignItems:"center", justifyContent:"center"}}>✕</button>
          )}
          {loading && (
            <div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)"}}>
              <div style={{width:18, height:18, border:"2px solid #E5E7EB", borderTopColor:tourColor,
                borderRadius:"50%", animation:"spin .8s linear infinite"}}/>
            </div>
          )}
        </div>

        {suggestions.length > 0 && !selected && (
          <div style={{position:"absolute", top:"100%", left:0, right:0, background:"#fff",
            border:"1.5px solid #E5E7EB", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,.15)",
            zIndex:9999, overflow:"hidden", marginTop:4}}>
            {suggestions.map((s, i) => (
              <button key={s.place_id} onClick={()=>handleSelect(s)}
                style={{width:"100%", background:"none", border:"none", borderBottom:i<suggestions.length-1?"1px solid #F3F4F6":"none",
                  padding:"12px 14px", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"flex-start", gap:10,
                  transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#F9FAFB"}
                onMouseLeave={e=>e.currentTarget.style.background="none"}>
                <span style={{fontSize:16, flexShrink:0, marginTop:1}}>📍</span>
                <div>
                  <div style={{fontWeight:600, fontSize:13, color:B.dark}}>{s.structured_formatting?.main_text}</div>
                  <div style={{fontSize:11, color:B.gray}}>{s.structured_formatting?.secondary_text}</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>

      {status && (
        <div style={{background: status.startsWith("✅") ? "#F0FDF4" : status.startsWith("❌") ? "#FEF2F2" : "#FFFBEB",
          border: `1px solid ${status.startsWith("✅") ? "#BBF7D0" : status.startsWith("❌") ? "#FECACA" : "#FDE68A"}`,
          borderRadius:8, padding:"10px 12px", fontSize:12,
          color: status.startsWith("✅") ? "#065F46" : status.startsWith("❌") ? "#DC2626" : "#92400E",
          marginBottom:10}}>
          {status}
        </div>
      )}

      {/* Manual fields — shown after address confirmed */}
      {selected && (
        <div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:12}}>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
            {fieldLabels.map(([f, label])=>(
              <div key={f}>
                <label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>{label}</label>
                <input value={fields[f]||""} onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}
                  placeholder={label}
                  style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
              </div>
            ))}
          </div>
          <div>
            <label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>City, State ZIP</label>
            <input value={fields.city||""} onChange={e=>setFields(fi=>({...fi,city:e.target.value}))}
              style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
          </div>
        </div>
      )}

      {/* Photo upload */}
      <div style={{marginBottom:12}}>
        <label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
          📸 Listing Photos
        </label>
        <label style={{display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          border:"2px dashed #D1D5DB", borderRadius:10, padding:"14px 12px",
          cursor:"pointer", background:"#FAFAFA", transition:"all .15s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=tourColor;e.currentTarget.style.background=tourColor+"10";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.background="#FAFAFA";}}>
          <span style={{fontSize:22}}>📁</span>
          <div>
            <div style={{fontWeight:600, fontSize:13, color:B.dark}}>Click to upload photos</div>
            <div style={{fontSize:11, color:B.gray}}>JPG, PNG, HEIC — multiple files OK</div>
          </div>
          <input type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={e=>{
              const files = Array.from(e.target.files);
              if(!files.length) return;
              Promise.all(files.map(f => new Promise((res,rej)=>{
                const reader = new FileReader();
                reader.onload = ev => res(ev.target.result);
                reader.onerror = rej;
                reader.readAsDataURL(f);
              }))).then(urls => {
                setFields(fi => ({ ...fi, photos: [...(fi.photos||[]), ...urls] }));
              });
            }}
          />
        </label>

        {/* Photo preview grid */}
        {fields.photos?.length > 0 && (
          <div style={{marginTop:8, display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6}}>
            {fields.photos.map((p,i)=>(
              <div key={i} style={{position:"relative", borderRadius:8, overflow:"hidden", aspectRatio:"4/3"}}>
                <img src={p} alt="" style={{width:"100%", height:"100%", objectFit:"cover"}}/>
                <button onClick={()=>setFields(fi=>({...fi,photos:fi.photos.filter((_,j)=>j!==i)}))}
                  style={{position:"absolute", top:4, right:4, background:"rgba(0,0,0,.6)",
                    color:"#fff", border:"none", borderRadius:"50%", width:20, height:20,
                    cursor:"pointer", fontSize:11, fontWeight:700, display:"flex",
                    alignItems:"center", justifyContent:"center", lineHeight:1}}>✕</button>
                {i===0 && <div style={{position:"absolute", bottom:4, left:4, background:tourColor,
                  color:"#fff", fontSize:9, fontWeight:700, borderRadius:4, padding:"2px 5px"}}>COVER</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex", gap:10}}>
        <button onClick={onCancel}
          style={{flex:1, background:B.lightGray, border:"none", borderRadius:9, padding:"11px 0", fontWeight:600, cursor:"pointer"}}>
          Cancel
        </button>
        <button onClick={handleAdd} disabled={!selected || loading}
          className="btn-hover"
          style={{flex:2, background: !selected||loading ? "#9CA3AF" : tourColor,
            color:"#fff", border:"none", borderRadius:9, padding:"11px 0",
            fontWeight:700, cursor: !selected||loading ? "default":"pointer"}}>
          {loading ? "Loading..." : "✓ Add Listing"}
        </button>
      </div>
    </div>
  );
}

/* ── TOUR DETAIL PAGE ── */
function TourDetailPage({tour,onBack,onUpdateTour,isAdmin,sponsors}) {
  const [subpage,setSubpage]=useState("list");
  const [selected,setSelected]=useState(null);
  const [showInvite,setShowInvite]=useState(false);
  const [inviteEmails,setInviteEmails]=useState("");
  const [inviteSent,setInviteSent]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showBranding,setShowBranding]=useState(false);
  const [showQR,setShowQR]=useState(false);
  const [adminListings,setAdminListings]=useState([...tour.listings].sort((a,b)=>a.order-b.order));
  const [showAddForm,setShowAddForm]=useState(false);
  const [adminNotes,setAdminNotes]=useState(tour.notes||{});

  useEffect(()=>{setAdminListings([...tour.listings].sort((a,b)=>a.order-b.order));},[tour]);

  const toggleFavorite=(listingId)=>{
    const fav={...tour.favorites,[listingId]:!tour.favorites?.[listingId]};
    onUpdateTour({...tour,favorites:fav});
  };

  const handleRatingSubmit=(listingId,ratings)=>{
    const newRatings={...tour.ratings,[listingId]:ratings};
    onUpdateTour({...tour,ratings:newRatings});
  };

  const saveNote=(listingId,note)=>{
    const notes={...adminNotes,[listingId]:note};
    setAdminNotes(notes);
    onUpdateTour({...tour,notes});
  };

  const moveStop=(idx,dir)=>{
    const arr=[...adminListings];const si=idx+dir;
    if(si<0||si>=arr.length)return;
    [arr[idx].order,arr[si].order]=[arr[si].order,arr[idx].order];
    setAdminListings([...arr].sort((a,b)=>a.order-b.order));
  };
  const addListing=(listingData)=>{
    const item={...listingData, id:Date.now(), order:adminListings.length+1};
    setAdminListings(prev=>[...prev,item]);
    setShowAddForm(false);
  };
  const deleteStop=(id)=>setAdminListings(prev=>prev.filter(l=>l.id!==id).map((l,i)=>({...l,order:i+1})));
  const saveAdmin=()=>{onUpdateTour({...tour,listings:adminListings});setShowAdmin(false);};

  if(subpage==="rating"&&selected) return <RatingPage listing={selected} tour={tour} onBack={()=>setSubpage("list")} onRatingSubmit={handleRatingSubmit}/>;
  if(subpage==="ranking") return <RankingPage tour={tour} onBack={()=>setSubpage("list")}/>;
  if(subpage==="summary") return <SummaryDashboard tour={tour} onBack={()=>setSubpage("list")}/>;

  const sorted=[...tour.listings].sort((a,b)=>a.order-b.order);
  const favCount=Object.values(tour.favorites||{}).filter(Boolean).length;
  const ratedCount=Object.keys(tour.ratings||{}).length;

  return (
    <div style={{background:B.cream,minHeight:"100vh",paddingBottom:90}}>
      {showQR&&<QRModal tour={tour} onClose={()=>setShowQR(false)}/>}
      {showBranding&&<AgentBrandingModal tour={tour} onSave={d=>{onUpdateTour({...tour,...d});setShowBranding(false);}} onClose={()=>setShowBranding(false)}/>}

      {/* Invite Modal */}
      {showInvite&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:18,padding:28,width:"100%",maxWidth:420}}>
            {inviteSent?(
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:60}}>✉️</div>
                <h3 style={{color:B.primary,fontFamily:"Georgia,serif",margin:"12px 0 6px",fontSize:22}}>Invites Sent!</h3>
                <p style={{color:B.gray,marginBottom:20}}>Attendees will receive the tour link.</p>
                <button onClick={()=>{setShowInvite(false);setInviteSent(false);setInviteEmails("");}}
                  style={{background:B.primary,color:"#fff",border:"none",borderRadius:10,padding:"12px 36px",fontWeight:700,cursor:"pointer"}}>Done</button>
              </div>
            ):(
              <>
                <h3 style={{color:B.primary,fontFamily:"Georgia,serif",marginBottom:6,fontSize:20}}>Invite to {tour.emoji} {tour.name}</h3>
                <p style={{color:B.gray,fontSize:13,marginBottom:14}}>Enter emails separated by commas or one per line.</p>
                <textarea value={inviteEmails} onChange={e=>setInviteEmails(e.target.value)}
                  placeholder={"agent@example.com\nbuyer@email.com"} rows={5}
                  style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",fontSize:14,resize:"vertical",outline:"none",background:B.cream}}/>
                <div style={{display:"flex",gap:10,marginTop:14}}>
                  <button onClick={()=>setShowInvite(false)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                  <button onClick={()=>setInviteSent(true)} style={{flex:2,background:tour.color,color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:700,cursor:"pointer"}}>Send Invites ✉️</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Admin Panel */}
      {showAdmin&&(
        <div style={{position:"fixed",inset:0,background:"#fff",zIndex:400,overflowY:"auto"}}>
          <div style={{background:tour.color,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
            <button onClick={()=>setShowAdmin(false)} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
            <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Manage: {tour.emoji} {tour.name}</div>
          </div>
          <div style={{padding:"20px 16px"}}>
            <h3 style={{color:B.primary,marginBottom:14,fontSize:13,textTransform:"uppercase",letterSpacing:.5}}>Reorder / Remove Stops</h3>
            {adminListings.map((l,i)=>(
              <div key={l.id} style={{background:B.lightGray,borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
                <div style={{background:tour.color,color:"#fff",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:B.dark}}>{l.address}</div>
                  <div style={{fontSize:11,color:B.gray}}>${Number(l.price).toLocaleString()} · {l.agent}</div>
                  {/* Admin note */}
                  <textarea placeholder="Private admin note..." rows={2}
                    value={adminNotes[l.id]||""}
                    onChange={e=>saveNote(l.id,e.target.value)}
                    style={{width:"100%",marginTop:8,border:"1.5px solid #E5E7EB",borderRadius:8,
                      padding:"6px 10px",fontSize:12,resize:"vertical",outline:"none",background:"#fff"}}/>
                </div>

function ToursDashboard({tours,setTours,isAdmin,isSuperAdmin,currentUser,onAdminLogin,onLogout,onTeamPage,sponsors}) {
  const [filterDate,setFilterDate]=useState(TODAY);
  const [showCreate,setShowCreate]=useState(false);
  const [newTour,setNewTour]=useState({name:"",time:"09:00",date:TODAY,color:"#1B3A6B",emoji:"🏡"});
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [activeTourId,setActiveTourId]=useState(null);
  const allDates=[...new Set([TODAY,...tours.map(t=>t.date)])].sort();
  const filtered=tours.filter(t=>t.date===filterDate).sort((a,b)=>a.time.localeCompare(b.time));
  const fmt12=t24=>{const[h,m]=t24.split(":");const hr=parseInt(h);const ampm=hr>=12?"PM":"AM";const hr12=hr%12||12;return `${hr12}:${m} ${ampm}`;};
  const createTour=()=>{
    if(!newTour.name)return;
    setTours(prev=>[...prev,{...newTour,id:"tour-"+Date.now(),time:fmt12(newTour.time),listings:[],ratings:{},favorites:{},notes:{},agentName:"",agentPhone:"",agentEmail:"",agentPhoto:"",brokerageName:"",brokerageLogo:""}]);
    setShowCreate(false);setNewTour({name:"",time:"09:00",date:filterDate,color:"#1B3A6B",emoji:"🏡"});
  };
  const activeTour=tours.find(t=>t.id===activeTourId);
  if(activeTour) return <TourDetailPage tour={activeTour} onBack={()=>setActiveTourId(null)} onUpdateTour={updated=>setTours(prev=>prev.map(t=>t.id===updated.id?updated:t))} isAdmin={isAdmin} sponsors={sponsors}/>;
  return (
    <div style={{background:B.cream,minHeight:"100vh",paddingBottom:90}}>
      {showCreate&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"92vh",overflowY:"auto"}}>
            <h3 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:20,marginBottom:20}}>➕ Create New Tour</h3>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:6}}>Tour Name *</label>
                <input value={newTour.name} onChange={e=>setNewTour(n=>({...n,name:e.target.value}))} placeholder="e.g. Morning Tour, VIP Buyers..."
                  style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",fontSize:15,outline:"none",background:B.cream}}/>
              </div>
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1}}>
                  <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:6}}>Date</label>
                  <input type="date" value={newTour.date} onChange={e=>setNewTour(n=>({...n,date:e.target.value}))}

                  <input type="time" value={newTour.time} onChange={e=>setNewTour(n=>({...n,time:e.target.value}))}
                    style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"11px 10px",fontSize:14,outline:"none",background:B.cream}}/>

                    <button key={e} onClick={()=>setNewTour(n=>({...n,emoji:e}))} style={{width:42,height:42,borderRadius:10,fontSize:22,cursor:"pointer",border:newTour.emoji===e?`2px solid ${B.primary}`:"2px solid #E5E7EB",background:newTour.emoji===e?"#EFF6FF":"#fff"}}>{e}</button>

                  {["#1B3A6B","#7C3AED","#059669","#DC2626","#D97706","#0891B2","#BE185D","#475569"].map(c=>(
                    <button key={c} onClick={()=>setNewTour(n=>({...n,color:c}))} style={{width:36,height:36,borderRadius:"50%",background:c,border:"none",cursor:"pointer",outline:newTour.color===c?`3px solid ${c}`:"none",outlineOffset:3}}/>

              </div>
              <div style={{background:newTour.color,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:26}}>{newTour.emoji}</span>
                <div>
                  <div style={{color:"#fff",fontFamily:"Georgia,serif",fontWeight:700,fontSize:16}}>{newTour.name||"Tour Name"}</div>
                  <div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>{fmt12(newTour.time)} · {new Date(newTour.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button onClick={()=>setShowCreate(false)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                <button onClick={createTour} className="btn-hover" style={{flex:2,background:newTour.color,color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:700,cursor:"pointer"}}>Create Tour</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {confirmDelete&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
            <h3 style={{color:B.dark,fontSize:18,marginBottom:8}}>Delete this tour?</h3>
            <p style={{color:B.gray,fontSize:14,marginBottom:24}}>This will permanently remove the tour and all its listings.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>{setTours(prev=>prev.filter(t=>t.id!==confirmDelete));setConfirmDelete(null);}} style={{flex:1,background:"#DC2626",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,cursor:"pointer"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
      <div style={{background:B.primary,padding:"18px 18px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingBottom:14}}>
          <div>
            <div style={{color:B.gold,fontSize:10,textTransform:"uppercase",letterSpacing:2,fontWeight:700}}>Great American Title Agency</div>
            <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:20,fontWeight:700,marginTop:2}}>Home Tours</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {isAdmin?(
              <>
                {isSuperAdmin&&<button onClick={onTeamPage} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:8,padding:"8px 11px",cursor:"pointer",fontSize:13,fontWeight:600}}>👥</button>}
                <button onClick={()=>setShowCreate(true)} style={{background:B.gold,border:"none",color:"#fff",borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:13,fontWeight:700}}>+ New Tour</button>
                <button onClick={onLogout} title={`Sign out (${currentUser?.name||""})`} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",borderRadius:8,padding:"8px 11px",cursor:"pointer",fontSize:15}}>↩</button>
              </>
            ):(
              <button onClick={onAdminLogin} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:12,fontWeight:600}}>🔐 Login</button>
            )}
          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto",paddingBottom:0}}>
          {allDates.map(date=>(
            <button key={date} onClick={()=>setFilterDate(date)}
              style={{background:"none",border:"none",borderBottom:filterDate===date?`3px solid ${B.gold}`:"3px solid transparent",
                color:filterDate===date?"#fff":"rgba(255,255,255,.55)",fontWeight:filterDate===date?700:500,
                fontSize:12,padding:"8px 16px 10px",cursor:"pointer",whiteSpace:"nowrap"}}>
              {date===TODAY?"Today":new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"20px 14px",display:"flex",flexDirection:"column",gap:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:B.gray,fontSize:13}}>{filtered.length} {filtered.length===1?"tour":"tours"} scheduled{isAdmin&&<span style={{color:B.gold,marginLeft:6}}>· {isSuperAdmin?"👑 Super Admin":`👤 ${currentUser?.name||"Sub-Admin"}`}</span>}</span>
          <span style={{color:B.primary,fontWeight:600,fontSize:13}}>{new Date(filterDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
        </div>
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"60px 20px",color:B.gray}}>
            <div style={{fontSize:56,marginBottom:16}}>📅</div>
            <h3 style={{color:B.primary,fontFamily:"Georgia,serif",marginBottom:8}}>No tours scheduled</h3>
            <p style={{fontSize:14}}>{isAdmin?'Tap "+ New Tour" to create one.':"Check with your admin for the schedule."}</p>
          </div>
        )}
        {filtered.map(tour=>{
          const ratedCount=Object.keys(tour.ratings||{}).length;
          const favCount=Object.values(tour.favorites||{}).filter(Boolean).length;
          return (
            <div key={tour.id} className="card-hover" style={{background:"#fff",borderRadius:18,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,.08)",border:"1px solid rgba(0,0,0,.05)"}}>
              <div style={{background:tour.color,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:30}}>{tour.emoji}</div>
                  <div>
                    <div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:18,fontWeight:700}}>{tour.name}</div>
                    <div style={{color:"rgba(255,255,255,.75)",fontSize:12}}>🕐 {tour.time} · {tour.listings.length} stops · {ratedCount} rated · ❤️ {favCount}</div>
                  </div>
                </div>
                {isAdmin&&<button onClick={e=>{e.stopPropagation();setConfirmDelete(tour.id);}} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:18}}>🗑️</button>}
              </div>
              {tour.listings.length>0&&(
                <div style={{display:"flex",overflowX:"auto",padding:"12px 14px",background:B.lightGray}}>
                  {[...tour.listings].sort((a,b)=>a.order-b.order).map((l,i)=>(
                    <div key={l.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:72,marginRight:10}}>
                      <div style={{position:"relative"}}>
                        <img src={l.photos[0]} alt="" style={{width:64,height:50,objectFit:"cover",borderRadius:8,display:"block"}}/>
                        <div style={{position:"absolute",top:3,left:3,background:tour.color,color:"#fff",borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:800}}>#{i+1}</div>
                        {tour.favorites?.[l.id]&&<div style={{position:"absolute",top:2,right:2,fontSize:10}}>❤️</div>}
                      </div>
                      <div style={{fontSize:9,color:B.gray,textAlign:"center",maxWidth:68,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.address.split(" ").slice(0,3).join(" ")}</div>
                    </div>
                  ))}
                </div>
              )}
              <div style={{padding:"14px 18px"}}>
                <button className="btn-hover" onClick={()=>setActiveTourId(tour.id)}
                  style={{width:"100%",background:tour.color,color:"#fff",border:"none",borderRadius:12,padding:"13px 0",fontWeight:700,fontSize:15,cursor:"pointer",boxShadow:`0 4px 14px ${tour.color}66`}}>
                  Open Tour →
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── TEAM PAGE ── */
function TeamPage({subAdmins,setSubAdmins,onBack}) {
  const [showAdd,setShowAdd]=useState(false);
  const [newUser,setNewUser]=useState({name:"",email:"",password:""});
  const [confirmDel,setConfirmDel]=useState(null);
  const [addError,setAddError]=useState("");
  const [editId,setEditId]=useState(null);
  const [editDraft,setEditDraft]=useState({});
  const [showPasses,setShowPasses]=useState({});
  const addUser=()=>{
    if(!newUser.name||!newUser.email||!newUser.password){setAddError("All fields required.");return;}
    if(newUser.email.toLowerCase()===SUPER_ADMIN.email.toLowerCase()||subAdmins.find(u=>u.email?.toLowerCase()===newUser.email.toLowerCase())){setAddError("Username already taken.");return;}
    const nu = {...newUser, id:"sub-"+Date.now(), role:"sub", username: newUser.email.split("@")[0]};
    setSubAdmins(prev=>[...prev, nu]);
    setNewUser({name:"",email:"",password:""});
    setShowAdd(false); setAddError("");
    sendWelcomeEmail(nu.name, nu.email, nu.password);
  };
  const saveEdit=(id)=>{
    if(!editDraft.name||!editDraft.username||!editDraft.password)return;
    setSubAdmins(prev=>prev.map(u=>u.id===id?{...u,...editDraft}:u));setEditId(null);
  };
  return (
    <div style={{background:B.cream,minHeight:"100vh",paddingBottom:90}}>
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
            <h3 style={{color:B.dark,fontSize:18,marginBottom:8}}>Remove this team member?</h3>
            <p style={{color:B.gray,fontSize:14,marginBottom:24}}>They will immediately lose access.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDel(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>{setSubAdmins(prev=>prev.filter(u=>u.id!==confirmDel));setConfirmDel(null);}} style={{flex:1,background:"#DC2626",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,cursor:"pointer"}}>Remove</button>
            </div>
          </div>
        </div>
      )}
      <div style={{background:B.primary,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
        <div><div style={{color:B.gold,fontSize:10,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>Super Admin</div><div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Team Management</div></div>
      </div>
      <div style={{padding:"20px 16px"}}>
        <div style={{background:"linear-gradient(135deg,#1B3A6B,#0f2347)",borderRadius:14,padding:"16px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
          <div style={{background:B.gold,borderRadius:"50%",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👑</div>
          <div><div style={{color:"#fff",fontWeight:700,fontSize:15}}>{SUPER_ADMIN.name}</div><div style={{color:B.lightGold,fontSize:12}}>@{SUPER_ADMIN.username} · Super Admin</div><div style={{color:"rgba(255,255,255,.5)",fontSize:11,marginTop:2}}>Full access · Cannot be removed</div></div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div><h3 style={{color:B.primary,fontSize:15,fontWeight:700}}>Team Members</h3><p style={{color:B.gray,fontSize:12,marginTop:2}}>{subAdmins.length} sub-admin{subAdmins.length!==1?"s":""}</p></div>
          <button onClick={()=>{setShowAdd(true);setAddError("");}} style={{background:B.gold,color:"#fff",border:"none",borderRadius:9,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add Member</button>
        </div>
        {showAdd&&(
          <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,.1)",border:`2px solid ${B.gold}`}}>
            <h4 style={{color:B.primary,fontSize:14,fontWeight:700,marginBottom:14}}>New Team Member</h4>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[["name","Full Name","text"],["email","Email Address","email"],["password","Password","password"]].map(([f,ph,t])=>(
                <div key={f} style={{position:"relative"}}>
                  <input type={t==="password"&&showPasses["new"]?"text":t} placeholder={ph} value={newUser[f]}
                    onChange={e=>{setNewUser(n=>({...n,[f]:e.target.value}));setAddError("");}}
                    style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:t==="password"?"10px 40px 10px 12px":"10px 12px",fontSize:14,outline:"none",background:B.cream}}/>
                  {t==="password"&&<button onClick={()=>setShowPasses(p=>({...p,new:!p.new}))} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.gray}}>{showPasses["new"]?"🙈":"👁️"}</button>}
                </div>
              ))}
              {addError&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"8px 12px",color:"#DC2626",fontSize:13}}>⚠️ {addError}</div>}
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button onClick={()=>{setShowAdd(false);setNewUser({name:"",username:"",password:""});setAddError("");}} style={{flex:1,background:B.lightGray,border:"none",borderRadius:9,padding:11,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                <button onClick={addUser} className="btn-hover" style={{flex:2,background:B.primary,color:"#fff",border:"none",borderRadius:9,padding:11,fontWeight:700,cursor:"pointer"}}>Add Member</button>
              </div>
            </div>
          </div>
        )}
        {subAdmins.length===0&&!showAdd&&<div style={{textAlign:"center",padding:"40px 20px",color:B.gray}}><div style={{fontSize:44,marginBottom:12}}>👥</div><p>No team members yet.</p></div>}
        {subAdmins.map(u=>(
          <div key={u.id} style={{background:"#fff",borderRadius:14,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}>
            {editId===u.id?(
              <div style={{padding:"16px"}}>
                <h4 style={{color:B.primary,fontSize:13,fontWeight:700,marginBottom:12,textTransform:"uppercase",letterSpacing:.4}}>Edit Member</h4>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[["name","Full Name","text"],["username","Username","text"],["password","Password","password"]].map(([f,ph,t])=>(
                    <div key={f} style={{position:"relative"}}>
                      <input type={t==="password"&&showPasses[u.id]?"text":t} placeholder={ph} value={editDraft[f]||""}
                        onChange={e=>setEditDraft(d=>({...d,[f]:e.target.value}))}
                        style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:t==="password"?"10px 40px 10px 12px":"10px 12px",fontSize:14,outline:"none",background:B.cream}}/>
                      {t==="password"&&<button onClick={()=>setShowPasses(p=>({...p,[u.id]:!p[u.id]}))} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.gray}}>{showPasses[u.id]?"🙈":"👁️"}</button>}
                    </div>
                  ))}
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setEditId(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:9,padding:11,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                    <button onClick={()=>saveEdit(u.id)} className="btn-hover" style={{flex:2,background:B.primary,color:"#fff",border:"none",borderRadius:9,padding:11,fontWeight:700,cursor:"pointer"}}>Save</button>
                  </div>
                </div>
              </div>
            ):(
              <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}>
                <div style={{background:`${B.primary}18`,borderRadius:"50%",width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👤</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:B.dark}}>{u.name}</div><div style={{fontSize:12,color:B.gray}}>{u.email} · Sub-Admin</div></div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setEditId(u.id);setEditDraft({name:u.name,username:u.username,password:u.password});}} style={{background:B.lightGray,border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:600,color:B.primary}}>Edit</button>
                  <button onClick={()=>setConfirmDel(u.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:700,color:"#DC2626"}}>Remove</button>
                </div>
              </div>
            )}
          </div>
        ))}
        <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",marginTop:8,border:"1px solid #E5E7EB"}}>
          <h4 style={{color:B.primary,fontSize:13,fontWeight:700,marginBottom:10}}>🔐 Permission Levels</h4>
          {[["👑","Super Admin (You)","Create tours · Manage listings · Edit sponsors · Add/remove team · Full access"],["👤","Sub-Admin (Team)","Create tours · Manage listings · Invite attendees · View rankings & summary"]].map(([icon,label,desc])=>(
            <div key={label} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
              <span style={{fontSize:18,flexShrink:0,marginTop:1}}>{icon}</span>
              <div><div style={{fontWeight:700,fontSize:13,color:B.dark}}>{label}</div><div style={{fontSize:11,color:B.gray,lineHeight:1.5,marginTop:2}}>{desc}</div></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

            <h3 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:22,marginBottom:8}}>Message Sent!</h3>
            <p style={{color:B.gray,marginBottom:24}}>We'll follow up at {form.email||"your email"}.</p>
            <button onClick={onBack} style={{background:B.primary,color:"#fff",border:"none",borderRadius:10,padding:"13px 36px",fontWeight:700,cursor:"pointer"}}>Back to Tours</button>
          </div>
        ):(
          <div style={{background:"#fff",borderRadius:16,padding:"20px 18px",display:"flex",flexDirection:"column",gap:12}}>
            <h3 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:18,marginBottom:4}}>Send a Message</h3>
            {[["name","Your Name *","text"],["email","Email Address *","email"],["phone","Phone Number","tel"]].map(([f,ph,t])=>(
              <input key={f} type={t} placeholder={ph} value={form[f]} onChange={e=>setForm(v=>({...v,[f]:e.target.value}))}
                style={{border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",fontSize:15,outline:"none",background:B.cream}}/>
            ))}
            <textarea placeholder="Your message..." value={form.message} onChange={e=>setForm(v=>({...v,message:e.target.value}))} rows={5}
              style={{border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",fontSize:15,resize:"vertical",outline:"none",background:B.cream}}/>
            <button onClick={()=>{if(form.name&&form.email&&form.message)setSent(true);}} className="btn-hover"
              style={{background:B.primary,color:"#fff",border:"none",borderRadius:10,padding:"15px 0",fontWeight:700,fontSize:16,cursor:"pointer"}}>Send Message</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ROOT ── */
function App() {
  const [tours,setTours]=useState(INITIAL_TOURS);
  const [sponsors,setSponsors]=useState(INITIAL_SPONSORS);
  const [subAdmins,setSubAdmins]=useState(()=>{
    try {
      const saved = localStorage.getItem("gat_subadmins");
      return saved ? JSON.parse(saved) : INITIAL_SUBADMINS;
    } catch(e) { return INITIAL_SUBADMINS; }
  });

  // Persist subAdmins to localStorage whenever they change
  useEffect(()=>{
    try { localStorage.setItem("gat_subadmins", JSON.stringify(subAdmins)); } catch(e) {}
  }, [subAdmins]);
  const [page,setPage]=useState("dashboard");
  const [currentUser,setCurrentUser]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const isSuperAdmin=currentUser?.role==="super";
  const isAnyAdmin=!!currentUser;
  useEffect(()=>{
    try{const s=sessionStorage.getItem("gat_session");if(s){const p=JSON.parse(s);if(p.role==="super"&&p.username===SUPER_ADMIN.username)setCurrentUser(p);else if(INITIAL_SUBADMINS.find(u=>u.username===p.username))setCurrentUser(p);else sessionStorage.removeItem("gat_session");}}catch(e){sessionStorage.removeItem("gat_session");}
  },[]);
  const handleLogout=()=>{sessionStorage.removeItem("gat_session");setCurrentUser(null);setPage("dashboard");};
  return (
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
      {showLogin&&!currentUser&&<LoginPage onLogin={u=>{setCurrentUser(u);setShowLogin(false);}} onClose={()=>setShowLogin(false)} subAdmins={subAdmins}/>}
      {page==="dashboard"&&<ToursDashboard tours={tours} setTours={setTours} isAdmin={isAnyAdmin} isSuperAdmin={isSuperAdmin} currentUser={currentUser} onAdminLogin={()=>setShowLogin(true)} onLogout={handleLogout} onTeamPage={()=>setPage("team")} sponsors={sponsors}/>}
      {page==="sponsors"&&<SponsorsPage sponsors={sponsors} setSponsors={setSponsors} isAdmin={isSuperAdmin}/>}
      {page==="team"&&isSuperAdmin&&<TeamPage subAdmins={subAdmins} setSubAdmins={setSubAdmins} onBack={()=>setPage("dashboard")}/>}
      {page==="contact"&&<ContactPage onBack={()=>setPage("dashboard")}/>}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E5E7EB",display:"flex",padding:"10px 0 16px",boxShadow:"0 -4px 16px rgba(0,0,0,.07)",zIndex:200}}>
        <button onClick={()=>setPage("dashboard")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="dashboard"?B.primary:B.gray,fontWeight:page==="dashboard"?700:500,fontSize:11}}><span style={{fontSize:20}}>🗓️</span>Tours</button>
        <a href="https://www.azgat.com/get-gat-app/" target="_blank" style={{flex:1,textDecoration:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:B.gray,fontWeight:500,fontSize:11}}><span style={{fontSize:20}}>📊</span>Estimates</a>
        <button onClick={()=>setPage("sponsors")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="sponsors"?B.primary:B.gray,fontWeight:page==="sponsors"?700:500,fontSize:11}}><span style={{fontSize:20}}>⭐</span>Sponsors</button>
        <button onClick={()=>setPage("contact")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="contact"?B.primary:B.gray,fontWeight:page==="contact"?700:500,fontSize:11}}><span style={{fontSize:20}}>✉️</span>Contact</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
