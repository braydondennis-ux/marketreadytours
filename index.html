function AddListingForm({ tourColor, onAdd, onCancel }) {
const [query, setQuery]       = useState("");

const [loading, setLoading]   = useState(false);
const [status, setStatus]     = useState("");
const [sessionToken, setToken]= useState(null);
const inputRef = useRef(null);
useEffect(()=>{
if(window.google?.maps?.places) {
setToken(new window.google.maps.places.AutocompleteSessionToken());
}
},[]);
useEffect(()=>{
if(!query || query.length < 3 || !window.google?.maps?.places || selected) {
setSugg([]); return;
}
const svc = new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({
input: query,
sessionToken,
types: ["address"],
componentRestrictions: { country: "us" },
}, (predictions, status) => {
if(status === window.google.maps.places.PlacesServiceStatus.OK && predictions) {
setSugg(predictions);
} else {
setSugg([]);
}
});
}, [query]);
const handleSelect = (prediction) => {
setSugg([]);
setLoading(true);
setStatus("📍 Confirming address...");
const map = new window.google.maps.Map(document.createElement("div"));
const svc = new window.google.maps.places.PlacesService(map);
svc.getDetails({
placeId: prediction.place_id,
fields: ["address_components", "formatted_address", "geometry"],
sessionToken,
}, (place, st) => {
if(st !== window.google.maps.places.PlacesServiceStatus.OK || !place) {
setStatus("❌ Could not get address details. Please try again.");
setLoading(false); return;
}
const get = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.long_name : "";
};
const getShort = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.short_name : "";
};
const streetNum  = get("street_number");
const streetName = get("route");
const city       = get("locality") || get("sublocality");
const state      = getShort("administrative_area_level_1");
const zip        = get("postal_code");
const address    = `${streetNum} ${streetName}`.trim();
const cityStr    = `${city}, ${state} ${zip}`.trim();
setQuery(address);
setSelected(prediction.place_id);
setToken(new window.google.maps.places.AutocompleteSessionToken());
setFields(f => ({ ...f, address, city: cityStr }));
setStatus("✅ Address confirmed! Fill in listing details below.");
setLoading(false);
});
};
const handleAdd = () => {
if(!fields.address || !selected) {
setStatus("⚠️ Please select a valid address from the suggestions.");
return;
}
onAdd({
...fields,
beds:  Number(fields.beds)  || 0,
baths: Number(fields.baths) || 0,
sqft:  Number(String(fields.sqft).replace(/[^0-9]/g,""))  || 0,
dom:   Number(fields.dom)   || 0,
price: Number(String(fields.price).replace(/[^0-9]/g,"")) || 0,
photos: fields.photos?.length
? fields.photos
: ["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
});
};
const clearSelection = () => {
setSelected(null); setQuery("");
setFields({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
setStatus(""); setSugg([]);
setTimeout(() => inputRef.current?.focus(), 100);
};
const fieldLabels = [["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"],["agent","Listing Agent"]];
return (
<div style={{background:"#fff", borderRadius:14, padding:16, border:`2px solid ${tourColor}40`}}>

{selected && (

{suggestions.length > 0 && !selected && (

{status}

{/* Manual fields — shown after address confirmed */}
{selected && (

const [confirmDelete,setConfirmDelete]=useState(null);
const [activeTourId,setActiveTourId]=useState(null);
const pastDates=[...new Set(tours.map(t=>t.date).filter(d=>d<TODAY))].sort();
const allDateTabs=["upcoming",...pastDates];
const filtered=(filterDate==="upcoming"?tours.filter(t=>t.date>=TODAY):tours.filter(t=>t.date===filterDate)).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
const fmt12=t24=>{const[h,m]=t24.split(":");const hr=parseInt(h);const ampm=hr>=12?"PM":"AM";const hr12=hr%12||12;return `${hr12}:${m} ${ampm}`;};
const createTour=()=>{
if(!newTour.name)return;
setTours(prev=>[...prev,{...newTour,id:"tour-"+Date.now(),time:fmt12(newTour.time),listings:[],ratings:{},favorites:{},notes:{},agentName:"",agentPhone:"",agentEmail:"",agentPhoto:"",brokerageName:"",brokerageLogo:""}]);
setShowCreate(false);setNewTour({name:"",time:"09:00",date:filterDate==="upcoming"?TODAY:filterDate,color:"#1B3A6B",emoji:"🏡"});
};
const activeTour=tours.find(t=>t.id===activeTourId);
if(activeTour) return <TourDetailPage tour={activeTour} onBack={()=>setActiveTourId(null)} onUpdateTour={updated=>setTours(prev=>prev.map(t=>t.id===updated.id?updated:t))} isAdmin={isAdmin} sponsors={sponsors}/>;
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:90}}>
{showCreate&&(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
<div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,.3)",maxHeight:"92vh",overflowY:"auto"}}>
<h3 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:20,marginBottom:20}}>➕ Create New Tour</h3>
<div style={{display:"flex",flexDirection:"column",gap:14}}>
<div>
<label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:6}}>Tour Name *</label>
<input value={newTour.name} onChange={e=>setNewTour(n=>({...n,name:e.target.value}))} placeholder="e.g. Morning Tour, VIP Buyers..."
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",fontSize:15,outline:"none",background:B.cream}}/>
</div>
<div style={{display:"flex",gap:12}}>
<div style={{flex:1}}>
<label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:6}}>Date</label>
<input type="date" value={newTour.date} onChange={e=>setNewTour(n=>({...n,date:e.target.value}))}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"11px 10px",fontSize:14,outline:"none",background:B.cream}}/>
</div>
<div style={{flex:1}}>
<label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:6}}>Start Time</label>
<input type="time" value={newTour.time} onChange={e=>setNewTour(n=>({...n,time:e.target.value}))}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"11px 10px",fontSize:14,outline:"none",background:B.cream}}/>
</div>
</div>
<div>
<label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:8}}>Icon</label>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
{["🌅","☀️","🌇","🌆","🏡","🗺️","🔑","⭐","🏘️","🎯"].map(e=>(
<button key={e} onClick={()=>setNewTour(n=>({...n,emoji:e}))} style={{width:42,height:42,borderRadius:10,fontSize:22,cursor:"pointer",border:newTour.emoji===e?`2px solid ${B.primary}`:"2px solid #E5E7EB",background:newTour.emoji===e?"#EFF6FF":"#fff"}}>{e}</button>
))}
</div>
</div>
<div>
<label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:B.gray,marginBottom:8}}>Color</label>
<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
{["#1B3A6B","#7C3AED","#059669","#DC2626","#D97706","#0891B2","#BE185D","#475569"].map(c=>(
<button key={c} onClick={()=>setNewTour(n=>({...n,color:c}))} style={{width:36,height:36,borderRadius:"50%",background:c,border:"none",cursor:"pointer",outline:newTour.color===c?`3px solid ${c}`:"none",outlineOffset:3}}/>
))}
</div>
</div>
<div style={{background:newTour.color,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
<span style={{fontSize:26}}>{newTour.emoji}</span>
<div>
<div style={{color:"#fff",fontFamily:"Georgia,serif",fontWeight:700,fontSize:16}}>{newTour.name||"Tour Name"}</div>
<div style={{color:"rgba(255,255,255,.7)",fontSize:12}}>{fmt12(newTour.time)} · {new Date(newTour.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
</div>
</div>
<div style={{display:"flex",gap:10,marginTop:4}}>
<button onClick={()=>setShowCreate(false)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
<button onClick={createTour} className="btn-hover" style={{flex:2,background:newTour.color,color:"#fff",border:"none",borderRadius:10,padding:13,fontWeight:700,cursor:"pointer"}}>Create Tour</button>
</div>
</div>
</div>
</div>
)}
{confirmDelete&&(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
<div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:360,textAlign:"center"}}>
<div style={{fontSize:48,marginBottom:12}}>🗑️</div>
<h3 style={{color:B.dark,fontSize:18,marginBottom:8}}>Delete this tour?</h3>
<p style={{color:B.gray,fontSize:14,marginBottom:24}}>This will permanently remove the tour and all its listings.</p>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>setConfirmDelete(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
<button onClick={()=>{setTours(prev=>prev.filter(t=>t.id!==confirmDelete));setConfirmDelete(null);}} style={{flex:1,background:"#DC2626",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,cursor:"pointer"}}>Delete</button>
</div>
</div>
</div>
)}
<div style={{background:B.primary,padding:"9px 18px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
<div style={{paddingBottom:14}}>
<div style={{display:"flex",justifyContent:"flex-start"}}>
<img src={window.MRT_LOGO_DATA} alt="MarketReady Tours" style={{height:136,objectFit:"contain",borderRadius:8}}/>
</div>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:2}}>
<div style={{color:"rgba(255,255,255,.7)",fontFamily:"Georgia,serif",fontSize:15,fontWeight:400,letterSpacing:1.5,textTransform:"uppercase",lineHeight:1.4}}><span style={{fontSize:20,fontWeight:700}}>#1</span> Real Estate<br/>Home Tours App</div>
<div style={{display:"flex",gap:8}}>
{isAdmin?(
<>
{isSuperAdmin&&<button onClick={onTeamPage} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:8,padding:"8px 11px",cursor:"pointer",fontSize:13,fontWeight:600}}>👥</button>}
{isAdmin&&<button onClick={onRequestsPage} style={{position:"relative",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:8,padding:"8px 11px",cursor:"pointer",fontSize:13,fontWeight:600}}>
📋{listingRequests?.filter(r=>r.status==="pending").length>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#DC2626",color:"#fff",borderRadius:"50%",fontSize:9,fontWeight:800,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{listingRequests.filter(r=>r.status==="pending").length}</span>}
</button>}
<button onClick={()=>setShowCreate(true)} style={{background:B.gold,border:"none",color:"#fff",borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:13,fontWeight:700}}>+ New Tour</button>
<button onClick={onLogout} title={`Sign out (${currentUser?.name||""})`} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",borderRadius:8,padding:"8px 11px",cursor:"pointer",fontSize:15}}>↩</button>
</>
):(
<button onClick={onAdminLogin} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:12,fontWeight:600}}>🔐 Login</button>
)}
</div>
</div>
</div>
<div style={{display:"flex",overflowX:"auto",paddingBottom:0}}>
{allDateTabs.map(date=>(
<button key={date} onClick={()=>setFilterDate(date)}
style={{background:"none",border:"none",borderBottom:filterDate===date?`3px solid ${B.gold}`:"3px solid transparent",
color:filterDate===date?"#fff":"rgba(255,255,255,.55)",fontWeight:filterDate===date?700:500,
fontSize:12,padding:"8px 16px 10px",cursor:"pointer",whiteSpace:"nowrap"}}>
{date==="upcoming"?`Upcoming (${tours.filter(t=>t.date>=TODAY).length})`:new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
</button>
))}
</div>
</div>
<div style={{padding:"20px 14px",display:"flex",flexDirection:"column",gap:16}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{color:B.gray,fontSize:13}}>{filtered.length} {filtered.length===1?"tour":"tours"} {filterDate==="upcoming"?"upcoming":"scheduled"}{isAdmin&&<span style={{color:B.gold,marginLeft:6}}>· {isSuperAdmin?"👑 Super Admin":`👤 ${currentUser?.name||"Sub-Admin"}`}</span>}</span>
<span style={{color:B.primary,fontWeight:600,fontSize:13}}>{filterDate==="upcoming"?"Today & Future":new Date(filterDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
</div>
{filtered.length===0&&(
<div style={{textAlign:"center",padding:"60px 20px",color:B.gray}}>
<div style={{fontSize:56,marginBottom:16}}>📅</div>
<h3 style={{color:B.primary,fontFamily:"Georgia,serif",marginBottom:8}}>No tours scheduled</h3>
<p style={{fontSize:14}}>{isAdmin?'Tap "+ New Tour" to create one.':"Check with your admin for the schedule."}</p>
</div>
)}
{filtered.map(tour=>{
const ratedCount=Object.keys(tour.ratings||{}).length;
const favCount=Object.values(tour.favorites||{}).filter(Boolean).length;
return (
<div key={tour.id} className="card-hover" style={{background:"#fff",borderRadius:18,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,.08)",border:"1px solid rgba(0,0,0,.05)"}}>
<div style={{background:tour.color,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
<div style={{display:"flex",alignItems:"center",gap:14}}>
<div style={{fontSize:30}}>{tour.emoji}</div>
<div>
<div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:18,fontWeight:700}}>{tour.name}</div>
<div style={{color:"rgba(255,255,255,.75)",fontSize:12}}>🕐 {tour.time} · {filterDate==="upcoming"&&tour.date!==TODAY?new Date(tour.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})+" · ":tour.date===TODAY&&filterDate==="upcoming"?"Today · ":""}{tour.listings.length} stops · {ratedCount} rated · ❤️ {favCount}</div>
</div>
</div>
{isAdmin&&<button onClick={e=>{e.stopPropagation();setConfirmDelete(tour.id);}} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:18}}>🗑️</button>}
</div>
{tour.listings.length>0&&(
<div style={{display:"flex",overflowX:"auto",padding:"12px 14px",background:B.lightGray}}>
{[...tour.listings].sort((a,b)=>a.order-b.order).map((l,i)=>(
<div key={l.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:72,marginRight:10}}>
<div style={{position:"relative"}}>
<img src={l.photos[0]} alt="" style={{width:64,height:50,objectFit:"cover",borderRadius:8,display:"block"}}/>
<div style={{position:"absolute",top:3,left:3,background:tour.color,color:"#fff",borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:800}}>#{i+1}</div>
{tour.favorites?.[l.id]&&<div style={{position:"absolute",top:2,right:2,fontSize:10}}>❤️</div>}
</div>
<div style={{fontSize:9,color:B.gray,textAlign:"center",maxWidth:68,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.address.split(" ").slice(0,3).join(" ")}</div>
</div>
))}
</div>
)}
<div style={{padding:"14px 18px"}}>
<button className="btn-hover" onClick={()=>setActiveTourId(tour.id)}
style={{width:"100%",background:tour.color,color:"#fff",border:"none",borderRadius:12,padding:"13px 0",fontWeight:700,fontSize:15,cursor:"pointer",boxShadow:`0 4px 14px ${tour.color}66`}}>
Open Tour →
</button>
</div>
</div>
);
})}
</div>
</div>
);
}
/* ── TEAM PAGE ── */
function TeamPage({subAdmins,setSubAdmins,onBack}) {
const [showAdd,setShowAdd]=useState(false);
const [newUser,setNewUser]=useState({name:"",email:"",password:""});
const [confirmDel,setConfirmDel]=useState(null);
const [addError,setAddError]=useState("");
const [editId,setEditId]=useState(null);
const [editDraft,setEditDraft]=useState({});
const [showPasses,setShowPasses]=useState({});
const addUser=()=>{
if(!newUser.name||!newUser.email||!newUser.password){setAddError("All fields required.");return;}
if(newUser.email.toLowerCase()===SUPER_ADMIN.email.toLowerCase()||subAdmins.find(u=>u.email?.toLowerCase()===newUser.email.toLowerCase())){setAddError("Username already taken.");return;}
const nu = {...newUser, id:"sub-"+Date.now(), role:"sub", username: newUser.email.split("@")[0]};
setSubAdmins(prev=>[...prev, nu]);
setNewUser({name:"",email:"",password:""});
setShowAdd(false); setAddError("");
sendWelcomeEmail(nu.name, nu.email, nu.password);
};
const saveEdit=(id)=>{
if(!editDraft.name||!editDraft.username||!editDraft.password)return;
setSubAdmins(prev=>prev.map(u=>u.id===id?{...u,...editDraft}:u));setEditId(null);
};
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:90}}>
{confirmDel&&(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
<div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:360,textAlign:"center"}}>
<div style={{fontSize:44,marginBottom:12}}>⚠️</div>
<h3 style={{color:B.dark,fontSize:18,marginBottom:8}}>Remove this team member?</h3>
<p style={{color:B.gray,fontSize:14,marginBottom:24}}>They will immediately lose access.</p>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>setConfirmDel(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
<button onClick={()=>{setSubAdmins(prev=>prev.filter(u=>u.id!==confirmDel));setConfirmDel(null);}} style={{flex:1,background:"#DC2626",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,cursor:"pointer"}}>Remove</button>
</div>
</div>
</div>
)}
<div style={{background:B.primary,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
<div><div style={{color:B.gold,fontSize:10,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>Super Admin</div><div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Team Management</div></div>
<img src={window.MRT_LOGO_DATA} alt="MarketReady Tours" style={{height:40,objectFit:"contain",borderRadius:6,marginLeft:"auto"}}/>
</div>
<div style={{padding:"20px 16px"}}>
<div style={{background:"linear-gradient(135deg,#1B3A6B,#0f2347)",borderRadius:14,padding:"16px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
<div style={{background:B.gold,borderRadius:"50%",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👑</div>
<div><div style={{color:"#fff",fontWeight:700,fontSize:15}}>{SUPER_ADMIN.name}</div><div style={{color:B.lightGold,fontSize:12}}>@{SUPER_ADMIN.username} · Super Admin</div><div style={{color:"rgba(255,255,255,.5)",fontSize:11,marginTop:2}}>Full access · Cannot be removed</div></div>
</div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
<div><h3 style={{color:B.primary,fontSize:15,fontWeight:700}}>Team Members</h3><p style={{color:B.gray,fontSize:12,marginTop:2}}>{subAdmins.length} sub-admin{subAdmins.length!==1?"s":""}</p></div>
<button onClick={()=>{setShowAdd(true);setAddError("");}} style={{background:B.gold,color:"#fff",border:"none",borderRadius:9,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add Member</button>
</div>
{showAdd&&(
<div style={{background:"#fff",borderRadius:14,padding:"18px 16px",marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,.1)",border:`2px solid ${B.gold}`}}>
<h4 style={{color:B.primary,fontSize:14,fontWeight:700,marginBottom:14}}>New Team Member</h4>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{[["name","Full Name","text"],["email","Email Address","email"],["password","Password","password"]].map(([f,ph,t])=>(
<div key={f} style={{position:"relative"}}>
<input type={t==="password"&&showPasses["new"]?"text":t} placeholder={ph} value={newUser[f]}
onChange={e=>{setNewUser(n=>({...n,[f]:e.target.value}));setAddError("");}}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:t==="password"?"10px 40px 10px 12px":"10px 12px",fontSize:14,outline:"none",background:B.cream}}/>
{t==="password"&&<button onClick={()=>setShowPasses(p=>({...p,new:!p.new}))} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.gray}}>{showPasses["new"]?"🙈":"👁️"}</button>}
</div>
))}
{addError&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"8px 12px",color:"#DC2626",fontSize:13}}>⚠️ {addError}</div>}
<div style={{display:"flex",gap:10,marginTop:4}}>
<button onClick={()=>{setShowAdd(false);setNewUser({name:"",username:"",password:""});setAddError("");}} style={{flex:1,background:B.lightGray,border:"none",borderRadius:9,padding:11,fontWeight:600,cursor:"pointer"}}>Cancel</button>
<button onClick={addUser} className="btn-hover" style={{flex:2,background:B.primary,color:"#fff",border:"none",borderRadius:9,padding:11,fontWeight:700,cursor:"pointer"}}>Add Member</button>
</div>
</div>
</div>
)}
{subAdmins.length===0&&!showAdd&&<div style={{textAlign:"center",padding:"40px 20px",color:B.gray}}><div style={{fontSize:44,marginBottom:12}}>👥</div><p>No team members yet.</p></div>}
{subAdmins.map(u=>(
<div key={u.id} style={{background:"#fff",borderRadius:14,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}>
{editId===u.id?(
<div style={{padding:"16px"}}>
<h4 style={{color:B.primary,fontSize:13,fontWeight:700,marginBottom:12,textTransform:"uppercase",letterSpacing:.4}}>Edit Member</h4>
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{[["name","Full Name","text"],["username","Username","text"],["password","Password","password"]].map(([f,ph,t])=>(
<div key={f} style={{position:"relative"}}>
<input type={t==="password"&&showPasses[u.id]?"text":t} placeholder={ph} value={editDraft[f]||""}
onChange={e=>setEditDraft(d=>({...d,[f]:e.target.value}))}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:t==="password"?"10px 40px 10px 12px":"10px 12px",fontSize:14,outline:"none",background:B.cream}}/>
{t==="password"&&<button onClick={()=>setShowPasses(p=>({...p,[u.id]:!p[u.id]}))} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.gray}}>{showPasses[u.id]?"🙈":"👁️"}</button>}
</div>
))}
<div style={{display:"flex",gap:10}}>
<button onClick={()=>setEditId(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:9,padding:11,fontWeight:600,cursor:"pointer"}}>Cancel</button>
<button onClick={()=>saveEdit(u.id)} className="btn-hover" style={{flex:2,background:B.primary,color:"#fff",border:"none",borderRadius:9,padding:11,fontWeight:700,cursor:"pointer"}}>Save</button>
</div>
</div>
</div>
):(
<div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}>
<div style={{background:`${B.primary}18`,borderRadius:"50%",width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👤</div>
<div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:B.dark}}>{u.name}</div><div style={{fontSize:12,color:B.gray}}>{u.email} · Sub-Admin</div></div>
<div style={{display:"flex",gap:8}}>
<button onClick={()=>{setEditId(u.id);setEditDraft({name:u.name,username:u.username,password:u.password});}} style={{background:B.lightGray,border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:600,color:B.primary}}>Edit</button>
<button onClick={()=>setConfirmDel(u.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:700,color:"#DC2626"}}>Remove</button>
</div>
</div>
)}
</div>
))}

<div style={{display:"flex",gap:8}}>
<button onClick={()=>setReviewing({...req,action:"approve"})} className="btn-hover"
style={{flex:1,background:"#059669",color:"#fff",border:"none",borderRadius:10,
padding:"11px 0",fontWeight:700,fontSize:13,cursor:"pointer"}}>
✅ Approve
</button>
<button onClick={()=>setReviewing({...req,action:"deny"})}
style={{flex:1,background:"#FEF2F2",color:"#DC2626",border:"1.5px solid #FECACA",borderRadius:10,
padding:"11px 0",fontWeight:700,fontSize:13,cursor:"pointer"}}>
❌ Deny
</button>
</div>
)}
{req.status==="denied"&&req.denialReason&&(
<div style={{background:"#FEF2F2",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#DC2626"}}>
Reason: {req.denialReason}
</div>
)}
</div>
</div>
))}
</div>
{/* Approve/Deny confirmation modal */}
{reviewing&&(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
<div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 24px",width:"100%",maxWidth:480}}>
{reviewing.action==="approve"?(
<>
<div style={{fontSize:40,textAlign:"center",marginBottom:12}}>✅</div>
<h3 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:18,textAlign:"center",marginBottom:8}}>Approve this listing?</h3>
<p style={{color:B.gray,fontSize:13,textAlign:"center",marginBottom:4}}>
<strong>{reviewing.address}</strong> will be added to <strong>{reviewing.tourName}</strong>.
</p>
<p style={{color:B.gray,fontSize:12,textAlign:"center",marginBottom:20}}>
{reviewing.agentName} will receive an approval email.
</p>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>setReviewing(null)}
style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:"13px 0",fontWeight:600,cursor:"pointer"}}>
Cancel
</button>
<button onClick={()=>handleApprove(reviewing)} disabled={processing} className="btn-hover"
style={{flex:2,background:processing?"#9CA3AF":"#059669",color:"#fff",border:"none",
borderRadius:10,padding:"13px 0",fontWeight:700,cursor:processing?"default":"pointer",fontSize:14}}>
{processing?"Processing...":"Confirm Approval"}
</button>
</div>
</>
):(
<>
<div style={{fontSize:40,textAlign:"center",marginBottom:12}}>❌</div>
<h3 style={{color:"#DC2626",fontFamily:"Georgia,serif",fontSize:18,textAlign:"center",marginBottom:8}}>Deny this listing?</h3>
<p style={{color:B.gray,fontSize:13,textAlign:"center",marginBottom:16}}>
<strong>{reviewing.address}</strong> — {reviewing.agentName} will be notified by email.
</p>
<textarea placeholder="Reason for denial (optional — included in email to agent)"
value={denialReason} onChange={e=>setDenialReason(e.target.value)} rows={3}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"11px 12px",
fontSize:13,outline:"none",resize:"none",marginBottom:16}}/>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>{setReviewing(null);setDenialReason("");}}
style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:"13px 0",fontWeight:600,cursor:"pointer"}}>
Cancel
</button>
<button onClick={()=>handleDeny(reviewing)} disabled={processing}
style={{flex:2,background:processing?"#9CA3AF":"#DC2626",color:"#fff",border:"none",
borderRadius:10,padding:"13px 0",fontWeight:700,cursor:processing?"default":"pointer",fontSize:14}}>
{processing?"Processing...":"Confirm Denial"}
</button>
</div>
</>
)}
</div>
</div>
)}
</div>
);
}
/* ── CONTACT PAGE ── */

const [sent,setSent]=useState(false);
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:40}}>
<div style={{background:B.primary,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
<div><img src={window.MRT_LOGO_DATA} alt="MarketReady Tours" style={{height:136,objectFit:"contain",borderRadius:8}}/><div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Contact Us</div></div>
</div>
<div style={{padding:"24px 16px"}}>
<div style={{background:B.primary,borderRadius:16,padding:"22px 20px",marginBottom:24}}>

<div style={{display:"flex",flexDirection:"column",gap:12}}>
<a href="mailto:braydondennis@gmail.com" style={{color:"#fff",textDecoration:"none",display:"flex",alignItems:"center",gap:12}}>
<span style={{background:"rgba(255,255,255,.12)",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📧</span>
<span style={{color:B.lightGold,fontWeight:600}}>braydondennis@gmail.com</span>
</a>
<a href="https://www.marketreadytours.com" target="_blank" style={{color:"#fff",textDecoration:"none",display:"flex",alignItems:"center",gap:12}}>
<span style={{background:"rgba(255,255,255,.12)",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🌐</span>
<span style={{color:B.lightGold,fontWeight:600}}>marketreadytours.com</span>

{sent?(

{[["name","Your Name *","text"],["email","Email Address *","email"],["phone","Phone Number","tel"]].map(([f,ph,t])=>(

/* ── APP ROOT ── */
function App() {
const [tours,setTours]=useState(()=>{
try { const s=localStorage.getItem("mrt_tours"); return s?JSON.parse(s):INITIAL_TOURS; } catch(e){return INITIAL_TOURS;}
});
useEffect(()=>{
try { localStorage.setItem("mrt_tours",JSON.stringify(tours)); } catch(e){}
},[tours]);
const [sponsors,setSponsors]=useState(()=>{
try { const s=localStorage.getItem("mrt_sponsors"); return s?JSON.parse(s):INITIAL_SPONSORS; } catch(e){return INITIAL_SPONSORS;}
});
useEffect(()=>{
try { localStorage.setItem("mrt_sponsors",JSON.stringify(sponsors)); } catch(e){}
},[sponsors]);
const [listingRequests,setListingRequests]=useState(()=>{
try { const s=localStorage.getItem("mrt_listing_requests"); return s?JSON.parse(s):[]; } catch(e){return [];}
});
useEffect(()=>{
try { localStorage.setItem("mrt_listing_requests",JSON.stringify(listingRequests)); } catch(e){}
},[listingRequests]);
const [subAdmins,setSubAdmins]=useState(()=>{
try {
const saved = localStorage.getItem("gat_subadmins");
return saved ? JSON.parse(saved) : INITIAL_SUBADMINS;
} catch(e) { return INITIAL_SUBADMINS; }
});
// Persist subAdmins to localStorage whenever they change
useEffect(()=>{
try { localStorage.setItem("gat_subadmins", JSON.stringify(subAdmins)); } catch(e) {}
}, [subAdmins]);
const [page,setPage]=useState("dashboard");
const [currentUser,setCurrentUser]=useState(null);
const [showLogin,setShowLogin]=useState(false);
const isSuperAdmin=currentUser?.role==="super";
const isAnyAdmin=!!currentUser;
useEffect(()=>{
try{const s=sessionStorage.getItem("gat_session");if(s){const p=JSON.parse(s);if(p.role==="super"&&p.username===SUPER_ADMIN.username)setCurrentUser(p);else if(INITIAL_SUBADMINS.find(u=>u.username===p.username))setCurrentUser(p);else sessionStorage.removeItem("gat_session");}}catch(e){sessionStorage.removeItem("gat_session");}
},[]);
const handleLogout=()=>{sessionStorage.removeItem("gat_session");setCurrentUser(null);setPage("dashboard");};
return (
<div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
{showLogin&&!currentUser&&<LoginPage onLogin={u=>{setCurrentUser(u);setShowLogin(false);}} onClose={()=>setShowLogin(false)} subAdmins={subAdmins}/>}
{page==="dashboard"&&<ToursDashboard tours={tours} setTours={setTours} isAdmin={isAnyAdmin} isSuperAdmin={isSuperAdmin} currentUser={currentUser} onAdminLogin={()=>setShowLogin(true)} onLogout={handleLogout} onTeamPage={()=>setPage("team")} onRequestsPage={()=>setPage("requests-admin")} listingRequests={listingRequests} sponsors={sponsors}/>}
{page==="sponsors"&&<SponsorsPage sponsors={sponsors} setSponsors={setSponsors} isAdmin={isSuperAdmin}/>}
{page==="team"&&isSuperAdmin&&<TeamPage subAdmins={subAdmins} setSubAdmins={setSubAdmins} onBack={()=>setPage("dashboard")}/>}
{page==="contact"&&<ContactPage onBack={()=>setPage("dashboard")}/>}
{page==="request"&&<RequestListingPage tours={tours} onBack={()=>setPage("dashboard")} onSubmit={(req)=>setListingRequests(prev=>[...prev,req])}/>}
{page==="requests-admin"&&(currentUser?.role==="super"||currentUser)&&<ListingRequestsAdmin requests={listingRequests} setRequests={setListingRequests} tours={tours} setTours={setTours} onBack={()=>setPage("dashboard")} currentUser={currentUser}/>}
<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E5E7EB",display:"flex",padding:"10px 0 16px",boxShadow:"0 -4px 16px rgba(0,0,0,.07)",zIndex:200}}>
<button onClick={()=>setPage("dashboard")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="dashboard"?B.primary:B.gray,fontWeight:page==="dashboard"?700:500,fontSize:11}}><span style={{fontSize:20}}>🗓️</span>Tours</button>
<a href="https://www.marketreadytours.com" target="_blank" style={{flex:1,textDecoration:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:B.gray,fontWeight:500,fontSize:11}}><span style={{fontSize:20}}>📊</span>Estimates</a>
<button onClick={()=>setPage("sponsors")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="sponsors"?B.primary:B.gray,fontWeight:page==="sponsors"?700:500,fontSize:11}}><span style={{fontSize:20}}>⭐</span>Sponsors</button>
<button onClick={()=>setPage("request")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="request"?B.gold:B.gray,fontWeight:page==="request"?700:500,fontSize:11,position:"relative"}}>
<span style={{fontSize:20}}>🏠</span>List Home
</button>
<button onClick={()=>setPage("contact")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="contact"?B.primary:B.gray,fontWeight:page==="contact"?700:500,fontSize:11}}><span style={{fontSize:20}}>✉️</span>Contact</button>
</div>
</div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
