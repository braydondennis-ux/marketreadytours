/* ── ADD LISTING FORM with Google Places Autocomplete ── */
function AddListingForm({ tourColor, onAdd, onCancel }) {
const [query, setQuery]       = useState("");
const [suggestions, setSugg]  = useState([]);
const [selected, setSelected] = useState(null);
const [fields, setFields]     = useState({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
const [loading, setLoading]   = useState(false);
const [status, setStatus]     = useState("");
const [sessionToken, setToken]= useState(null);
const inputRef = useRef(null);
useEffect(()=>{
if(window.google?.maps?.places) {
setToken(new window.google.maps.places.AutocompleteSessionToken());
}
},[]);
useEffect(()=>{
if(!query || query.length < 3 || !window.google?.maps?.places || selected) {
setSugg([]); return;
}
const svc = new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({
input: query,
sessionToken,
types: ["address"],
componentRestrictions: { country: "us" },
}, (predictions, status) => {
if(status === window.google.maps.places.PlacesServiceStatus.OK && predictions) {
setSugg(predictions);
} else {
setSugg([]);
}
});
}, [query]);
const handleSelect = (prediction) => {
setSugg([]);
setLoading(true);
setStatus("📍 Confirming address...");
const map = new window.google.maps.Map(document.createElement("div"));
const svc = new window.google.maps.places.PlacesService(map);
svc.getDetails({
placeId: prediction.place_id,
fields: ["address_components", "formatted_address", "geometry"],
sessionToken,
}, (place, st) => {
if(st !== window.google.maps.places.PlacesServiceStatus.OK || !place) {
setStatus("❌ Could not get address details. Please try again.");
setLoading(false); return;
}
const get = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.long_name : "";
};
const getShort = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.short_name : "";
};
const streetNum  = get("street_number");
const streetName = get("route");
const city       = get("locality") || get("sublocality");
const state      = getShort("administrative_area_level_1");
const zip        = get("postal_code");
const address    = `${streetNum} ${streetName}`.trim();
const cityStr    = `${city}, ${state} ${zip}`.trim();
setQuery(address);
setSelected(prediction.place_id);
setToken(new window.google.maps.places.AutocompleteSessionToken());
setFields(f => ({ ...f, address, city: cityStr }));
setStatus("✅ Address confirmed! Fill in listing details below.");
setLoading(false);
});
};
const handleAdd = () => {
if(!fields.address || !selected) {
setStatus("⚠️ Please select a valid address from the suggestions.");
return;
}
onAdd({
...fields,
beds:  Number(fields.beds)  || 0,
baths: Number(fields.baths) || 0,
sqft:  Number(String(fields.sqft).replace(/[^0-9]/g,""))  || 0,
dom:   Number(fields.dom)   || 0,
price: Number(String(fields.price).replace(/[^0-9]/g,"")) || 0,
photos: fields.photos?.length
? fields.photos
: ["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
});
};
const clearSelection = () => {
setSelected(null); setQuery("");
setFields({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
setStatus(""); setSugg([]);
setTimeout(() => inputRef.current?.focus(), 100);
};
const fieldLabels = [["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"],["agent","Listing Agent"]];
return (
<div style={{background:"#fff", borderRadius:14, padding:16, border:`2px solid ${tourColor}40`}}>
<div style={{display:"flex", alignItems:"center", gap:8, marginBottom:14}}>
<span style={{fontSize:20}}>🔍</span>
<h4 style={{color:B.primary, fontSize:14, fontWeight:700, margin:0}}>Add New Listing</h4>
</div>
{/* Address search */}
<div style={{position:"relative", marginBottom:10}}>
<label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
Property Address *
</label>
<div style={{position:"relative"}}>
<input
ref={inputRef}
type="text"
placeholder="Start typing an address..."
value={query}
onChange={e=>{ setQuery(e.target.value); setSelected(null); }}
style={{width:"100%", border:`1.5px solid ${selected ? "#059669" : "#E5E7EB"}`,
borderRadius:9, padding:"11px 40px 11px 12px", fontSize:14,
outline:"none", background: selected ? "#F0FDF4" : "#fff"}}
/>
{selected && (
<button onClick={clearSelection}
style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
background:"#DC2626", color:"#fff", border:"none", borderRadius:"50%",
width:22, height:22, cursor:"pointer", fontSize:12, fontWeight:700,
display:"flex", alignItems:"center", justifyContent:"center"}}>✕</button>
)}
{loading && (
<div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)"}}>
<div style={{width:18, height:18, border:"2px solid #E5E7EB", borderTopColor:tourColor,
borderRadius:"50%", animation:"spin .8s linear infinite"}}/>
</div>
)}
</div>
{suggestions.length > 0 && !selected && (
<div style={{position:"absolute", top:"100%", left:0, right:0, background:"#fff",
border:"1.5px solid #E5E7EB", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,.15)",
zIndex:9999, overflow:"hidden", marginTop:4}}>
{suggestions.map((s, i) => (
<button key={s.place_id} onClick={()=>handleSelect(s)}
style={{width:"100%", background:"none", border:"none", borderBottom:i<suggestions.length-1?"1px solid #F3F4F6":"none",
padding:"12px 14px", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"flex-start", gap:10,
transition:"background .1s"}}
onMouseEnter={e=>e.currentTarget.style.background="#F9FAFB"}
onMouseLeave={e=>e.currentTarget.style.background="none"}>
<span style={{fontSize:16, flexShrink:0, marginTop:1}}>📍</span>
<div>
<div style={{fontWeight:600, fontSize:13, color:B.dark}}>{s.structured_formatting?.main_text}</div>
<div style={{fontSize:11, color:B.gray}}>{s.structured_formatting?.secondary_text}</div>
</div>
</button>
))}
</div>
)}
</div>
{status && (
<div style={{background: status.startsWith("✅") ? "#F0FDF4" : status.startsWith("❌") ? "#FEF2F2" : "#FFFBEB",
border: `1px solid ${status.startsWith("✅") ? "#BBF7D0" : status.startsWith("❌") ? "#FECACA" : "#FDE68A"}`,
borderRadius:8, padding:"10px 12px", fontSize:12,
color: status.startsWith("✅") ? "#065F46" : status.startsWith("❌") ? "#DC2626" : "#92400E",
marginBottom:10}}>
{status}
</div>
)}
{/* Manual fields — shown after address confirmed */}
{selected && (
<div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:12}}>
<div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
{fieldLabels.map(([f, label])=>(
<div key={f}>
<label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>{label}</label>
<input value={fields[f]||""} onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}
placeholder={label}
style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
</div>
))}
</div>
<div>
<label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>City, State ZIP</label>
<input value={fields.city||""} onChange={e=>setFields(fi=>({...fi,city:e.target.value}))}
style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
</div>
</div>
)}
{/* Photo upload */}
<div style={{marginBottom:12}}>
<label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
📸 Listing Photos
</label>
<label style={{display:"flex", alignItems:"center", justifyContent:"center", gap:8,
border:"2px dashed #D1D5DB", borderRadius:10, padding:"14px 12px",
cursor:"pointer", background:"#FAFAFA", transition:"all .15s"}}
onMouseEnter={e=>{e.currentTarget.style.borderColor=tourColor;e.currentTarget.style.background=tourColor+"10";}}
onMouseLeave={e=>{e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.background="#FAFAFA";}}>
<span style={{fontSize:22}}>📁</span>
<div>
<div style={{fontWeight:600, fontSize:13, color:B.dark}}>Click to upload photos</div>
<div style={{fontSize:11, color:B.gray}}>JPG, PNG, HEIC — multiple files OK</div>
</div>
<input type="file" accept="image/*" multiple style={{display:"none"}}
onChange={e=>{
const files = Array.from(e.target.files);
if(!files.length) return;
Promise.all(files.map(f => new Promise((res,rej)=>{
const reader = new FileReader();
reader.onload = ev => res(ev.target.result);
reader.onerror = rej;
reader.readAsDataURL(f);
}))).then(urls => {
setFields(fi => ({ ...fi, photos: [...(fi.photos||[]), ...urls] }));
});
}}
/>
</label>
{/* Photo preview grid */}
{fields.photos?.length > 0 && (
<div style={{marginTop:8, display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6}}>
{fields.photos.map((p,i)=>(
<div key={i} style={{position:"relative", borderRadius:8, overflow:"hidden", aspectRatio:"4/3"}}>
<img src={p} alt="" style={{width:"100%", height:"100%", objectFit:"cover"}}/>
<button onClick={()=>setFields(fi=>({...fi,photos:fi.photos.filter((_,j)=>j!==i)}))}
style={{position:"absolute", top:4, right:4, background:"rgba(0,0,0,.6)",
color:"#fff", border:"none", borderRadius:"50%", width:20, height:20,
cursor:"pointer", fontSize:11, fontWeight:700, display:"flex",
alignItems:"center", justifyContent:"center", lineHeight:1}}>✕</button>
{i===0 && <div style={{position:"absolute", bottom:4, left:4, background:tourColor,
color:"#fff", fontSize:9, fontWeight:700, borderRadius:4, padding:"2px 5px"}}>COVER</div>}
</div>
))}
</div>
)}
</div>
<div style={{display:"flex", gap:10}}>
<button onClick={onCancel}
style={{flex:1, background:B.lightGray, border:"none", borderRadius:9, padding:"11px 0", fontWeight:600, cursor:"pointer"}}>
Cancel
</button>
<button onClick={handleAdd} disabled={!selected || loading}
className="btn-hover"
style={{flex:2, background: !selected||loading ? "#9CA3AF" : tourColor,
color:"#fff", border:"none", borderRadius:9, padding:"11px 0",
fontWeight:700, cursor: !selected||loading ? "default":"pointer"}}>
{loading ? "Loading..." : "✓ Add Listing"}
</button>
</div>
</div>
);
}

};

function RequestListingPage({tours, onBack, onSubmit}) {
const [fields,setFields]=useState({
agentName:"",agentEmail:"",agentPhone:"",
tourId:"",address:"",city:"",beds:"",baths:"",sqft:"",dom:"",price:"",notes:""
});
const [photos,setPhotos]=useState([]);
const [submitting,setSubmitting]=useState(false);
const [done,setDone]=useState(false);
const [error,setError]=useState("");
const [query,setQuery]=useState("");
const [suggestions,setSugg]=useState([]);
const [addrConfirmed,setAddrConfirmed]=useState(false);
const [sessionToken,setToken]=useState(null);
const inputRef=useRef(null);
useEffect(()=>{
if(window.google?.maps?.places) setToken(new window.google.maps.places.AutocompleteSessionToken());
},[]);
useEffect(()=>{
if(!query||query.length<3||!window.google?.maps?.places||addrConfirmed){setSugg([]);return;}
const svc=new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({input:query,sessionToken,types:["address"],componentRestrictions:{country:"us"}},
(predictions,status)=>{
if(status===window.google.maps.places.PlacesServiceStatus.OK&&predictions) setSugg(predictions);
else setSugg([]);
});
},[query]);
const handleAddrSelect=(prediction)=>{
setSugg([]);
const map=new window.google.maps.Map(document.createElement("div"));
const svc=new window.google.maps.places.PlacesService(map);
svc.getDetails({placeId:prediction.place_id,fields:["address_components"],sessionToken},(place,st)=>{
if(st!==window.google.maps.places.PlacesServiceStatus.OK||!place) return;
const get=(type)=>{const c=place.address_components.find(c=>c.types.includes(type));return c?c.long_name:"";};
const getS=(type)=>{const c=place.address_components.find(c=>c.types.includes(type));return c?c.short_name:"";};
const address=`${get("street_number")} ${get("route")}`.trim();
const city=`${get("locality")||get("sublocality")}, ${getS("administrative_area_level_1")} ${get("postal_code")}`.trim();
setQuery(address);
setFields(f=>({...f,address,city}));
setAddrConfirmed(true);
setToken(new window.google.maps.places.AutocompleteSessionToken());
});
};
const handleSubmit=async()=>{
if(!fields.agentName||!fields.agentEmail||!fields.tourId||!fields.address){
setError("Please fill in all required fields.");return;
}
setSubmitting(true);setError("");
const tour=tours.find(t=>t.id===fields.tourId);
const requestData={
id:"req-"+Date.now(),
status:"pending",
submittedAt:new Date().toISOString(),
agentName:fields.agentName,
agentEmail:fields.agentEmail,
agentPhone:fields.agentPhone,
tourId:fields.tourId,
tourName:tour?`${tour.emoji} ${tour.name}`:"",
address:fields.address,
city:fields.city,
beds:Number(fields.beds)||0,
baths:Number(fields.baths)||0,
sqft:Number(String(fields.sqft).replace(/[^0-9]/g,""))||0,
dom:Number(fields.dom)||0,
price:Number(String(fields.price).replace(/[^0-9]/g,""))||0,
agent:fields.agentName,
notes:fields.notes,
photos:photos.length?photos:["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
order:0,
};
try {
await fetch(LISTING_REQUEST_FORMSPREE,{
method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:"braydondennis@gmail.com",_replyto:fields.agentEmail,
_subject:`New Listing Request: ${fields.address}`,
message:`New listing request submitted!\n\nAgent: ${fields.agentName}\nEmail: ${fields.agentEmail}\nPhone: ${fields.agentPhone||"Not provided"}\n\nProperty: ${fields.address}, ${fields.city}\nTour: ${requestData.tourName}\nBeds: ${fields.beds} | Baths: ${fields.baths} | Sqft: ${fields.sqft}\nPrice: $${Number(String(fields.price).replace(/[^0-9]/g,"")).toLocaleString()}\nDOM: ${fields.dom}\nNotes: ${fields.notes||"None"}\n\nLog in to approve or deny this request.`,
}),
});
await fetch(LISTING_REQUEST_FORMSPREE,{
method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:fields.agentEmail,_replyto:"braydondennis@gmail.com",
_subject:"We received your listing request — MarketReady Tours",
message:`Hi ${fields.agentName},\n\nThank you for submitting your listing at ${fields.address}!\n\nWe've received your request for the ${requestData.tourName} tour and will review it shortly. You'll receive an email letting you know whether your listing has been approved or denied.\n\nIf you have any questions, feel free to reply to this email.\n\n— MarketReady Tours\nmarketreadytours.com`,
}),
});
onSubmit(requestData);
setDone(true);
} catch(e) { setError("Submission failed. Please try again."); }
setSubmitting(false);
};
if(done) return (
<div style={{background:B.cream,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
<div style={{textAlign:"center",maxWidth:360}}>
<div style={{fontSize:64,marginBottom:16}}>✅</div>
<h2 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:24,marginBottom:12}}>Request Submitted!</h2>
<p style={{color:B.gray,fontSize:15,lineHeight:1.6,marginBottom:24}}>
Thanks {fields.agentName}! We've received your listing request and will be in touch shortly with an approval or denial.
</p>
<p style={{color:B.gray,fontSize:13,marginBottom:28}}>A confirmation has been sent to <strong>{fields.agentEmail}</strong>.</p>
<button onClick={onBack} className="btn-hover"
style={{background:B.primary,color:"#fff",border:"none",borderRadius:12,padding:"14px 40px",fontWeight:700,fontSize:16,cursor:"pointer"}}>
Back to Tours
</button>
</div>
</div>
);
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:100}}>
<div style={{background:B.primary,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
<div style={{flex:1}}>
<div style={{color:B.gold,fontSize:10,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>MarketReady Tours</div>

{[["agentName","Full Name *","text"],["agentEmail","Email Address *","email"],["agentPhone","Phone Number","tel"]].map(([f,ph,t])=>(

onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}

{addrConfirmed&&<button onClick={()=>{setAddrConfirmed(false);setQuery("");setFields(f=>({...f,address:"",city:""}));}}

))}

)}

<button onClick={handleSubmit} disabled={!selectedTour||!form.name||!form.email} className="btn-hover"

/* ── APP ROOT ── */
function App() {
// Hash-based routing for shareable URLs
const syncHashToState = React.useCallback(() => {
  const hash = window.location.hash.replace("#/","");
  return hash || "";
}, []);

const setHash = React.useCallback((path) => {
  window.location.hash = "/" + path;
}, []);

React.useEffect(() => {
  const handler = () => {
    const hash = window.location.hash.replace("#/","");
    if(hash === "sponsors") { setPage("sponsors"); setActiveTourId(null); }
    else if(hash === "how-it-works") { window.__showHowItWorks && window.__showHowItWorks(); }
    else if(hash === "calendar") { window.__showCalendar && window.__showCalendar(); }
    else if(hash.startsWith("tour/")) { const tid = hash.replace("tour/",""); setActiveTourId(tid); setPage("dashboard"); }
    else if(hash === "team") { setPage("team"); }
    else if(hash === "requests") { setPage("requests"); }
    else { setPage("dashboard"); setActiveTourId(null); }
  };
  window.addEventListener("hashchange", handler);
  // Handle initial load
  handler();
  return () => window.removeEventListener("hashchange", handler);
}, []);

const [tours,setTours]=useState(()=>{
try { const s=localStorage.getItem("mrt_tours"); return s?JSON.parse(s):INITIAL_TOURS; } catch(e){return INITIAL_TOURS;}
});
useEffect(()=>{
try { localStorage.setItem("mrt_tours",JSON.stringify(tours)); } catch(e){}
},[tours]);
const [listingRequests,setListingRequests]=useState(()=>{
try { const s=localStorage.getItem("mrt_listing_requests"); return s?JSON.parse(s):[]; } catch(e){return [];}
});
useEffect(()=>{
try { localStorage.setItem("mrt_listing_requests",JSON.stringify(listingRequests)); } catch(e){}
},[listingRequests]);
const [subAdmins,setSubAdmins]=useState(()=>{
try {
const saved = localStorage.getItem("gat_subadmins");
return saved ? JSON.parse(saved) : INITIAL_SUBADMINS;
} catch(e) { return INITIAL_SUBADMINS; }
});
// Persist subAdmins to localStorage whenever they change
useEffect(()=>{
try { localStorage.setItem("gat_subadmins", JSON.stringify(subAdmins)); } catch(e) {}
}, [subAdmins]);
const [page,setPage]=useState("dashboard");
const [currentUser,setCurrentUser]=useState(null);
const [showLogin,setShowLogin]=useState(false);
const isSuperAdmin=currentUser?.role==="super";
const isAnyAdmin=!!currentUser;
useEffect(()=>{
try{const s=sessionStorage.getItem("gat_session");if(s){const p=JSON.parse(s);if(p.role==="super"&&p.username===SUPER_ADMIN.username)setCurrentUser(p);else if(INITIAL_SUBADMINS.find(u=>u.username===p.username))setCurrentUser(p);else sessionStorage.removeItem("gat_session");}}catch(e){sessionStorage.removeItem("gat_session");}
},[]);
const handleLogout=()=>{sessionStorage.removeItem("gat_session");setCurrentUser(null);setPage("dashboard");};

/* Firebase sync — runs in background, app works fine without it */
const fbReady = useRef(false);
const fbIgnore = useRef({});

// On mount: load from Firebase ONCE, then start listening
useEffect(()=>{
if(!_fb) return;
const paths = {
  "mrt_tours": setTours,
  "mrt_listing_requests": setListingRequests,
  "mrt_subadmins": setSubAdmins,
};
// First load from Firebase
Promise.all(Object.keys(paths).map(path=>
  _fb.ref(path).once("value").then(snap=>{
    try{
      const raw=snap.val();
      if(raw!==null&&raw!==undefined){paths[path](fbToArr(raw));}
      else{/* Firebase empty — will be seeded by write effects */}
    }catch(e){}
  }).catch(()=>{})
)).then(()=>{
  // After initial load, enable writes and start listening
  fbReady.current=true;
  // Listen for future changes from other browsers
  Object.entries(paths).forEach(([path,setter])=>{
    try{
      _fb.ref(path).on("value",snap=>{
        try{
          if(fbIgnore.current[path]){fbIgnore.current[path]=false;return;}
          const raw=snap.val();
          if(raw!==null&&raw!==undefined) setter(fbToArr(raw));
        }catch(e){}
      });
    }catch(e){}
  });
});
},[]);

// Push local changes to Firebase (only after initial load completes)
useEffect(()=>{if(!_fb||!fbReady.current)return;try{fbIgnore.current["mrt_tours"]=true;_fb.ref("mrt_tours").set(tours);}catch(e){}},[tours]);
useEffect(()=>{if(!_fb||!fbReady.current)return;try{fbIgnore.current["mrt_listing_requests"]=true;_fb.ref("mrt_listing_requests").set(listingRequests);}catch(e){}},[listingRequests]);
useEffect(()=>{if(!_fb||!fbReady.current)return;try{fbIgnore.current["mrt_subadmins"]=true;_fb.ref("mrt_subadmins").set(subAdmins);}catch(e){}},[subAdmins]);
return (
<div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
<div id="fb-status" style={{position:"fixed",top:4,right:4,zIndex:9999,fontSize:10,padding:"2px 8px",borderRadius:10,background:_fb?"#D1FAE5":"#FEE2E2",color:_fb?"#065F46":"#991B1B"}}>{_fb?(fbReady.current?"🟢 Synced":"🟡 Connecting..."):"🔴 Local only"}</div>
{showLogin&&!currentUser&&<LoginPage onLogin={u=>{setCurrentUser(u);setShowLogin(false);}} onClose={()=>setShowLogin(false)} subAdmins={subAdmins}/>}
{page==="dashboard"&&<ToursDashboard tours={tours} setTours={setTours} isAdmin={isAnyAdmin} isSuperAdmin={isSuperAdmin} currentUser={currentUser} onAdminLogin={()=>setShowLogin(true)} onLogout={handleLogout} onTeamPage={()=>{setPage("team");setHash("team");}} onRequestsPage={()=>setPage("requests-admin")} listingRequests={listingRequests}/>}
{page==="team"&&isSuperAdmin&&<TeamPage subAdmins={subAdmins} setSubAdmins={setSubAdmins} onBack={()=>{setPage("dashboard");setHash("");}}/>}
{page==="contact"&&<ContactPage onBack={()=>{setPage("dashboard");setHash("");}}/>}
{page==="request"&&<RequestListingPage tours={tours} onBack={()=>{setPage("dashboard");setHash("");}} onSubmit={(req)=>setListingRequests(prev=>[...prev,req])}/>}
{page==="sponsor-signup"&&<SponsorSignupPage tours={tours} onBack={()=>{setPage("dashboard");setHash("");}} onSubmit={(sp)=>{
const tourId=sp.tourId;
setTours(prev=>prev.map(t=>t.id===tourId?{...t,sponsors:[...(t.sponsors||[]),{...sp,tourId:undefined}]}:t));
setPage("dashboard");
}}/>}
{page==="requests-admin"&&(currentUser?.role==="super"||currentUser)&&<ListingRequestsAdmin requests={listingRequests} setRequests={setListingRequests} tours={tours} setTours={setTours} onBack={()=>{setPage("dashboard");setHash("");}} currentUser={currentUser}/>}
<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E5E7EB",display:"flex",padding:"10px 0 16px",boxShadow:"0 -4px 16px rgba(0,0,0,.07)",zIndex:200}}>
<button onClick={()=>setPage("dashboard")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="dashboard"?B.primary:B.gray,fontWeight:page==="dashboard"?700:500,fontSize:11}}><span style={{fontSize:20}}>🗓️</span>Tours</button>
<a href="https://www.marketreadytours.com" target="_blank" style={{flex:1,textDecoration:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:B.gray,fontWeight:500,fontSize:11}}><span style={{fontSize:20}}>📊</span>Estimates</a>
<button onClick={()=>setPage("sponsor-signup")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="sponsor-signup"?B.gold:B.gray,fontWeight:page==="sponsor-signup"?700:500,fontSize:11}}><span style={{fontSize:20}}>⭐</span>Sponsor</button>
<button onClick={()=>setPage("request")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="request"?B.gold:B.gray,fontWeight:page==="request"?700:500,fontSize:11,position:"relative"}}>
<span style={{fontSize:20}}>🏠</span>List Home
</button>
<button onClick={()=>setPage("contact")} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:page==="contact"?B.primary:B.gray,fontWeight:page==="contact"?700:500,fontSize:11}}><span style={{fontSize:20}}>✉️</span>Contact</button>
</div>
</div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
