/* ── ROUTE OPTIMIZER ── */
async function optimizeRoute(listings) {
if(listings.length<3) return listings; // no optimization needed for 1-2 stops
const directionsService = new google.maps.DirectionsService();
const addresses = listings.map(l=>`${l.address}, ${l.city}`);
const origin = addresses[0];
const destination = addresses[addresses.length-1];
const waypoints = addresses.slice(1,-1).map(addr=>({location:addr,stopover:true}));
return new Promise((resolve)=>{
directionsService.route({
origin,
destination,
waypoints,
optimizeWaypoints:true,
travelMode:google.maps.TravelMode.DRIVING,
},(result,status)=>{
if(status==="OK"&&result.routes&&result.routes[0]) {
const order=result.routes[0].waypoint_order; // optimized indices for waypoints
const optimized=[];
optimized.push(listings[0]); // origin stays first
order.forEach(idx=>optimized.push(listings[idx+1])); // +1 because waypoints start at index 1
optimized.push(listings[listings.length-1]); // destination stays last
let totalDist=0, totalTime=0;
result.routes[0].legs.forEach(leg=>{
totalDist+=leg.distance.value;
totalTime+=leg.duration.value;
});
const reordered = optimized.map((l,i)=>({...l,order:i+1}));
resolve({listings:reordered, totalMiles:(totalDist/1609.34).toFixed(1), totalMins:Math.round(totalTime/60), legs:result.routes[0].legs});
} else {
const allWaypoints = addresses.slice(1).map(addr=>({location:addr,stopover:true}));
directionsService.route({
origin:addresses[0],
destination:addresses[0], // round trip back to start
waypoints:allWaypoints,
optimizeWaypoints:true,
travelMode:google.maps.TravelMode.DRIVING,
},(result2,status2)=>{
if(status2==="OK"&&result2.routes&&result2.routes[0]) {
const order2=result2.routes[0].waypoint_order;
const optimized2=[listings[0]];
order2.forEach(idx=>optimized2.push(listings[idx+1]));
let totalDist2=0, totalTime2=0;
result2.routes[0].legs.forEach(leg=>{totalDist2+=leg.distance.value;totalTime2+=leg.duration.value;});
const reordered2 = optimized2.map((l,i)=>({...l,order:i+1}));
resolve({listings:reordered2, totalMiles:(totalDist2/1609.34).toFixed(1), totalMins:Math.round(totalTime2/60), legs:result2.routes[0].legs});
} else {
resolve(null); // optimization failed
}
});
}
});
});
}

function AddListingForm({ tourColor, onAdd, onCancel }) {
const [query, setQuery]       = useState("");
const [suggestions, setSugg]  = useState([]);
const [selected, setSelected] = useState(null);
const [fields, setFields]     = useState({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
const [loading, setLoading]   = useState(false);
const [status, setStatus]     = useState("");
const [sessionToken, setToken]= useState(null);
const [showMlsPaste, setShowMlsPaste] = useState(false);
const [mlsText, setMlsText]   = useState("");
const [mlsParsing, setMlsParsing] = useState(false);
const inputRef = useRef(null);
/* MLS text parser — extracts listing details from pasted MLS text */
const parseMlsText = (text) => {
const t = text.replace(/\s+/g," ");
const result = {};
const addrMatch = t.match(/(\d{1,6}\s+(?:[NSEW]\.?\s+)?[\w\s]+(?:St|Street|Ave|Avenue|Blvd|Boulevard|Dr|Drive|Rd|Road|Way|Ln|Lane|Ct|Court|Cir|Circle|Pl|Place|Pkwy|Parkway|Trl|Trail)\.?)\b/i);
if(addrMatch) result.address = addrMatch[1].trim();
const cityMatch = t.match(/([A-Z][a-z]+(?:\s[A-Z][a-z]+)*),?\s*([A-Z]{2})\s*(\d{5})/);
if(cityMatch) result.city = `${cityMatch[1]}, ${cityMatch[2]} ${cityMatch[3]}`;
const bedMatch = t.match(/(\d+)\s*(?:bed|br|bedroom|bd)/i);
if(bedMatch) result.beds = bedMatch[1];
const bathMatch = t.match(/(\d+\.?\d*)\s*(?:bath|ba|bathroom)/i);
if(bathMatch) result.baths = bathMatch[1];
const sqftMatch = t.match(/([\d,]+)\s*(?:sq\.?\s*ft|sqft|square\s*feet|sf)/i);
if(sqftMatch) result.sqft = sqftMatch[1].replace(/,/g,"");
const priceMatch = t.match(/\$\s*([\d,]+(?:\.\d{2})?)/);
if(priceMatch) result.price = priceMatch[1].replace(/,/g,"").replace(/\.00$/,"");
const domMatch = t.match(/(\d+)\s*(?:days?\s*on\s*market|dom|day\s*on\s*mkt|cdom|days)/i);
if(domMatch) result.dom = domMatch[1];
const agentMatch = t.match(/(?:list(?:ed|ing)\s*(?:by|agent)|agent\s*:?)\s*:?\s*([A-Z][a-z]+\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/i);
if(agentMatch) result.agent = agentMatch[1].trim();
const mlsMatch = t.match(/(?:MLS|mls)\s*#?\s*:?\s*(\d{5,})/i);
if(mlsMatch) result.mlsNumber = mlsMatch[1];
const yearMatch = t.match(/(?:year\s*built|built\s*in?|yr\s*blt)\s*:?\s*(\d{4})/i);
if(yearMatch) result.yearBuilt = yearMatch[1];
return result;
};
const handleMlsPaste = () => {
if(!mlsText.trim()) return;
setMlsParsing(true);
setTimeout(()=>{
const parsed = parseMlsText(mlsText);
const updates = {};
if(parsed.address) { updates.address = parsed.address; setQuery(parsed.address); }
if(parsed.city) updates.city = parsed.city;
if(parsed.beds) updates.beds = parsed.beds;
if(parsed.baths) updates.baths = parsed.baths;
if(parsed.sqft) updates.sqft = parsed.sqft;
if(parsed.price) updates.price = parsed.price;
if(parsed.dom) updates.dom = parsed.dom;
if(parsed.agent) updates.agent = parsed.agent;
setFields(f=>({...f,...updates}));
const found = Object.keys(parsed).length;
if(found > 1) {
setStatus(`✅ Auto-filled ${found} fields from MLS data! Review and complete any missing fields.`);
if(parsed.address && parsed.city) {
setSelected("mls-manual"); // mark as manually confirmed
}
} else {
setStatus("⚠️ Couldn't extract much data. Try pasting more listing details, or enter manually.");
}
setMlsParsing(false);
setShowMlsPaste(false);
setMlsText("");
},400);
};
const handleClipboardPaste = async () => {
try {
const text = await navigator.clipboard.readText();
if(text && text.length > 10) {
setMlsText(text);
setShowMlsPaste(true);
} else {
setStatus("⚠️ Nothing useful on clipboard. Try copying MLS listing text first.");
}
} catch(e) {
setShowMlsPaste(true);
}
};
useEffect(()=>{
if(window.google?.maps?.places) {
setToken(new window.google.maps.places.AutocompleteSessionToken());
}
},[]);
useEffect(()=>{
if(!query || query.length < 3 || !window.google?.maps?.places || selected) {
setSugg([]); return;
}
const svc = new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({
input: query,
sessionToken,
types: ["address"],
componentRestrictions: { country: "us" },
}, (predictions, status) => {
if(status === window.google.maps.places.PlacesServiceStatus.OK && predictions) {
setSugg(predictions);
} else {
setSugg([]);
}
});
}, [query]);
const handleSelect = (prediction) => {
setSugg([]);
setLoading(true);
setStatus("📍 Confirming address...");
const map = new window.google.maps.Map(document.createElement("div"));
const svc = new window.google.maps.places.PlacesService(map);
svc.getDetails({
placeId: prediction.place_id,
fields: ["address_components", "formatted_address", "geometry"],
sessionToken,
}, (place, st) => {
if(st !== window.google.maps.places.PlacesServiceStatus.OK || !place) {
setStatus("❌ Could not get address details. Please try again.");
setLoading(false); return;
}
const get = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.long_name : "";
};
const getShort = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.short_name : "";
};
const streetNum  = get("street_number");
const streetName = get("route");
const city       = get("locality") || get("sublocality");
const state      = getShort("administrative_area_level_1");
const zip        = get("postal_code");
const address    = `${streetNum} ${streetName}`.trim();
const cityStr    = `${city}, ${state} ${zip}`.trim();
setQuery(address);
setSelected(prediction.place_id);
setToken(new window.google.maps.places.AutocompleteSessionToken());
setFields(f => ({ ...f, address, city: cityStr }));
setStatus("✅ Address confirmed! Fill in listing details below.");
setLoading(false);
});
};
const handleAdd = () => {
if(!fields.address && !query) {
setStatus("⚠️ Please enter an address — search, paste MLS data, or type manually.");
return;
}
const finalAddress = fields.address || query;
onAdd({
...fields,
address: finalAddress,
city: fields.city || "Scottsdale, AZ",
beds:  Number(fields.beds)  || 0,
baths: Number(fields.baths) || 0,
sqft:  Number(String(fields.sqft).replace(/[^0-9]/g,""))  || 0,
dom:   Number(fields.dom)   || 0,
price: Number(String(fields.price).replace(/[^0-9]/g,"")) || 0,
photos: fields.photos?.length
? fields.photos
: ["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
});
};
const clearSelection = () => {
setSelected(null); setQuery("");
setFields({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
setStatus(""); setSugg([]);
setTimeout(() => inputRef.current?.focus(), 100);
};
const fieldLabels = [["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"],["agent","Listing Agent"]];
return (

method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},

"Brokerage":tour.brokerageName||"",

const [error,setError]=useState("");
const [query,setQuery]=useState("");
const [suggestions,setSugg]=useState([]);
const [addrConfirmed,setAddrConfirmed]=useState(false);
const [sessionToken,setToken]=useState(null);
const inputRef=useRef(null);
useEffect(()=>{
if(window.google?.maps?.places) setToken(new window.google.maps.places.AutocompleteSessionToken());
},[]);
useEffect(()=>{
if(!query||query.length<3||!window.google?.maps?.places||addrConfirmed){setSugg([]);return;}
const svc=new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({input:query,sessionToken,types:["address"],componentRestrictions:{country:"us"}},
(predictions,status)=>{
if(status===window.google.maps.places.PlacesServiceStatus.OK&&predictions) setSugg(predictions);
else setSugg([]);
});
},[query]);
const handleAddrSelect=(prediction)=>{
setSugg([]);
const map=new window.google.maps.Map(document.createElement("div"));
const svc=new window.google.maps.places.PlacesService(map);
svc.getDetails({placeId:prediction.place_id,fields:["address_components"],sessionToken},(place,st)=>{
if(st!==window.google.maps.places.PlacesServiceStatus.OK||!place) return;
const get=(type)=>{const c=place.address_components.find(c=>c.types.includes(type));return c?c.long_name:"";};
const getS=(type)=>{const c=place.address_components.find(c=>c.types.includes(type));return c?c.short_name:"";};
const address=`${get("street_number")} ${get("route")}`.trim();
const city=`${get("locality")||get("sublocality")}, ${getS("administrative_area_level_1")} ${get("postal_code")}`.trim();
setQuery(address);
setFields(f=>({...f,address,city}));
setAddrConfirmed(true);
setToken(new window.google.maps.places.AutocompleteSessionToken());
});
};
const handleSubmit=async()=>{
if(!fields.agentName||!fields.agentEmail||!fields.tourId||!fields.address){
setError("Please fill in all required fields.");return;
}
setSubmitting(true);setError("");
const tour=tours.find(t=>t.id===fields.tourId);
const requestData={
id:"req-"+Date.now(),
status:"pending",
submittedAt:new Date().toISOString(),
agentName:fields.agentName,
agentEmail:fields.agentEmail,
agentPhone:fields.agentPhone,
tourId:fields.tourId,
tourName:tour?`${tour.emoji} ${tour.name}`:"",
address:fields.address,
city:fields.city,
beds:Number(fields.beds)||0,
baths:Number(fields.baths)||0,
sqft:Number(String(fields.sqft).replace(/[^0-9]/g,""))||0,
dom:Number(fields.dom)||0,
price:Number(String(fields.price).replace(/[^0-9]/g,""))||0,
agent:fields.agentName,
notes:fields.notes,
photos:photos.length?photos:["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
order:0,
};
try {
await fetch(LISTING_REQUEST_FORMSPREE,{
method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:"braydondennis@gmail.com",_replyto:fields.agentEmail,
_subject:`New Listing Request: ${fields.address}`,
message:`New listing request submitted!\n\nAgent: ${fields.agentName}\nEmail: ${fields.agentEmail}\nPhone: ${fields.agentPhone||"Not provided"}\n\nProperty: ${fields.address}, ${fields.city}\nTour: ${requestData.tourName}\nBeds: ${fields.beds} | Baths: ${fields.baths} | Sqft: ${fields.sqft}\nPrice: $${Number(String(fields.price).replace(/[^0-9]/g,"")).toLocaleString()}\nDOM: ${fields.dom}\nNotes: ${fields.notes||"None"}\n\nLog in to approve or deny this request.`,
}),
});
await fetch(LISTING_REQUEST_FORMSPREE,{
method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:fields.agentEmail,_replyto:"braydondennis@gmail.com",
_subject:"We received your listing request — MarketReady Tours",
message:`Hi ${fields.agentName},\n\nThank you for submitting your listing at ${fields.address}!\n\nWe've received your request for the ${requestData.tourName} tour and will review it shortly. You'll receive an email letting you know whether your listing has been approved or denied.\n\nIf you have any questions, feel free to reply to this email.\n\n— MarketReady Tours\nmarketreadytours.com`,
}),
});
onSubmit(requestData);
setDone(true);
} catch(e) { setError("Submission failed. Please try again."); }
setSubmitting(false);
};
if(done) return (
<div style={{background:B.cream,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
<div style={{textAlign:"center",maxWidth:360}}>
<div style={{fontSize:64,marginBottom:16}}>✅</div>
<h2 style={{color:B.primary,fontFamily:"Georgia,serif",fontSize:24,marginBottom:12}}>Request Submitted!</h2>
<p style={{color:B.gray,fontSize:15,lineHeight:1.6,marginBottom:24}}>
Thanks {fields.agentName}! We've received your listing request and will be in touch shortly with an approval or denial.
</p>
<p style={{color:B.gray,fontSize:13,marginBottom:28}}>A confirmation has been sent to <strong>{fields.agentEmail}</strong>.</p>
<button onClick={onBack} className="btn-hover"
style={{background:B.primary,color:"#fff",border:"none",borderRadius:12,padding:"14px 40px",fontWeight:700,fontSize:16,cursor:"pointer"}}>
Back to Tours
</button>
</div>
</div>
);
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:100}}>
<div style={{background:B.primary,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
<div style={{flex:1}}>
<div style={{color:B.gold,fontSize:10,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>MarketReady Tours</div>
<div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Request a Tour Listing</div>
</div>
<img src={window.MRT_LOGO_DATA} alt="MarketReady Tours" style={{height:136,objectFit:"contain",borderRadius:8}}/>
</div>
<div style={{padding:"20px 16px",maxWidth:600,margin:"0 auto"}}>
<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:12,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#1E40AF"}}>
📋 Fill out the form below to request your listing be featured on one of our upcoming home tours. Our team will review and respond within 24–48 hours.
</div>
<div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>

<div style={{display:"flex",flexDirection:"column",gap:10}}>
{[["agentName","Full Name *","text"],["agentEmail","Email Address *","email"],["agentPhone","Phone Number","tel"]].map(([f,ph,t])=>(
<input key={f} type={t} placeholder={ph} value={fields[f]}
onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}

))}
</div>

<select value={fields.tourId} onChange={e=>setFields(f=>({...f,tourId:e.target.value}))}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:"11px 12px",fontSize:14,outline:"none",background:B.cream,color:fields.tourId?B.dark:B.gray}}>
<option value="">— Choose a tour —</option>

</select>
</div>
<div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>

<div style={{position:"relative",marginBottom:10}}>
<div style={{position:"relative"}}>
<input ref={inputRef} type="text" placeholder="Property Address *"

style={{width:"100%",border:`1.5px solid ${addrConfirmed?"#059669":"#E5E7EB"}`,borderRadius:9,
padding:"11px 40px 11px 12px",fontSize:14,outline:"none",background:addrConfirmed?"#F0FDF4":"#fff"}}/>
{addrConfirmed&&<button onClick={()=>{setAddrConfirmed(false);setQuery("");setFields(f=>({...f,address:"",city:""}));}}
style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
background:"#DC2626",color:"#fff",border:"none",borderRadius:"50%",width:22,height:22,
cursor:"pointer",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
</div>
{suggestions.length>0&&!addrConfirmed&&(
<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",

zIndex:9999,overflow:"hidden",marginTop:4}}>
{suggestions.map((s,i)=>(
<button key={s.place_id} onClick={()=>handleAddrSelect(s)}
style={{width:"100%",background:"none",border:"none",
borderBottom:i<suggestions.length-1?"1px solid #F3F4F6":"none",
padding:"11px 14px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"flex-start",gap:10}}
onMouseEnter={e=>e.currentTarget.style.background="#F9FAFB"}
onMouseLeave={e=>e.currentTarget.style.background="none"}>
<span style={{fontSize:16,flexShrink:0}}>📍</span>
<div>
<div style={{fontWeight:600,fontSize:13,color:B.dark}}>{s.structured_formatting?.main_text}</div>
<div style={{fontSize:11,color:B.gray}}>{s.structured_formatting?.secondary_text}</div>
</div>
</button>
))}
</div>
)}
</div>
{addrConfirmed&&(
<input value={fields.city} onChange={e=>setFields(f=>({...f,city:e.target.value}))} placeholder="City, State ZIP"
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:"11px 12px",fontSize:14,outline:"none",background:B.cream,marginBottom:10}}/>
)}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
{[["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"]].map(([f,ph])=>(
<input key={f} placeholder={ph} value={fields[f]}
onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}
style={{border:"1.5px solid #E5E7EB",borderRadius:9,padding:"11px 12px",fontSize:14,outline:"none",background:B.cream}}/>
))}
</div>
<textarea placeholder="Additional notes for the tour organizer (optional)" value={fields.notes}
onChange={e=>setFields(f=>({...f,notes:e.target.value}))} rows={3}
style={{width:"100%",border:"1.5px solid #E5E7EB",borderRadius:9,padding:"11px 12px",fontSize:14,
outline:"none",background:B.cream,resize:"vertical"}}/>
</div>
<div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
<h3 style={{color:B.primary,fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:14}}>📸 Listing Photos</h3>
<label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
border:"2px dashed #D1D5DB",borderRadius:10,padding:"14px 12px",cursor:"pointer",background:"#FAFAFA"}}
onMouseEnter={e=>{e.currentTarget.style.borderColor=B.primary;e.currentTarget.style.background=B.primary+"10";}}
onMouseLeave={e=>{e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.background="#FAFAFA";}}>
<span style={{fontSize:22}}>📁</span>
<div>
<div style={{fontWeight:600,fontSize:13,color:B.dark}}>Click to upload photos</div>
<div style={{fontSize:11,color:B.gray}}>JPG, PNG — multiple files OK</div>
</div>
<input type="file" accept="image/*" multiple style={{display:"none"}}
onChange={e=>{
const files=Array.from(e.target.files);
if(!files.length)return;
Promise.all(files.map(f=>new Promise((res,rej)=>{
const reader=new FileReader();
reader.onload=ev=>res(ev.target.result);
reader.onerror=rej;
reader.readAsDataURL(f);
}))).then(urls=>setPhotos(prev=>[...prev,...urls]));
}}/>
</label>
{photos.length>0&&(
<div style={{marginTop:10,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
{photos.map((p,i)=>(
<div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",aspectRatio:"4/3"}}>
<img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
<button onClick={()=>setPhotos(prev=>prev.filter((_,j)=>j!==i))}
style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",color:"#fff",
border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",
fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
{i===0&&<div style={{position:"absolute",bottom:4,left:4,background:B.primary,
color:"#fff",fontSize:9,fontWeight:700,borderRadius:4,padding:"2px 5px"}}>COVER</div>}
</div>
))}
</div>
)}
</div>
{error&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,
padding:"12px 16px",color:"#DC2626",fontSize:13,marginBottom:14}}>⚠️ {error}</div>}
<button onClick={handleSubmit} disabled={submitting} className="btn-hover"
style={{width:"100%",background:submitting?"#9CA3AF":B.primary,color:"#fff",border:"none",
borderRadius:12,padding:"16px 0",fontWeight:700,fontSize:16,cursor:submitting?"default":"pointer",
boxShadow:"0 4px 14px rgba(27,58,107,.3)"}}>
{submitting?"Submitting...":"Submit Listing Request →"}
</button>
</div>
</div>
);
}

function ListingRequestsAdmin({requests, setRequests, tours, setTours, onBack, currentUser}) {
const [filter,setFilter]=useState("pending");
const [reviewing,setReviewing]=useState(null);
const [denialReason,setDenialReason]=useState("");
const [processing,setProcessing]=useState(false);
const visibleRequests = requests.filter(r=>{
if(currentUser?.role==="super") return true;
return true; // all admins see all for now
}).filter(r=> filter==="all" ? true : r.status===filter);
const pending = requests.filter(r=>r.status==="pending").length;
const handleApprove=async(req)=>{
setProcessing(true);
const tour = tours.find(t=>t.id===req.tourId);
if(tour){
const newListing={
id:Date.now(),
address:req.address, city:req.city,
beds:req.beds, baths:req.baths, sqft:req.sqft,
dom:req.dom, price:req.price, agent:req.agentName,
photos:req.photos, order:tour.listings.length+1,
};
setTours(prev=>prev.map(t=>t.id===req.tourId
? {...t, listings:[...t.listings, newListing]}
: t
));
}
try {
const tourDate=new Date(tour.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
await fetch(LISTING_REQUEST_FORMSPREE,{
method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:req.agentEmail, _replyto:"braydondennis@gmail.com",
_subject:`✅ Listing Approved! ${req.address} — ${req.tourName} Home Tour`,
"Agent Name":req.agentName,
"Agent Email":req.agentEmail,
"── LISTING CONFIRMED ──":"─────────────────",
"Property":req.address,
"City":req.city,
"Price":`$${Number(req.price).toLocaleString()}`,
"Details":`${req.beds} bed / ${req.baths} bath / ${Number(req.sqft).toLocaleString()} sqft / ${req.dom} DOM`,
"── TOUR DETAILS ──":"─────────────────",
"Tour":req.tourName,
"Tour Date":tourDate,
"Tour Time":tour?.time||"TBD",
"Stop Number":`#${tour?tour.listings.length:"TBD"}`,
"Total Stops":tour?`${tour.listings.length} homes on this tour`:"TBD",
"── MESSAGE ──":"─────────────────",
message:`Hi ${req.agentName},\n\nGreat news! Your listing has been approved and added to the tour.\n\n🏡 LISTING CONFIRMED\n${req.address}, ${req.city}\n$${Number(req.price).toLocaleString()} · ${req.beds}bd/${req.baths}ba · ${Number(req.sqft).toLocaleString()} sqft\n\n📅 TOUR DETAILS\nTour: ${req.tourName}\nDate: ${tourDate}\nTime: ${tour?.time||"TBD"}\nYour Stop: #${tour?tour.listings.length:"TBD"} of ${tour?tour.listings.length:"TBD"} homes\n\n📋 WHAT TO EXPECT\n• Licensed buyer agents will tour your property\n• Agents will provide real-time ratings & feedback within the app\n• You'll gain valuable market insights on how agents perceive your listing\n\n🔑 WHAT WE NEED FROM YOU BEFORE TOUR DAY\n• Confirm access/lockbox instructions\n• Note any showing restrictions\n• Ensure the property is tour-ready\n\nIf you have any questions or need to make changes, just reply to this email.\n\nWe look forward to showcasing your listing!\n\n— MarketReady Tours\nTour · Rate · Decide\nwww.marketreadytours.com`,
"Sent Via":"MarketReady Tours — Listing Approval",
"Approved At":new Date().toLocaleString("en-US",{dateStyle:"full",timeStyle:"short"}),
"Approved By":currentUser?.name||"Admin",
}),
});
} catch(e){ console.warn("Approval email failed",e); }
setRequests(prev=>prev.map(r=>r.id===req.id ? {...r,status:"approved",reviewedAt:new Date().toISOString()} : r));
setReviewing(null); setProcessing(false);
};
const handleDeny=async(req)=>{
setProcessing(true);
try {
await fetch(LISTING_REQUEST_FORMSPREE,{
method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:req.agentEmail, _replyto:"braydondennis@gmail.com",
_subject:`Your listing request — MarketReady Tours`,
message:`Hi ${req.agentName},\n\nThank you for your interest in featuring ${req.address} on the ${req.tourName} tour.\n\nAfter review, we are unable to include your listing on this particular tour${denialReason?` — ${denialReason}`:""}.\n\nWe encourage you to submit future listings for upcoming tours. Thank you for your understanding.\n\n— MarketReady Tours\nmarketreadytours.com`,
}),
});
} catch(e){ console.warn("Denial email failed",e); }
setRequests(prev=>prev.map(r=>r.id===req.id ? {...r,status:"denied",reviewedAt:new Date().toISOString(),denialReason} : r));
setReviewing(null); setDenialReason(""); setProcessing(false);
};
return (

/* ── AUTOMATED TOUR REMINDER SYSTEM ── */
/* Sends reminder emails to listing agents at:
- Day before tour @ 2:00 PM (1st reminder)
- Day before tour @ 7:00 PM (2nd reminder if unconfirmed)
- Tour day @ 6:00 AM (final reminder if unconfirmed)
*/
useEffect(()=>{
const REMINDER_FORMSPREE = "https://formspree.io/f/xdallqwa";
const getReminderKey = (tourId, wave) => `mrt_reminder_${tourId}_${wave}`;
const getConfirmKey = (tourId, agentEmail) => `mrt_confirmed_${tourId}_${agentEmail}`;
const checkReminders = () => {
const now = new Date();
const currentHour = now.getHours();
const todayStr = now.toISOString().split("T")[0];
const tomorrow = new Date(now);
tomorrow.setDate(tomorrow.getDate() + 1);
const tomorrowStr = tomorrow.toISOString().split("T")[0];
tours.forEach(tour => {
if(!tour.listings || tour.listings.length === 0) return;
const approvedAgents = listingRequests.filter(r =>
r.tourId === tour.id && r.status === "approved" && r.agentEmail
);
if(approvedAgents.length === 0) return;
let wave = null;
if(tour.date === tomorrowStr && currentHour >= 14 && currentHour < 19) {
wave = "day_before_2pm";
}
else if(tour.date === tomorrowStr && currentHour >= 19) {
wave = "day_before_7pm";
}
else if(tour.date === todayStr && currentHour >= 6 && currentHour < 9) {
wave = "tour_day_6am";
}
if(!wave) return;
const sentKey = getReminderKey(tour.id, wave);
try {
if(localStorage.getItem(sentKey)) return;
} catch(e){}
const isFirstReminder = wave === "day_before_2pm";
const isSecondReminder = wave === "day_before_7pm";
const isFinalReminder = wave === "tour_day_6am";
const tourDate = new Date(tour.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
const urgencyLabel = isFirstReminder ? "📋 Tour Reminder" : isSecondReminder ? "⏰ Second Reminder" : "🚨 Final Reminder";
const urgencyNote = isFirstReminder
? "This is a friendly reminder about tomorrow's tour."
: isSecondReminder
? "We haven't received your confirmation yet. Please confirm your attendance as soon as possible."
: "Tour is TODAY! This is your final reminder — please confirm immediately if you're attending.";
approvedAgents.forEach(async (agent) => {
try {
if(localStorage.getItem(getConfirmKey(tour.id, agent.agentEmail))) return;
} catch(e){}
try {
await fetch(REMINDER_FORMSPREE, {
method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email: agent.agentEmail,
_replyto: "braydondennis@gmail.com",
_subject: `${urgencyLabel} — ${tour.emoji} ${tour.name} Home Tour${isFinalReminder?" TODAY":""}`,
"Agent Name": agent.agentName,
"Agent Email": agent.agentEmail,
"Reminder Wave": urgencyLabel,
"Tour Name": `${tour.emoji} ${tour.name}`,
"Tour Date": tourDate,
"Tour Time": tour.time,
"Listing": `${agent.address}, ${agent.city}`,
"Stop #": `#${tour.listings.findIndex(l=>l.address===agent.address)+1} of ${tour.listings.length}`,
"── MESSAGE ──":"─────────────────",
message: `${urgencyLabel}\n\nHi ${agent.agentName},\n\n${urgencyNote}\n\n` +
`📅 TOUR DETAILS\n` +
`Tour: ${tour.emoji} ${tour.name}\n` +
`Date: ${tourDate}\n` +
`Time: ${tour.time}\n` +
`Your Listing: ${agent.address} (Stop #${tour.listings.findIndex(l=>l.address===agent.address)+1})\n\n` +
`✅ CONFIRM YOUR ATTENDANCE\n` +
`Please reply to this email with "CONFIRMED" to confirm that:\n` +
`• Your listing is tour-ready\n` +
`• Access/lockbox is set up\n` +
`• You or a representative will be available\n\n` +
(isFinalReminder
? `🚨 If we don't hear from you before the tour starts, we may need to skip your listing to keep the tour on schedule.\n\n`
: isSecondReminder
? `⏰ A final reminder will be sent tomorrow morning at 6 AM if we don't receive your confirmation.\n\n`
: `📩 If we don't hear from you, we'll send another reminder this evening at 7 PM.\n\n`) +
`Thank you!\n\n— MarketReady Tours\nTour · Rate · Decide\nwww.marketreadytours.com`,
"Sent Via": `MarketReady Tours — ${urgencyLabel}`,
"Sent At": new Date().toLocaleString("en-US",{dateStyle:"full",timeStyle:"short"}),
}),

});

class ErrorBoundary extends React.Component {
constructor(props){super(props);this.state={error:null};}
static getDerivedStateFromError(error){return {error};}
render(){
if(this.state.error) return React.createElement('div',{style:{padding:40,textAlign:'center',fontFamily:'monospace'}},
React.createElement('h2',{style:{color:'red'}},'App Error'),
React.createElement('pre',{style:{textAlign:'left',background:'#f5f5f5',padding:20,borderRadius:8,overflow:'auto',maxHeight:400}},this.state.error.toString()+'\n\n'+(this.state.error.stack||'')));
return this.props.children;
}
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);</script>
