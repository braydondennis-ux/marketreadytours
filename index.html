/* Create a Firebase Auth user via secondary app (so current admin stays signed in) */
async function createFirebaseUser(email, password) {
  let secondaryApp;
  try {
    secondaryApp = firebase.app("secondary");
  } catch(e) {
    secondaryApp = firebase.initializeApp(_fbConfig, "secondary");
  }
  const secondaryAuth = secondaryApp.auth();
  const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
  await secondaryAuth.signOut();
  return cred.user;
}

/* Look up admin role from Firebase database */
async function getAdminRole(email) {
  if(!_fb) return null;
  const key = email.replace(/\./g, ",");
  const snap = await _fb.ref("admins/" + key).once("value");
  return snap.val(); // {name, role} or null
}

function fbToArr(d) {
  if (d === null || d === undefined || typeof d !== "object") return d;

  const o = {}; for (const key of k) o[key] = fbToArr(d[key]); return o;

function LoginPage({onLogin,onClose,subAdmins}) {

if(!user||!pass){setError("Please enter your email and password.");return;}
setLoading(true);setError("");
try{
if(!_fbAuth) throw new Error("Auth unavailable");
const cred=await _fbAuth.signInWithEmailAndPassword(user.trim(),pass);
const email=cred.user.email;
const adminData=await getAdminRole(email);
if(!adminData){setError("You do not have admin access.");setLoading(false);await _fbAuth.signOut();return;}
const userData={email,name:adminData.name||email.split("@")[0],role:adminData.role||"sub",username:email.split("@")[0]};
sessionStorage.setItem("gat_session",JSON.stringify(userData));
onLogin(userData);
}catch(e){
const msg=e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"?"Incorrect email or password."
:e.code==="auth/too-many-requests"?"Too many attempts. Please wait and try again."

setError(msg);setLoading(false);
}

setResetStatus("sending");setResetError("");

setResetStatus("sent");
}catch(e){
setResetStatus("error");

setResetError(msg);
}

function AddListingForm({ tourColor, onAdd, onCancel }) {
const [query, setQuery]       = useState("");
const [suggestions, setSugg]  = useState([]);
const [selected, setSelected] = useState(null);
const [fields, setFields]     = useState({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
const [loading, setLoading]   = useState(false);
const [status, setStatus]     = useState("");
const [sessionToken, setToken]= useState(null);
const inputRef = useRef(null);
useEffect(()=>{
if(window.google?.maps?.places) {
setToken(new window.google.maps.places.AutocompleteSessionToken());
}
},[]);
useEffect(()=>{
if(!query || query.length < 3 || !window.google?.maps?.places || selected) {
setSugg([]); return;
}
const svc = new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({
input: query,
sessionToken,
types: ["address"],
componentRestrictions: { country: "us" },
}, (predictions, status) => {
if(status === window.google.maps.places.PlacesServiceStatus.OK && predictions) {
setSugg(predictions);
} else {
setSugg([]);
}
});
}, [query]);
const handleSelect = (prediction) => {
setSugg([]);
setLoading(true);
setStatus("📍 Confirming address...");
const map = new window.google.maps.Map(document.createElement("div"));
const svc = new window.google.maps.places.PlacesService(map);
svc.getDetails({
placeId: prediction.place_id,
fields: ["address_components", "formatted_address", "geometry"],
sessionToken,
}, (place, st) => {
if(st !== window.google.maps.places.PlacesServiceStatus.OK || !place) {
setStatus("❌ Could not get address details. Please try again.");
setLoading(false); return;
}
const get = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.long_name : "";
};
const getShort = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.short_name : "";
};
const streetNum  = get("street_number");
const streetName = get("route");
const city       = get("locality") || get("sublocality");
const state      = getShort("administrative_area_level_1");
const zip        = get("postal_code");
const address    = `${streetNum} ${streetName}`.trim();
const cityStr    = `${city}, ${state} ${zip}`.trim();
setQuery(address);
setSelected(prediction.place_id);
setToken(new window.google.maps.places.AutocompleteSessionToken());
setFields(f => ({ ...f, address, city: cityStr }));
setStatus("✅ Address confirmed! Fill in listing details below.");
setLoading(false);
});
};
const handleAdd = () => {
if(!fields.address || !selected) {
setStatus("⚠️ Please select a valid address from the suggestions.");
return;
}
onAdd({
...fields,
beds:  Number(fields.beds)  || 0,
baths: Number(fields.baths) || 0,
sqft:  Number(String(fields.sqft).replace(/[^0-9]/g,""))  || 0,
dom:   Number(fields.dom)   || 0,
price: Number(String(fields.price).replace(/[^0-9]/g,"")) || 0,
photos: fields.photos?.length
? fields.photos
: ["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
});
};
const clearSelection = () => {
setSelected(null); setQuery("");
setFields({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
setStatus(""); setSugg([]);
setTimeout(() => inputRef.current?.focus(), 100);
};
const fieldLabels = [["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"],["agent","Listing Agent"]];
return (
<div style={{background:"#fff", borderRadius:14, padding:16, border:`2px solid ${tourColor}40`}}>
<div style={{display:"flex", alignItems:"center", gap:8, marginBottom:14}}>
<span style={{fontSize:20}}>🔍</span>
<h4 style={{color:B.primary, fontSize:14, fontWeight:700, margin:0}}>Add New Listing</h4>
</div>
{/* Address search */}
<div style={{position:"relative", marginBottom:10}}>
<label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
Property Address *
</label>
<div style={{position:"relative"}}>
<input
ref={inputRef}
type="text"
placeholder="Start typing an address..."
value={query}
onChange={e=>{ setQuery(e.target.value); setSelected(null); }}
style={{width:"100%", border:`1.5px solid ${selected ? "#059669" : "#E5E7EB"}`,
borderRadius:9, padding:"11px 40px 11px 12px", fontSize:14,
outline:"none", background: selected ? "#F0FDF4" : "#fff"}}
/>
{selected && (
<button onClick={clearSelection}
style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
background:"#DC2626", color:"#fff", border:"none", borderRadius:"50%",
width:22, height:22, cursor:"pointer", fontSize:12, fontWeight:700,
display:"flex", alignItems:"center", justifyContent:"center"}}>✕</button>
)}
{loading && (
<div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)"}}>
<div style={{width:18, height:18, border:"2px solid #E5E7EB", borderTopColor:tourColor,
borderRadius:"50%", animation:"spin .8s linear infinite"}}/>
</div>
)}
</div>
{suggestions.length > 0 && !selected && (
<div style={{position:"absolute", top:"100%", left:0, right:0, background:"#fff",
border:"1.5px solid #E5E7EB", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,.15)",
zIndex:9999, overflow:"hidden", marginTop:4}}>
{suggestions.map((s, i) => (
<button key={s.place_id} onClick={()=>handleSelect(s)}
style={{width:"100%", background:"none", border:"none", borderBottom:i<suggestions.length-1?"1px solid #F3F4F6":"none",
padding:"12px 14px", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"flex-start", gap:10,
transition:"background .1s"}}
onMouseEnter={e=>e.currentTarget.style.background="#F9FAFB"}
onMouseLeave={e=>e.currentTarget.style.background="none"}>
<span style={{fontSize:16, flexShrink:0, marginTop:1}}>📍</span>
<div>
<div style={{fontWeight:600, fontSize:13, color:B.dark}}>{s.structured_formatting?.main_text}</div>
<div style={{fontSize:11, color:B.gray}}>{s.structured_formatting?.secondary_text}</div>
</div>
</button>
))}
</div>
)}
</div>
{status && (
<div style={{background: status.startsWith("✅") ? "#F0FDF4" : status.startsWith("❌") ? "#FEF2F2" : "#FFFBEB",
border: `1px solid ${status.startsWith("✅") ? "#BBF7D0" : status.startsWith("❌") ? "#FECACA" : "#FDE68A"}`,
borderRadius:8, padding:"10px 12px", fontSize:12,
color: status.startsWith("✅") ? "#065F46" : status.startsWith("❌") ? "#DC2626" : "#92400E",
marginBottom:10}}>
{status}
</div>
)}
{/* Manual fields — shown after address confirmed */}
{selected && (
<div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:12}}>
<div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
{fieldLabels.map(([f, label])=>(
<div key={f}>
<label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>{label}</label>
<input value={fields[f]||""} onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}
placeholder={label}
style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
</div>
))}
</div>
<div>
<label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>City, State ZIP</label>
<input value={fields.city||""} onChange={e=>setFields(fi=>({...fi,city:e.target.value}))}
style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
</div>
</div>
)}
{/* Photo upload */}
<div style={{marginBottom:12}}>
<label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
📸 Listing Photos

<label style={{display:"flex", alignItems:"center", justifyContent:"center", gap:8,
border:"2px dashed #D1D5DB", borderRadius:10, padding:"14px 12px",
cursor:"pointer", background:"#FAFAFA", transition:"all .15s"}}
onMouseEnter={e=>{e.currentTarget.style.borderColor=tourColor;e.currentTarget.style.background=tourColor+"10";}}
onMouseLeave={e=>{e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.background="#FAFAFA";}}>
<span style={{fontSize:22}}>📁</span>

const reader = new FileReader();

reader.onerror = rej;
reader.readAsDataURL(f);

setFields(fi => ({ ...fi, photos: [...(fi.photos||[]), ...urls] }));

}}

{/* Photo preview grid */}
{fields.photos?.length > 0 && (

{i===0 && <div style={{position:"absolute", bottom:4, left:4, background:tourColor,
color:"#fff", fontSize:9, fontWeight:700, borderRadius:4, padding:"2px 5px"}}>COVER</div>}
</div>
))}
</div>
)}

const fav={...tour.favorites,[listingId]:!tour.favorites?.[listingId]};
onUpdateTour({...tour,favorites:fav});
};
const handleRatingSubmit=(listingId,ratings)=>{

onUpdateTour({...tour,ratings:newRatings});
};

const notes={...adminNotes,[listingId]:note};
setAdminNotes(notes);
onUpdateTour({...tour,notes});
};

setAdminListings([...arr].sort((a,b)=>a.order-b.order));
};

setAdminListings(prev=>[...prev,item]);
setShowAddForm(false);
};

const sorted=[...(tour.listings||[])].sort((a,b)=>a.order-b.order);

function TeamPage({subAdmins,setSubAdmins,onBack,currentUser}) {
const [showAdd,setShowAdd]=useState(false);
const [newUser,setNewUser]=useState({name:"",email:"",password:""});
const [confirmDel,setConfirmDel]=useState(null);
const [addError,setAddError]=useState("");
const [addLoading,setAddLoading]=useState(false);
const [editId,setEditId]=useState(null);
const [editDraft,setEditDraft]=useState({});
const [showPasses,setShowPasses]=useState({});
const addUser=async()=>{
if(!newUser.name||!newUser.email){setAddError("Name and email are required.");return;}
if(subAdmins.find(u=>u.email?.toLowerCase()===newUser.email.toLowerCase())){setAddError("Email already in use.");return;}
setAddLoading(true);setAddError("");
try{
// Create Firebase Auth account with random temp password (user will set their own via reset email)
const tempPass=crypto.randomUUID().slice(0,12)+"Aa1!";
await createFirebaseUser(newUser.email, tempPass);
// Add role to Firebase database
const key=newUser.email.replace(/\./g,",");
await _fb.ref("admins/"+key).set({name:newUser.name,role:"sub"});
// Add to local subAdmins list
const nu={id:"sub-"+Date.now(),email:newUser.email,name:newUser.name,role:"sub",username:newUser.email.split("@")[0]};
setSubAdmins(prev=>[...prev,nu]);
setNewUser({name:"",email:"",password:""});
setShowAdd(false);
sendWelcomeEmail(nu.name, nu.email);
}catch(e){
const msg=e.code==="auth/email-already-in-use"?"This email already has an account."
:e.code==="auth/weak-password"?"Password must be at least 6 characters."
:e.code==="auth/invalid-email"?"Please enter a valid email address."
:"Failed to create account. Please try again.";
setAddError(msg);
}finally{setAddLoading(false);}
};
const removeUser=async(id)=>{
const user=subAdmins.find(u=>u.id===id);
if(user&&_fb){
try{const key=user.email.replace(/\./g,",");await _fb.ref("admins/"+key).remove();}catch(e){}
}
setSubAdmins(prev=>prev.filter(u=>u.id!==id));
setConfirmDel(null);
};
const saveEdit=(id)=>{
if(!editDraft.name)return;
const user=subAdmins.find(u=>u.id===id);
if(user&&_fb){
try{const key=user.email.replace(/\./g,",");_fb.ref("admins/"+key).update({name:editDraft.name});}catch(e){}
}
setSubAdmins(prev=>prev.map(u=>u.id===id?{...u,name:editDraft.name}:u));setEditId(null);
};
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:90}}>
{confirmDel&&(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

<p style={{color:B.gray,fontSize:12,marginBottom:24}}>Note: Their Firebase Auth account will need to be removed separately in the Firebase Console.</p>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>setConfirmDel(null)} style={{flex:1,background:B.lightGray,border:"none",borderRadius:10,padding:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
<button onClick={()=>removeUser(confirmDel)} style={{flex:1,background:"#DC2626",color:"#fff",border:"none",borderRadius:10,padding:12,fontWeight:700,cursor:"pointer"}}>Remove</button>
</div>
</div>
</div>
)}

<div><div style={{color:B.gold,fontSize:10,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>Super Admin</div><div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Team Management</div></div>

<div style={{background:B.gold,borderRadius:"50%",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👑</div>

return true; // all admins see all for now
}).filter(r=> filter==="all" ? true : r.status===filter);

setProcessing(true);
const tour = tours.find(t=>t.id===req.tourId);

const newListing={
id:Date.now(),
address:req.address, city:req.city,
beds:req.beds, baths:req.baths, sqft:req.sqft,
dom:req.dom, price:req.price, agent:req.agentName,

};

: t
));
}

try {

method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},
body:JSON.stringify({
email:req.agentEmail, _replyto:"marketreadytours@gmail.com",
_subject:`✅ Your listing has been approved — MarketReady Tours`,
message:`Hi ${req.agentName},\n\nGreat news! Your listing at ${req.address} has been approved for the ${req.tourName} tour.\n\nYour property will be featured on the tour. We look forward to showcasing your listing!\n\nIf you have any questions, reply to this email.\n\n— MarketReady Tours\nmarketreadytours.com`,
}),
});
} catch(e){ console.warn("Approval email failed",e); }
setRequests(prev=>prev.map(r=>r.id===req.id ? {...r,status:"approved",reviewedAt:new Date().toISOString()} : r));
setReviewing(null); setProcessing(false);
};
const handleDeny=async(req)=>{
setProcessing(true);

method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},

}),
});
} catch(e){ console.warn("Denial email failed",e); }
setRequests(prev=>prev.map(r=>r.id===req.id ? {...r,status:"denied",reviewedAt:new Date().toISOString(),denialReason} : r));
setReviewing(null); setDenialReason(""); setProcessing(false);
};

function App() {
React.useEffect(()=>{
const onHash=()=>{const h=window.location.hash.slice(2)||"";
if(h==="sponsors"){setPage("sponsors");setActiveTourId(null);}
else if(h==="team"){setPage("team");setActiveTourId(null);}
else if(h==="requests"){setPage("requests");setActiveTourId(null);}
else if(h.startsWith("tour/")){setActiveTourId(h.slice(5));setPage("dashboard");}
else{setPage("dashboard");setActiveTourId(null);}
};window.addEventListener("hashchange",onHash);if(window.location.hash.length>2)onHash();
return()=>window.removeEventListener("hashchange",onHash);},[]);
const [tours,setTours]=useState(()=>{
try { const s=localStorage.getItem("mrt_tours"); return s?JSON.parse(s):INITIAL_TOURS; } catch(e){return INITIAL_TOURS;}
});
useEffect(()=>{
try { localStorage.setItem("mrt_tours",JSON.stringify(tours)); } catch(e){}
},[tours]);
const [listingRequests,setListingRequests]=useState(()=>{
try { const s=localStorage.getItem("mrt_listing_requests"); return s?JSON.parse(s):[]; } catch(e){return [];}
});
useEffect(()=>{
try { localStorage.setItem("mrt_listing_requests",JSON.stringify(listingRequests)); } catch(e){}
},[listingRequests]);
const [subAdmins,setSubAdmins]=useState(()=>{
try {
const saved = localStorage.getItem("gat_subadmins");
return saved ? JSON.parse(saved) : [];
} catch(e) { return []; }
});
// Persist subAdmins to localStorage whenever they change
useEffect(()=>{
try { localStorage.setItem("gat_subadmins", JSON.stringify(subAdmins)); } catch(e) {}
}, [subAdmins]);
const [page,setPage]=useState("dashboard");
const [currentUser,setCurrentUser]=useState(null);
const [showLogin,setShowLogin]=useState(false);
const [authLoading,setAuthLoading]=useState(true);
const isSuperAdmin=currentUser?.role==="super";
const isAnyAdmin=!!currentUser;
// Listen for Firebase Auth state changes
useEffect(()=>{
if(!_fbAuth){setAuthLoading(false);return;}
const unsub=_fbAuth.onAuthStateChanged(async(user)=>{
if(user){
try{
const adminData=await getAdminRole(user.email);
if(adminData){
const userData={email:user.email,name:adminData.name||user.email.split("@")[0],role:adminData.role||"sub",username:user.email.split("@")[0]};
sessionStorage.setItem("gat_session",JSON.stringify(userData));
setCurrentUser(userData);
}else{
// User exists in Auth but not in admins database
sessionStorage.removeItem("gat_session");
setCurrentUser(null);
}
}catch(e){sessionStorage.removeItem("gat_session");setCurrentUser(null);}
}else{
// Try restoring from session (for page refreshes during Firebase load)
try{const s=sessionStorage.getItem("gat_session");if(s)setCurrentUser(JSON.parse(s));else setCurrentUser(null);}catch(e){setCurrentUser(null);}
}
setAuthLoading(false);
});
return ()=>unsub();
},[]);
const handleLogout=async()=>{
sessionStorage.removeItem("gat_session");
setCurrentUser(null);
setPage("dashboard");
try{if(_fbAuth) await _fbAuth.signOut();}catch(e){}
};

/* Firebase sync — runs in background, app works fine without it */
const fbReady = useRef(false);
const fbIgnore = useRef({});

// On mount: load from Firebase ONCE, then start listening
useEffect(()=>{
if(!_fb) return;
const paths = {
  "mrt_tours": setTours,
  "mrt_listing_requests": setListingRequests,
  "mrt_subadmins": setSubAdmins,
};
// First load from Firebase
Promise.all(Object.keys(paths).map(path=>
  _fb.ref(path).once("value").then(snap=>{
    try{
      const raw=snap.val();
      if(raw!==null&&raw!==undefined){paths[path](fbToArr(raw));}
      else{/* Firebase empty — will be seeded by write effects */}
    }catch(e){}
  }).catch(()=>{})
)).then(()=>{
  // After initial load, enable writes and start listening
  fbReady.current=true;
  // Listen for future changes from other browsers
  Object.entries(paths).forEach(([path,setter])=>{
    try{
      _fb.ref(path).on("value",snap=>{
        try{
          if(fbIgnore.current[path]){fbIgnore.current[path]=false;return;}
          const raw=snap.val();
          if(raw!==null&&raw!==undefined) setter(fbToArr(raw));

["\uD83D\uDD0D","Browse Tours","Explore curated tours by zip code and neighborhood."],

window.showCalendarView=function(){
if(document.getElementById("cal-modal"))return;
var ov=document.createElement("div");
ov.id="cal-modal";
ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px";
ov.onclick=function(){ov.remove()};
var box=document.createElement("div");
box.style.cssText="background:#fff;border-radius:20px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto";
box.onclick=function(e){e.stopPropagation()};
var now=new Date();
var cm={year:now.getFullYear(),month:now.getMonth()};
function render(){
var fd=new Date(cm.year,cm.month,1).getDay();
var dm=new Date(cm.year,cm.month+1,0).getDate();
var mn=new Date(cm.year,cm.month).toLocaleDateString("en-US",{month:"long",year:"numeric"});
var today=new Date();var ty=today.getFullYear(),tm=today.getMonth(),td=today.getDate();
var h='<div style="background:#1B3A6B;padding:16px 20px;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center"><span style="color:#fff;font-family:Georgia,serif;font-size:17px;font-weight:700">'+mn+'</span><button onclick="document.getElementById(&quot;cal-modal&quot;).remove()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer">\u2715</button></div>';
h+='<div style="padding:16px"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><button onclick="window._calPrev()" style="background:#F3F4F6;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:700;color:#1B3A6B">\u2039</button><button onclick="window._calNext()" style="background:#F3F4F6;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:700;color:#1B3A6B">\u203A</button></div>';
h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
["S","M","T","W","T","F","S"].forEach(function(d){h+='<div style="text-align:center;font-size:11px;font-weight:700;color:#6B7280;padding:4px 0">'+d+'</div>';});
h+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
for(var i=0;i<fd;i++)h+='<div style="min-height:48px"></div>';
for(var d=1;d<=dm;d++){
var isToday=(cm.year===ty&&cm.month===tm&&d===td);
var ds=cm.year+"-"+String(cm.month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
var tours=window._getMRTTours?window._getMRTTours(ds):[];
var bg=isToday?"#EFF6FF":"#fff";
var bdr=isToday?"2px solid #1B3A6B":"1px solid #F3F4F6";
var col=isToday?"#1B3A6B":"#0F172A";
var fw=isToday?"800":"600";
h+='<div style="min-height:48px;background:'+bg+';border:'+bdr+';border-radius:8px;padding:3px;text-align:center;overflow:hidden">';
h+='<div style="font-size:12px;font-weight:'+fw+';color:'+col+'">'+d+'</div>';
for(var t=0;t<Math.min(tours.length,2);t++){
h+='<div style="background:'+tours[t].color+';color:#fff;border-radius:3px;padding:1px 3px;font-size:7px;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+tours[t].emoji+' '+tours[t].name+'</div>';
}
if(tours.length>2)h+='<div style="font-size:7px;color:#6B7280">+'+(tours.length-2)+'</div>';
h+='</div>';
}
h+='</div></div>';
box.innerHTML=h;
}
window._calPrev=function(){cm.month--;if(cm.month<0){cm.month=11;cm.year--;}render();};
window._calNext=function(){cm.month++;if(cm.month>11){cm.month=0;cm.year++;}render();};
render();
ov.appendChild(box);
document.body.appendChild(ov);
};
window._initScrollIndicator=function(){
var ind=document.getElementById("scroll-ind");
if(ind)ind.remove();
ind=document.createElement("div");
ind.id="scroll-ind";
ind.style.cssText="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1B3A6B,#2A5298);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;z-index:199;box-shadow:0 4px 16px rgba(27,58,107,.4);display:flex;align-items:center;gap:6;opacity:0;transition:opacity .3s;pointer-events:none;font-family:Georgia,serif";
ind.innerHTML='More Tours <span style="font-size:16px">↓</span>';
ind.onclick=function(){window.scrollBy({top:300,behavior:"smooth"})};
document.body.appendChild(ind);
var check=function(){
var sh=document.documentElement.scrollHeight;
var st=window.pageYOffset||document.documentElement.scrollTop;
var ch=window.innerHeight;
if(sh>ch+100&&st<sh-ch-80){
ind.style.opacity="1";ind.style.pointerEvents="auto";
}else{
ind.style.opacity="0";ind.style.pointerEvents="none";
}
};
window.addEventListener("scroll",check);
setTimeout(check,500);
setTimeout(check,1500);
var obs=new MutationObserver(function(){setTimeout(check,200)});
obs.observe(document.body,{childList:true,subtree:true});
};
setTimeout(window._initScrollIndicator,800);
