/* Create a Firebase Auth user via secondary app (so current admin stays signed in) */
async function createFirebaseUser(email, password) {
  let secondaryApp;
  try {
    secondaryApp = firebase.app("secondary");
  } catch(e) {
    secondaryApp = firebase.initializeApp(_fbConfig, "secondary");
  }
  const secondaryAuth = secondaryApp.auth();
  const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
  await secondaryAuth.signOut();
  return cred.user;
}

/* Look up admin role from Firebase database */
async function getAdminRole(email) {
  if(!_fb) return null;
  const key = email.replace(/\./g, ",");
  const snap = await _fb.ref("admins/" + key).once("value");
  return snap.val(); // {name, role} or null
}

function fbToArr(d) {
  if (d === null || d === undefined || typeof d !== "object") return d;
  const k = Object.keys(d);
  if (k.length > 0 && k.every((v,i) => String(i) === v)) return k.map(i => fbToArr(d[i]));
  const o = {}; for (const key of k) o[key] = fbToArr(d[key]); return o;
}

const avgRating = (ratingObj) => {
if(!ratingObj) return 0;
const vals = Object.values(ratingObj).filter(v=>v>0);
if(!vals.length) return 0;
return (vals.reduce((a,b)=>a+b,0)/vals.length);
};
const starBar = (avg, color) => {
const pct = (avg/5)*100;
return (
<div style={{display:"flex",alignItems:"center",gap:8}}>
<div style={{flex:1,height:6,background:"#E5E7EB",borderRadius:3,overflow:"hidden"}}>
<div style={{width:`${pct}%`,height:"100%",background:color||B.gold,borderRadius:3,transition:"width .4s"}}/>
</div>
<span style={{fontSize:12,fontWeight:700,color:color||B.gold,minWidth:28}}>{avg.toFixed(1)}</span>
</div>
);
};
/* ── POST-TOUR PDF REPORT ── */
const generatePostTourPDF = (tour) => {
const { jsPDF } = window.jspdf;
const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
const W = 210, H = 297;
const navy = [27,58,107], gold = [201,168,76], white = [255,255,255], dark = [17,24,39], gray = [107,114,128], cream = [250,248,243], lightGold = [240,217,138];
const sorted = [...(tour.listings||[])].map(l=>({...l,avg:avgRating(tour.ratings?.[l.id])})).sort((a,b)=>b.avg-a.avg);
const tourDate = new Date(tour.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
const ratedCount = sorted.filter(l=>l.avg>0).length;
const medals = ["1st","2nd","3rd"];

/* ── PAGE 1: COVER ── */
// Navy header band
doc.setFillColor(...navy);
doc.rect(0, 0, W, 72, "F");
// Gold accent line
doc.setFillColor(...gold);
doc.rect(0, 72, W, 3, "F");

// Title text
doc.setFont("helvetica","bold");
doc.setFontSize(28);
doc.setTextColor(...white);
doc.text("MARKETREADY TOURS", W/2, 28, {align:"center"});
doc.setFont("helvetica","normal");
doc.setFontSize(11);
doc.setTextColor(...lightGold);
doc.text("TOUR  \u00B7  RATE  \u00B7  DECIDE", W/2, 37, {align:"center"});

// Tour name
doc.setFont("helvetica","bold");
doc.setFontSize(20);
doc.setTextColor(...white);
doc.text(tour.emoji + "  " + tour.name, W/2, 54, {align:"center"});
doc.setFont("helvetica","normal");
doc.setFontSize(12);
doc.setTextColor(...lightGold);
doc.text("Post-Tour Report", W/2, 63, {align:"center"});

// Tour details box
let y = 85;
doc.setFillColor(...cream);
doc.roundedRect(20, y, W-40, 38, 4, 4, "F");
doc.setFontSize(10);
doc.setTextColor(...gray);
doc.text("TOUR DATE", 30, y+10);
doc.text("TIME", 100, y+10);
doc.text("LISTINGS", 155, y+10);
doc.setFont("helvetica","bold");
doc.setFontSize(13);
doc.setTextColor(...dark);
doc.text(tourDate, 30, y+20);
doc.text(tour.time, 100, y+20);
doc.text(sorted.length + " Homes", 155, y+20);
doc.setFont("helvetica","normal");
doc.setFontSize(10);
doc.setTextColor(...gray);
doc.text("RATED", 30, y+32);
doc.text("AVG RATING", 100, y+32);
const overallAvg = sorted.filter(l=>l.avg>0).length > 0 ? (sorted.filter(l=>l.avg>0).reduce((s,l)=>s+l.avg,0)/sorted.filter(l=>l.avg>0).length) : 0;
doc.setFont("helvetica","bold");
doc.setTextColor(...dark);
doc.text(ratedCount + " of " + sorted.length, 55, y+32);
doc.text(overallAvg > 0 ? overallAvg.toFixed(1) + " / 5.0" : "N/A", 130, y+32);

// Rankings section
y = 135;
doc.setFont("helvetica","bold");
doc.setFontSize(16);
doc.setTextColor(...navy);
doc.text("TOUR RANKINGS", W/2, y, {align:"center"});
doc.setFillColor(...gold);
doc.rect(W/2-30, y+3, 60, 1, "F");
y += 14;

sorted.forEach((listing, i) => {
if(y > 260) { doc.addPage(); y = 25; }
const isTop3 = i < 3 && listing.avg > 0;
// Card background
if(isTop3) {
doc.setFillColor(i===0?255:250, i===0?251:248, i===0?235:243);
doc.setDrawColor(...gold);
doc.setLineWidth(0.5);
doc.roundedRect(20, y, W-40, 22, 3, 3, "FD");
} else {
doc.setFillColor(255,255,255);
doc.setDrawColor(230,230,230);
doc.setLineWidth(0.3);
doc.roundedRect(20, y, W-40, 22, 3, 3, "FD");
}
// Rank
doc.setFont("helvetica","bold");
doc.setFontSize(12);
doc.setTextColor(isTop3 ? gold[0] : gray[0], isTop3 ? gold[1] : gray[1], isTop3 ? gold[2] : gray[2]);
doc.text("#" + (i+1), 27, y+9);
if(isTop3 && listing.avg > 0) {
doc.setFontSize(8);
doc.text(medals[i] || "", 27, y+16);
}
// Address
doc.setFont("helvetica","bold");
doc.setFontSize(11);
doc.setTextColor(...dark);
const addrText = listing.address || "Unknown";
doc.text(addrText.length > 35 ? addrText.substring(0,35)+"..." : addrText, 42, y+9);
doc.setFont("helvetica","normal");
doc.setFontSize(8);
doc.setTextColor(...gray);
doc.text((listing.city||"") + (listing.agent ? "  \u00B7  " + listing.agent : ""), 42, y+16);
// Rating
if(listing.avg > 0) {
// Rating bar background
doc.setFillColor(230,230,230);
doc.roundedRect(140, y+4, 35, 5, 1.5, 1.5, "F");
// Rating bar fill
const pct = (listing.avg / 5) * 35;
doc.setFillColor(...gold);
doc.roundedRect(140, y+4, pct, 5, 1.5, 1.5, "F");
doc.setFont("helvetica","bold");
doc.setFontSize(12);
doc.setTextColor(...navy);
doc.text(listing.avg.toFixed(1) + " \u2605", 178, y+10);
} else {
doc.setFont("helvetica","normal");
doc.setFontSize(9);
doc.setTextColor(...gray);
doc.text("Not rated", 160, y+10);
}
y += 26;
});

/* ── PAGE 2+: DETAILED BREAKDOWN PER LISTING ── */
sorted.forEach((listing, idx) => {
const r = tour.ratings?.[listing.id] || {};
const avg = listing.avg;
if(avg <= 0) return;
doc.addPage();
let py = 0;
// Header band
doc.setFillColor(...navy);
doc.rect(0, 0, W, 40, "F");
doc.setFillColor(...gold);
doc.rect(0, 40, W, 2, "F");
doc.setFont("helvetica","bold");
doc.setFontSize(10);
doc.setTextColor(...lightGold);
doc.text("MARKETREADY TOURS  \u00B7  POST-TOUR REPORT", W/2, 12, {align:"center"});
doc.setFontSize(16);
doc.setTextColor(...white);
const title = (listing.address||"Property").length > 40 ? (listing.address||"Property").substring(0,40)+"..." : (listing.address||"Property");
doc.text(title, W/2, 28, {align:"center"});
doc.setFont("helvetica","normal");
doc.setFontSize(9);
doc.setTextColor(...lightGold);
doc.text((listing.city||"") + "  \u00B7  Listing Agent: " + (listing.agent||"N/A"), W/2, 36, {align:"center"});

py = 52;
// Property details row
doc.setFillColor(...cream);
doc.roundedRect(20, py, W-40, 20, 3, 3, "F");
const details = [];
if(listing.beds) details.push(listing.beds + " Beds");
if(listing.baths) details.push(listing.baths + " Baths");
if(listing.sqft) details.push(listing.sqft + " sqft");
if(listing.price) details.push("$" + listing.price);
if(listing.dom) details.push(listing.dom + " DOM");
doc.setFont("helvetica","normal");
doc.setFontSize(10);
doc.setTextColor(...dark);
doc.text(details.join("  \u00B7  "), W/2, py+12, {align:"center"});

py = 80;
// Overall rating circle
doc.setFillColor(...navy);
doc.circle(W/2, py+12, 18, "F");
doc.setFillColor(...gold);
doc.circle(W/2, py+12, 15, "F");
doc.setFont("helvetica","bold");
doc.setFontSize(20);
doc.setTextColor(...navy);
doc.text(avg.toFixed(1), W/2, py+15, {align:"center"});
doc.setFontSize(8);
doc.setTextColor(...gray);
doc.text("OVERALL RATING", W/2, py+34, {align:"center"});
doc.setFontSize(9);
doc.text("Ranked #" + (idx+1) + " of " + sorted.length + " homes", W/2, py+41, {align:"center"});

py = 130;
// Category breakdown header
doc.setFont("helvetica","bold");
doc.setFontSize(13);
doc.setTextColor(...navy);
doc.text("RATING BREAKDOWN", W/2, py, {align:"center"});
doc.setFillColor(...gold);
doc.rect(W/2-25, py+3, 50, 0.8, "F");
py += 14;

RATING_CATS.forEach(cat => {
const v = r[cat.key] || 0;
// Label
doc.setFont("helvetica","normal");
doc.setFontSize(11);
doc.setTextColor(...dark);
doc.text(cat.label, 30, py+5);
// Bar background
doc.setFillColor(230,230,230);
doc.roundedRect(90, py+1, 70, 6, 2, 2, "F");
// Bar fill
if(v > 0) {
const barW = (v / 5) * 70;
doc.setFillColor(...gold);
doc.roundedRect(90, py+1, barW, 6, 2, 2, "F");
}
// Score
doc.setFont("helvetica","bold");
doc.setFontSize(11);
doc.setTextColor(v > 0 ? navy[0] : gray[0], v > 0 ? navy[1] : gray[1], v > 0 ? navy[2] : gray[2]);
doc.text(v > 0 ? v.toFixed(1) + " / 5.0" : "N/A", 168, py+5);
py += 14;
});

// Notes section if available
const notes = tour.notes?.[listing.id];
if(notes) {
py += 10;
doc.setFillColor(...cream);
doc.roundedRect(20, py, W-40, 30, 3, 3, "F");
doc.setFont("helvetica","bold");
doc.setFontSize(10);
doc.setTextColor(...navy);
doc.text("ADMIN NOTES", 28, py+10);
doc.setFont("helvetica","normal");
doc.setFontSize(9);
doc.setTextColor(...dark);
const noteLines = doc.splitTextToSize(notes, W-60);
doc.text(noteLines.slice(0,3), 28, py+18);
}

// Favorites
if(tour.favorites?.[listing.id]) {
const fy = notes ? py + 40 : py + 16;
doc.setFillColor(254,226,226);
doc.roundedRect(20, fy, W-40, 12, 3, 3, "F");
doc.setFont("helvetica","bold");
doc.setFontSize(10);
doc.setTextColor(220,38,38);
doc.text("\u2764 FAVORITED — This home was marked as a top pick!", W/2, fy+8, {align:"center"});
}

// Footer
doc.setFillColor(...navy);
doc.rect(0, H-18, W, 18, "F");
doc.setFont("helvetica","normal");
doc.setFontSize(8);
doc.setTextColor(...lightGold);
doc.text("MarketReady Tours  \u00B7  marketreadytours.com  \u00B7  Tour. Rate. Decide.", W/2, H-8, {align:"center"});
});

// If no rated listings, add a note
if(sorted.filter(l=>l.avg>0).length === 0) {
doc.addPage();
doc.setFont("helvetica","normal");
doc.setFontSize(16);
doc.setTextColor(...gray);
doc.text("No ratings have been submitted yet.", W/2, H/2, {align:"center"});
doc.text("Ratings will appear in this report once attendees submit them.", W/2, H/2+10, {align:"center"});
}

// Footer on cover page (page 1)
doc.setPage(1);
doc.setFillColor(...navy);
doc.rect(0, H-18, W, 18, "F");
doc.setFont("helvetica","normal");
doc.setFontSize(8);
doc.setTextColor(...lightGold);
doc.text("MarketReady Tours  \u00B7  marketreadytours.com  \u00B7  Tour. Rate. Decide.  \u00B7  Generated " + new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}), W/2, H-8, {align:"center"});

const fileName = (tour.name||"Tour").replace(/[^a-zA-Z0-9]/g,"_") + "_PostTourReport.pdf";
doc.save(fileName);
};
/* ── STARS ── */
function Stars({value,onChange}) {
const [hover,setHover]=useState(0);
return (
<div style={{display:"flex",gap:2}}>
{[1,2,3,4,5].map(s=>(
<span key={s} onClick={()=>onChange&&onChange(s)}
onMouseEnter={()=>onChange&&setHover(s)} onMouseLeave={()=>setHover(0)}
style={{fontSize:onChange?28:18,cursor:onChange?"pointer":"default",lineHeight:1,
color:s<=(hover||value)?B.gold:"#D1D5DB",transition:"color .1s"}}>★</span>
))}
</div>
);
}
/* ── GALLERY ── */
function Gallery({photos,onClose}) {
const [cur,setCur]=useState(0);
return (
<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:9999,
display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
<div onClick={e=>e.stopPropagation()} style={{textAlign:"center",width:"100%",maxWidth:700}}>
<div style={{position:"relative",display:"inline-block",width:"100%"}}>
<img src={photos[cur]} alt="" style={{width:"100%",maxHeight:"62vh",objectFit:"cover",borderRadius:14,display:"block"}}/>
{photos.length>1&&<>
<button onClick={()=>setCur(c=>Math.max(0,c-1))} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",
background:"rgba(0,0,0,.5)",border:"none",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:20,cursor:"pointer",
display:cur===0?"none":"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
<button onClick={()=>setCur(c=>Math.min(photos.length-1,c+1))} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
background:"rgba(0,0,0,.5)",border:"none",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:20,cursor:"pointer",
display:cur===photos.length-1?"none":"flex",alignItems:"center",justifyContent:"center"}}>›</button>
</>}
<div style={{position:"absolute",bottom:12,right:14,background:"rgba(0,0,0,.55)",color:"#fff",borderRadius:6,padding:"3px 10px",fontSize:12}}>{cur+1}/{photos.length}</div>
</div>
{photos.length>1&&(
<div style={{display:"flex",gap:8,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>
{photos.map((p,i)=>(
<img key={i} src={p} alt="" onClick={()=>setCur(i)} style={{width:60,height:44,objectFit:"cover",borderRadius:6,cursor:"pointer",
border:i===cur?`3px solid ${B.gold}`:"3px solid transparent"}}/>
))}
</div>
)}
<button onClick={onClose} style={{marginTop:18,background:B.gold,color:"#fff",border:"none",borderRadius:8,padding:"10px 32px",fontWeight:700,cursor:"pointer"}}>✕ Close</button>
</div>
</div>
);
}

const sorted = [...(tour.listings||[])]
.map(l=>({...l, avg: avgRating(tour.ratings?.[l.id])}))
.sort((a,b)=>b.avg-a.avg);
const medals = ["🥇","🥈","🥉"];
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:40}}>
<div style={{background:tour.color,padding:"14px 18px",display:"flex",alignItems:"center",
gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
<div>
<div style={{color:"rgba(255,255,255,.7)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{tour.emoji} {tour.name}</div>
<div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Home Rankings</div>
</div>
<img src={window.MRT_LOGO_DATA} alt="MarketReady Tours" style={{height:40,objectFit:"contain",borderRadius:6,marginLeft:"auto",background:"#fff",padding:3}}/>
</div>
<div style={{padding:"20px 14px",display:"flex",flexDirection:"column",gap:12}}>
<p style={{color:B.gray,fontSize:13,marginBottom:4}}>
{sorted.some(l=>l.avg>0) ? "Rankings based on submitted ratings across all 7 categories." : "No ratings submitted yet for this tour."}
</p>
{sorted.map((listing,i)=>(
<div key={listing.id} className="fade-in" style={{background:"#fff",borderRadius:16,overflow:"hidden",
boxShadow:"0 2px 10px rgba(0,0,0,.08)",border:i===0&&listing.avg>0?"2px solid "+B.gold:"1px solid rgba(0,0,0,.05)"}}>
<div style={{display:"flex",gap:0}}>
<div style={{width:90,flexShrink:0,position:"relative"}}>
<img src={(listing.photos||[])[0]} alt="" style={{width:"100%",height:"100%",minHeight:90,objectFit:"cover",display:"block"}}/>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.25)"}}/>
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:32}}>{listing.avg>0?(medals[i]||`#${i+1}`):"—"}</div>
</div>
<div style={{flex:1,padding:"14px 16px"}}>
<div style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,color:B.primary,marginBottom:2}}>{listing.address}</div>
<div style={{fontSize:11,color:B.gray,marginBottom:8}}>{listing.city}</div>
{listing.avg>0?(
<>
{starBar(listing.avg, tour.color)}
<div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
{RATING_CATS.map(cat=>{
const v=(tour.ratings?.[listing.id])?.[cat.key]||0;
return v>0?(
<span key={cat.key} style={{fontSize:10,background:B.lightGray,borderRadius:4,padding:"2px 7px",color:B.dark}}>
{cat.label}: {v}★
</span>
):null;
})}
</div>
</>
):(
<span style={{fontSize:12,color:B.gray,fontStyle:"italic"}}>No ratings yet</span>
)}
</div>
</div>
</div>
))}
</div>
</div>
);
}
/* ── RATING SUMMARY DASHBOARD ── */
function SummaryDashboard({tour, onBack}) {
const listings = tour.listings;
const hasAny = listings.some(l=>tour.ratings?.[l.id]&&Object.values(tour.ratings[l.id]).some(v=>v>0));
return (
<div style={{background:B.cream,minHeight:"100vh",paddingBottom:40}}>
<div style={{background:tour.color,padding:"14px 18px",display:"flex",alignItems:"center",
gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:22}}>←</button>
<div>
<div style={{color:"rgba(255,255,255,.7)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{tour.emoji} {tour.name}</div>
<div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700}}>Rating Summary</div>
</div>
<img src={window.MRT_LOGO_DATA} alt="MarketReady Tours" style={{height:40,objectFit:"contain",borderRadius:6,marginLeft:"auto",background:"#fff",padding:3}}/>
</div>
<div style={{padding:"20px 14px",display:"flex",flexDirection:"column",gap:16}}>
{!hasAny&&(
<div style={{textAlign:"center",padding:"60px 20px",color:B.gray}}>
<div style={{fontSize:48,marginBottom:12}}>📊</div>
<p>No ratings submitted yet.<br/>Ratings will appear here as attendees submit them.</p>
</div>
)}
{hasAny&&listings.map(listing=>{
const r=tour.ratings?.[listing.id]||{};
const avg=avgRating(r);
if(!avg) return null;
return (
<div key={listing.id} style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,.08)"}}>
<div style={{background:tour.color,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{color:"#fff",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700}}>{listing.address}</div>
<div style={{background:"rgba(255,255,255,.2)",borderRadius:8,padding:"3px 10px",color:"#fff",fontWeight:800,fontSize:14}}>{avg.toFixed(1)}★</div>
</div>
<div style={{padding:"14px 16px"}}>
{RATING_CATS.map(cat=>{
const v=r[cat.key]||0;
return (
<div key={cat.key} style={{marginBottom:10}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
<span style={{fontSize:12,color:B.dark,fontWeight:500}}>{cat.label}</span>
<span style={{fontSize:12,color:B.gray}}>{v>0?`${v}/5`:"—"}</span>
</div>
{starBar(v, tour.color)}
</div>
);
})}
</div>
</div>
);
})}
</div>
</div>
);
}

/* ── ADD LISTING FORM with Google Places Autocomplete ── */
function AddListingForm({ tourColor, onAdd, onCancel }) {
const [query, setQuery]       = useState("");
const [suggestions, setSugg]  = useState([]);
const [selected, setSelected] = useState(null);
const [fields, setFields]     = useState({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
const [loading, setLoading]   = useState(false);
const [status, setStatus]     = useState("");
const [sessionToken, setToken]= useState(null);
const inputRef = useRef(null);
useEffect(()=>{
if(window.google?.maps?.places) {
setToken(new window.google.maps.places.AutocompleteSessionToken());
}
},[]);
useEffect(()=>{
if(!query || query.length < 3 || !window.google?.maps?.places || selected) {
setSugg([]); return;
}
const svc = new window.google.maps.places.AutocompleteService();
svc.getPlacePredictions({
input: query,
sessionToken,
types: ["address"],
componentRestrictions: { country: "us" },
}, (predictions, status) => {
if(status === window.google.maps.places.PlacesServiceStatus.OK && predictions) {
setSugg(predictions);
} else {
setSugg([]);
}
});
}, [query]);
const handleSelect = (prediction) => {
setSugg([]);
setLoading(true);
setStatus("📍 Confirming address...");
const map = new window.google.maps.Map(document.createElement("div"));
const svc = new window.google.maps.places.PlacesService(map);
svc.getDetails({
placeId: prediction.place_id,
fields: ["address_components", "formatted_address", "geometry"],
sessionToken,
}, (place, st) => {
if(st !== window.google.maps.places.PlacesServiceStatus.OK || !place) {
setStatus("❌ Could not get address details. Please try again.");
setLoading(false); return;
}
const get = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.long_name : "";
};
const getShort = (type) => {
const comp = place.address_components.find(c => c.types.includes(type));
return comp ? comp.short_name : "";
};
const streetNum  = get("street_number");
const streetName = get("route");
const city       = get("locality") || get("sublocality");
const state      = getShort("administrative_area_level_1");
const zip        = get("postal_code");
const address    = `${streetNum} ${streetName}`.trim();
const cityStr    = `${city}, ${state} ${zip}`.trim();
setQuery(address);
setSelected(prediction.place_id);
setToken(new window.google.maps.places.AutocompleteSessionToken());
setFields(f => ({ ...f, address, city: cityStr }));
setStatus("✅ Address confirmed! Fill in listing details below.");
setLoading(false);
});
};
const handleAdd = () => {
if(!fields.address || !selected) {
setStatus("⚠️ Please select a valid address from the suggestions.");
return;
}
onAdd({
...fields,
beds:  Number(fields.beds)  || 0,
baths: Number(fields.baths) || 0,
sqft:  Number(String(fields.sqft).replace(/[^0-9]/g,""))  || 0,
dom:   Number(fields.dom)   || 0,
price: Number(String(fields.price).replace(/[^0-9]/g,"")) || 0,
photos: fields.photos?.length
? fields.photos
: ["https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=800&auto=format&fit=crop"],
});
};
const clearSelection = () => {
setSelected(null); setQuery("");
setFields({ address:"", city:"", beds:"", baths:"", sqft:"", dom:"", price:"", agent:"", photos:[] });
setStatus(""); setSugg([]);
setTimeout(() => inputRef.current?.focus(), 100);
};
const fieldLabels = [["beds","Beds"],["baths","Baths"],["sqft","Sq Ft"],["dom","Days on Market"],["price","List Price ($)"],["agent","Listing Agent"]];
return (
<div style={{background:"#fff", borderRadius:14, padding:16, border:`2px solid ${tourColor}40`}}>
<div style={{display:"flex", alignItems:"center", gap:8, marginBottom:14}}>
<span style={{fontSize:20}}>🔍</span>
<h4 style={{color:B.primary, fontSize:14, fontWeight:700, margin:0}}>Add New Listing</h4>
</div>
{/* Address search */}
<div style={{position:"relative", marginBottom:10}}>
<label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
Property Address *
</label>
<div style={{position:"relative"}}>
<input
ref={inputRef}
type="text"
placeholder="Start typing an address..."
value={query}
onChange={e=>{ setQuery(e.target.value); setSelected(null); }}
style={{width:"100%", border:`1.5px solid ${selected ? "#059669" : "#E5E7EB"}`,
borderRadius:9, padding:"11px 40px 11px 12px", fontSize:14,
outline:"none", background: selected ? "#F0FDF4" : "#fff"}}
/>
{selected && (
<button onClick={clearSelection}
style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
background:"#DC2626", color:"#fff", border:"none", borderRadius:"50%",
width:22, height:22, cursor:"pointer", fontSize:12, fontWeight:700,
display:"flex", alignItems:"center", justifyContent:"center"}}>✕</button>
)}
{loading && (
<div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)"}}>
<div style={{width:18, height:18, border:"2px solid #E5E7EB", borderTopColor:tourColor,
borderRadius:"50%", animation:"spin .8s linear infinite"}}/>
</div>
)}
</div>
{suggestions.length > 0 && !selected && (
<div style={{position:"absolute", top:"100%", left:0, right:0, background:"#fff",
border:"1.5px solid #E5E7EB", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,.15)",
zIndex:9999, overflow:"hidden", marginTop:4}}>
{suggestions.map((s, i) => (
<button key={s.place_id} onClick={()=>handleSelect(s)}
style={{width:"100%", background:"none", border:"none", borderBottom:i<suggestions.length-1?"1px solid #F3F4F6":"none",
padding:"12px 14px", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"flex-start", gap:10,
transition:"background .1s"}}
onMouseEnter={e=>e.currentTarget.style.background="#F9FAFB"}
onMouseLeave={e=>e.currentTarget.style.background="none"}>
<span style={{fontSize:16, flexShrink:0, marginTop:1}}>📍</span>
<div>
<div style={{fontWeight:600, fontSize:13, color:B.dark}}>{s.structured_formatting?.main_text}</div>
<div style={{fontSize:11, color:B.gray}}>{s.structured_formatting?.secondary_text}</div>
</div>
</button>
))}
</div>
)}
</div>
{status && (
<div style={{background: status.startsWith("✅") ? "#F0FDF4" : status.startsWith("❌") ? "#FEF2F2" : "#FFFBEB",
border: `1px solid ${status.startsWith("✅") ? "#BBF7D0" : status.startsWith("❌") ? "#FECACA" : "#FDE68A"}`,
borderRadius:8, padding:"10px 12px", fontSize:12,
color: status.startsWith("✅") ? "#065F46" : status.startsWith("❌") ? "#DC2626" : "#92400E",
marginBottom:10}}>
{status}
</div>
)}
{/* Manual fields — shown after address confirmed */}
{selected && (
<div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:12}}>
<div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
{fieldLabels.map(([f, label])=>(
<div key={f}>
<label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>{label}</label>
<input value={fields[f]||""} onChange={e=>setFields(fi=>({...fi,[f]:e.target.value}))}
placeholder={label}
style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
</div>
))}
</div>
<div>
<label style={{display:"block", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:4}}>City, State ZIP</label>
<input value={fields.city||""} onChange={e=>setFields(fi=>({...fi,city:e.target.value}))}
style={{width:"100%", border:"1.5px solid #E5E7EB", borderRadius:8, padding:"9px 10px", fontSize:14, outline:"none", background:B.cream}}/>
</div>
</div>
)}
{/* Photo upload */}
<div style={{marginBottom:12}}>
<label style={{display:"block", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, color:B.gray, marginBottom:6}}>
📸 Listing Photos
</label>
<label style={{display:"flex", alignItems:"center", justifyContent:"center", gap:8,
border:"2px dashed #D1D5DB", borderRadius:10, padding:"14px 12px",
cursor:"pointer", background:"#FAFAFA", transition:"all .15s"}}
onMouseEnter={e=>{e.currentTarget.style.borderColor=tourColor;e.currentTarget.style.background=tourColor+"10";}}
onMouseLeave={e=>{e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.background="#FAFAFA";}}>
<span style={{fontSize:22}}>📁</span>
<div>
<div style={{fontWeight:600, fontSize:13, color:B.dark}}>Click to upload photos</div>
<div style={{fontSize:11, color:B.gray}}>JPG, PNG, HEIC — multiple files OK</div>
</div>
<input type="file" accept="image/*" multiple style={{display:"none"}}
onChange={e=>{
const files = Array.from(e.target.files);
if(!files.length) return;
Promise.all(files.map(f => new Promise((res,rej)=>{
const reader = new FileReader();
reader.onload = ev => res(ev.target.result);
reader.onerror = rej;
reader.readAsDataURL(f);
}))).then(urls => {
setFields(fi => ({ ...fi, photos: [...(fi.photos||[]), ...urls] }));
});
}}
/>
</label>
{/* Photo preview grid */}
{fields.photos?.length > 0 && (
<div style={{marginTop:8, display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6}}>
{fields.photos.map((p,i)=>(
<div key={i} style={{position:"relative", borderRadius:8, overflow:"hidden", aspectRatio:"4/3"}}>
<img src={p} alt="" style={{width:"100%", height:"100%", objectFit:"cover"}}/>
<button onClick={()=>setFields(fi=>({...fi,photos:fi.photos.filter((_,j)=>j!==i)}))}
style={{position:"absolute", top:4, right:4, background:"rgba(0,0,0,.6)",
color:"#fff", border:"none", borderRadius:"50%", width:20, height:20,
cursor:"pointer", fontSize:11, fontWeight:700, display:"flex",
alignItems:"center", justifyContent:"center", lineHeight:1}}>✕</button>
{i===0 && <div style={{position:"absolute", bottom:4, left:4, background:tourColor,
color:"#fff", fontSize:9, fontWeight:700, borderRadius:4, padding:"2px 5px"}}>COVER</div>}
</div>
))}
</div>
)}
</div>
<div style={{display:"flex", gap:10}}>
<button onClick={onCancel}
style={{flex:1, background:B.lightGray, border:"none", borderRadius:9, padding:"11px 0", fontWeight:600, cursor:"pointer"}}>
Cancel
</button>
<button onClick={handleAdd} disabled={!selected || loading}
className="btn-hover"
style={{flex:2, background: !selected||loading ? "#9CA3AF" : tourColor,
color:"#fff", border:"none", borderRadius:9, padding:"11px 0",
fontWeight:700, cursor: !selected||loading ? "default":"pointer"}}>
{loading ? "Loading..." : "✓ Add Listing"}
</button>
</div>
</div>
);
}

const [optimizing,setOptimizing]=useState(false);
const optimizeRoute=async()=>{
if(adminListings.length<3){alert("Need at least 3 listings to optimize route.");return;}
setOptimizing(true);
try {
const svc=new window.google.maps.DirectionsService();
const addresses=adminListings.map(l=>(l.address+" "+l.city).trim());
const origin=addresses[0];
const destination=addresses[addresses.length-1];
const waypoints=addresses.slice(1,-1).map(a=>({location:a,stopover:true}));
const result=await new Promise((resolve,reject)=>{
svc.route({origin,destination,waypoints,optimizeWaypoints:true,travelMode:window.google.maps.TravelMode.DRIVING},
(res,status)=>{if(status==="OK")resolve(res);else reject(status);});
});
const waypointOrder=result.routes[0].waypoint_order;
const first=adminListings[0];
const last=adminListings[adminListings.length-1];
const middle=adminListings.slice(1,-1);
const optimized=[first,...waypointOrder.map(i=>middle[i]),last].map((l,i)=>({...l,order:i+1}));
setAdminListings(optimized);
const legs=result.routes[0].legs;
const totalMins=legs.reduce((s,l)=>s+l.duration.value,0);
const totalMi=legs.reduce((s,l)=>s+l.distance.value,0);
alert(`Route optimized! 🗺️\n\nTotal drive: ${Math.round(totalMi/1609)} miles, ~${Math.round(totalMins/60)} minutes\n\nClick "Save Changes" to apply.`);
} catch(e) {
console.warn("Route optimization failed",e);
alert("Could not optimize route. Make sure all addresses are valid.");
}
setOptimizing(false);
};

if(!newUser.name||!newUser.email){setAddError("Name and email are required.");return;}
if(subAdmins.find(u=>u.email?.toLowerCase()===newUser.email.toLowerCase())){setAddError("Email already in use.");return;}

try{
// Create Firebase Auth account with random temp password (user will set their own via reset email)
const tempPass=crypto.randomUUID().slice(0,12)+"Aa1!";
await createFirebaseUser(newUser.email, tempPass);
// Add role to Firebase database
const key=newUser.email.replace(/\./g,",");
await _fb.ref("admins/"+key).set({name:newUser.name,role:"sub"});
// Add to local subAdmins list
const nu={id:"sub-"+Date.now(),email:newUser.email,name:newUser.name,role:"sub",username:newUser.email.split("@")[0]};
setSubAdmins(prev=>[...prev,nu]);
setNewUser({name:"",email:""});
setShowAdd(false);
sendWelcomeEmail(nu.name, nu.email);
}catch(e){
const msg=e.code==="auth/email-already-in-use"?"This email already has an account."
:e.code==="auth/weak-password"?"Password must be at least 6 characters."
:e.code==="auth/invalid-email"?"Please enter a valid email address."
:"Failed to create account. Please try again.";
setAddError(msg);
}finally{setAddLoading(false);}
};

const user=subAdmins.find(u=>u.id===id);
if(user&&_fb){
try{const key=user.email.replace(/\./g,",");await _fb.ref("admins/"+key).remove();}catch(e){}
}
setSubAdmins(prev=>prev.filter(u=>u.id!==id));
setConfirmDel(null);
};

if(!editDraft.name)return;

/* Generate Google Calendar URL for a tour */
function makeGoogleCalUrl(tourName, tourDate, tourTime, tourEmoji, address) {
const dt = new Date(tourDate+"T12:00:00");
// Parse tour time like "9:00 AM"
const timeParts = tourTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
if(timeParts){
let h=parseInt(timeParts[1]); const m=parseInt(timeParts[2]);
if(timeParts[3].toUpperCase()==="PM"&&h!==12) h+=12;
if(timeParts[3].toUpperCase()==="AM"&&h===12) h=0;
dt.setHours(h,m,0);
}
const end = new Date(dt.getTime()+3*60*60*1000); // 3 hour duration
const fmt=(d)=>d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
const title = encodeURIComponent((tourEmoji||"🏡")+" "+tourName+" — MarketReady Tours");
const details = encodeURIComponent("Your listing at "+address+" is featured on this tour.\\n\\nMarketReady Tours\\nmarketreadytours.com");
const location = encodeURIComponent(address||"");
return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(dt)}/${fmt(end)}&details=${details}&location=${location}`;
}

window.showCalendarView=function(){

var cm={year:now.getFullYear(),month:now.getMonth()};
function render(){
var fd=new Date(cm.year,cm.month,1).getDay();
var dm=new Date(cm.year,cm.month+1,0).getDate();
var mn=new Date(cm.year,cm.month).toLocaleDateString("en-US",{month:"long",year:"numeric"});
var today=new Date();var ty=today.getFullYear(),tm=today.getMonth(),td=today.getDate();
var h='<div style="background:#1B3A6B;padding:16px 20px;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center"><span style="color:#fff;font-family:Georgia,serif;font-size:17px;font-weight:700">'+mn+'</span><button onclick="document.getElementById(&quot;cal-modal&quot;).remove()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer">\u2715</button></div>';
h+='<div style="padding:16px"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><button onclick="window._calPrev()" style="background:#F3F4F6;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:700;color:#1B3A6B">\u2039</button><button onclick="window._calNext()" style="background:#F3F4F6;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:700;color:#1B3A6B">\u203A</button></div>';

for(var i=0;i<fd;i++)h+='<div style="min-height:48px"></div>';
for(var d=1;d<=dm;d++){
var isToday=(cm.year===ty&&cm.month===tm&&d===td);
var ds=cm.year+"-"+String(cm.month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
var tours=window._getMRTTours?window._getMRTTours(ds):[];
var bg=isToday?"#EFF6FF":"#fff";
var bdr=isToday?"2px solid #1B3A6B":"1px solid #F3F4F6";
var col=isToday?"#1B3A6B":"#0F172A";

h+='<div style="min-height:48px;background:'+bg+';border:'+bdr+';border-radius:8px;padding:3px;text-align:center;overflow:hidden">';
h+='<div style="font-size:12px;font-weight:'+fw+';color:'+col+'">'+d+'</div>';
for(var t=0;t<Math.min(tours.length,2);t++){

}

window._calPrev=function(){cm.month--;if(cm.month<0){cm.month=11;cm.year--;}render();};

};
window._initScrollIndicator=function(){
var ind=document.getElementById("scroll-ind");
if(ind)ind.remove();
ind=document.createElement("div");
ind.id="scroll-ind";
ind.style.cssText="position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1B3A6B,#2A5298);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;z-index:199;box-shadow:0 4px 16px rgba(27,58,107,.4);display:flex;align-items:center;gap:6;opacity:0;transition:opacity .3s;pointer-events:none;font-family:Georgia,serif";

ind.onclick=function(){window.scrollBy({top:300,behavior:"smooth"})};
document.body.appendChild(ind);
var check=function(){
var sh=document.documentElement.scrollHeight;
var st=window.pageYOffset||document.documentElement.scrollTop;
var ch=window.innerHeight;
if(sh>ch+100&&st<sh-ch-80){
ind.style.opacity="1";ind.style.pointerEvents="auto";
}else{
ind.style.opacity="0";ind.style.pointerEvents="none";
}
};
window.addEventListener("scroll",check);
setTimeout(check,500);
setTimeout(check,1500);
var obs=new MutationObserver(function(){setTimeout(check,200)});
obs.observe(document.body,{childList:true,subtree:true});
};
